<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>cradle</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a1a1a">
<style>
  /* ---------- base ---------- */
  :root {
    --accent: #444;
    --bg: #fff;
    --fg: #1a1a1a;
    --fg-muted: #666;
    --fg-faint: #999;
    --rule: rgba(0,0,0,0.1);
    --tag-bg: rgba(0,0,0,0.06);
    --banner-bg: #fef3c7;
    --banner-fg: #78350f;
    --banner-border: #fbbf24;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-serif: Georgia, "Times New Roman", serif;
    --maxw: 640px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--fg);
    line-height: 1.55;
    -webkit-text-size-adjust: 100%;
  }
  main {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 1.5rem 1.25rem 3rem;
  }

  /* ---------- menu renderer styles — single source: ext/menu/templates.css ---------- */
  /* @build:menu-templates:start */
/* Menu template visuals — the SINGLE SOURCE for how a rendered menu looks.
   Scoped to a `.menu` root so the bootloader render and the editor preview are
   pixel-identical. Inlined into index.html + menu/index.html by build/build.js
   (between @build:menu-templates markers). Edit here, then `npm run build`.

   Each template sets its own palette + fonts via --menu-* custom properties; an
   author's @accent overrides --menu-accent inline (consumer-applied) when present,
   otherwise the template's tasteful default stands. No web fonts (offline). */

.menu {
  --menu-accent: #b1543a;
  --menu-bg: #ffffff;
  --menu-fg: #1f1d1b;
  --menu-fg-muted: #6b655f;
  --menu-fg-faint: #a39c94;
  --menu-rule: rgba(0, 0, 0, 0.12);
  --menu-tag-bg: rgba(0, 0, 0, 0.06);
  --menu-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --menu-serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  --menu-head: var(--menu-sans);
  --menu-name: var(--menu-sans);
  --menu-maxw: 30rem;
  box-sizing: border-box;
  max-width: var(--menu-maxw);
  margin: 0 auto;
  padding: 2rem 1.5rem 3rem;
  background: var(--menu-bg);
  color: var(--menu-fg);
  font-family: var(--menu-sans);
  line-height: 1.55;
  -webkit-text-size-adjust: 100%;
}
.menu * { box-sizing: border-box; }
.menu h1 {
  font-family: var(--menu-head); font-size: 1.7rem; font-weight: 600; line-height: 1.15;
  margin: 0 0 0.35rem; color: var(--menu-accent); letter-spacing: -0.01em;
}
.menu h1 + p { margin-top: 0; color: var(--menu-fg-muted); }   /* the subtitle line */
.menu h2 {
  font-family: var(--menu-sans); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--menu-fg-muted); margin: 2rem 0 0.6rem;
  padding-bottom: 0.35rem; border-bottom: 1px solid var(--menu-rule);
}
.menu p { margin: 0.55rem 0; color: var(--menu-fg); }
.menu p em { color: var(--menu-fg-muted); font-style: italic; }
.menu strong { font-weight: 600; }
.menu a { color: var(--menu-accent); text-decoration: underline; text-underline-offset: 2px; }
.menu hr { border: 0; border-top: 1px solid var(--menu-rule); margin: 1.75rem 0 1rem; }
.menu .item { padding: 0.55rem 0; }   /* leaders + whitespace separate rows, not a full rule */
/* @leaders: off → the pre-leaders look: full-width rule between items, dots hidden (the
   leader span still grows, so name stays left / price right). Placed BEFORE the templates so
   per-template .item overrides — warm's no-rule, card's boxes — still win, faithfully
   restoring the original per-template behaviour. */
.menu.ruled .item { border-bottom: 1px solid var(--menu-rule); }
.menu.ruled .item:last-of-type { border-bottom: none; }
.menu.ruled .leader { border-bottom: none; }
.menu .item-line { display: flex; align-items: baseline; }
.menu .item-name { font-family: var(--menu-name); font-size: 1rem; font-weight: 600; min-width: 0; }
/* dot leaders: an empty flex-grow span whose dotted underline sits on the text
   baseline, filling the gap between name and price the way a printed menu does */
.menu .leader {
  flex: 1 1 auto; min-width: 1.2rem; margin: 0 0.5rem; align-self: baseline;
  border-bottom: 1.5px dotted var(--menu-rule); transform: translateY(-0.18em);
}
.menu .item-desc { font-size: 0.84rem; color: var(--menu-fg-muted); margin-top: 0.12rem; line-height: 1.4; }
.menu .item-price {
  font-size: 0.98rem; font-weight: 600; white-space: nowrap; color: var(--menu-fg);
  font-variant-numeric: tabular-nums; flex-shrink: 0;
}
/* multi-price columns: every price cell is the SAME fixed width (flex-basis, not
   min-width — min-width lets a wide value like R$ 140,00 expand and shove the inner
   column out of line), right-aligned, so item prices line up exactly under the section's
   column headers (taça / garrafa, S / M / L, …). --menu-col-w is tunable per template. */
.menu { --menu-col-w: 5.4rem; }
.menu .item-price.col, .menu .col-h {
  flex: 0 0 var(--menu-col-w); width: var(--menu-col-w); padding-left: 0.7rem; text-align: right;
}
.menu .cols { display: flex; align-items: baseline; margin: 0.05rem 0 0.35rem; }
.menu .col-fill { flex: 1 1 auto; }
.menu .col-h {
  font-size: 0.66rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--menu-fg-faint);
}
.menu .tag {
  display: inline-block; font-size: 0.62rem; font-weight: 600; padding: 0.06rem 0.42rem;
  border-radius: 999px; background: var(--menu-tag-bg); color: var(--menu-fg-muted);
  margin-left: 0.35rem; vertical-align: 1.5px; letter-spacing: 0.03em; text-transform: uppercase;
}
.menu .stale {
  background: #fef3c7; color: #78350f; border: 1px solid #fbbf24;
  padding: 0.7rem 0.9rem; border-radius: 6px; margin-bottom: 1.5rem; font-size: 0.88rem;
}
.menu footer {
  margin-top: 2.25rem; padding-top: 1.1rem; border-top: 1px solid var(--menu-rule);
  font-size: 0.78rem; color: var(--menu-fg-muted);
}
.menu .footer-line { margin: 0.22rem 0; }
.menu .legend {
  display: flex; flex-wrap: wrap; gap: 0.3rem 0.85rem; margin: 0 0 0.85rem;
  font-size: 0.74rem; color: var(--menu-fg-muted);
}
.menu .legend-item { display: inline-flex; align-items: baseline; gap: 0.3rem; }
.menu .legend-item .tag { margin-left: 0; }
.menu .socials { display: flex; gap: 0.55rem; margin: 0.7rem 0; flex-wrap: wrap; }
.menu .socials a {
  display: inline-flex; align-items: center; gap: 0.3rem; text-decoration: none;
  color: var(--menu-fg-muted); padding: 0.3rem 0.6rem; border: 1px solid var(--menu-rule);
  border-radius: 999px; font-size: 0.78rem;
}
.menu .socials a:hover { color: var(--menu-accent); border-color: var(--menu-accent); }
.menu .socials svg { width: 14px; height: 14px; flex-shrink: 0; }
.menu .attribution {
  font-size: 0.68rem; color: var(--menu-fg-faint); text-align: center;
  margin-top: 1.5rem; letter-spacing: 0.04em;
}

/* ============================== templates ============================== */

/* minimal — clean modern sans, white, airy (the base above). */

/* bistro — classic cream paper, elegant serif, centered, dotted dividers */
.menu.tmpl-bistro {
  --menu-bg: #faf5ec; --menu-fg: #2b2620; --menu-fg-muted: #7a6f5f; --menu-fg-faint: #b3a795;
  --menu-rule: rgba(80, 60, 30, 0.2); --menu-tag-bg: rgba(120, 90, 40, 0.12);
  --menu-head: var(--menu-serif); --menu-name: var(--menu-serif); --menu-accent: #9c4724;
}
.menu.tmpl-bistro h1 { font-style: italic; font-size: 2.05rem; text-align: center; }
.menu.tmpl-bistro h1 + p { text-align: center; font-style: italic; }
.menu.tmpl-bistro h2 { border-bottom: none; text-align: center; letter-spacing: 0.22em; }
.menu.tmpl-bistro .item-name { font-size: 1.1rem; font-weight: 500; }

/* serif — editorial / magazine, full serif, larger type */
.menu.tmpl-serif {
  --menu-head: var(--menu-serif); --menu-name: var(--menu-serif); --menu-accent: #1f1d1b;
  font-family: var(--menu-serif);
}
.menu.tmpl-serif h1 { font-size: 2.15rem; font-weight: 600; }
.menu.tmpl-serif h2 { font-family: var(--menu-sans); }
.menu.tmpl-serif .item-price { font-family: var(--menu-sans); }

/* dark — moody bar / izakaya, near-black with a warm amber accent */
.menu.tmpl-dark {
  --menu-bg: #16140f; --menu-fg: #ece7df; --menu-fg-muted: #a59c8e; --menu-fg-faint: #5f594e;
  --menu-rule: rgba(255, 255, 255, 0.14); --menu-tag-bg: rgba(255, 255, 255, 0.1);
  --menu-accent: #e0a458;
}
.menu.tmpl-dark .stale { background: #3a2e0a; color: #fde68a; border-color: #92740f; }

/* warm — cozy bakery / brunch, soft warm paper, friendly, no item rules */
.menu.tmpl-warm {
  --menu-bg: #fdf6f0; --menu-fg: #3a2e28; --menu-fg-muted: #8a7468; --menu-fg-faint: #c2ad9f;
  --menu-rule: rgba(150, 90, 60, 0.16); --menu-tag-bg: rgba(190, 110, 70, 0.13); --menu-accent: #c4683a;
}
.menu.tmpl-warm h1 { font-weight: 700; }
.menu.tmpl-warm h2 { color: var(--menu-accent); border-bottom: none; }
.menu.tmpl-warm .item { border-bottom: none; padding: 0.5rem 0; }

/* noir — fine dining, near-black, gold accent, centered serif, generous */
.menu.tmpl-noir {
  --menu-bg: #0d0d10; --menu-fg: #ece8df; --menu-fg-muted: #9b9384; --menu-fg-faint: #56514a;
  --menu-rule: rgba(200, 180, 140, 0.18); --menu-tag-bg: rgba(200, 180, 140, 0.12);
  --menu-head: var(--menu-serif); --menu-name: var(--menu-serif); --menu-accent: #c8a96a;
  padding-top: 2.5rem;
}
.menu.tmpl-noir h1 { font-size: 2rem; text-align: center; letter-spacing: 0.02em; }
.menu.tmpl-noir h1 + p { text-align: center; }
.menu.tmpl-noir h2 { text-align: center; border-bottom: none; color: var(--menu-accent);
  letter-spacing: 0.26em; font-weight: 600; }
.menu.tmpl-noir .item-name { font-weight: 500; }
.menu.tmpl-noir .stale { background: #2a230f; color: #f0d9a0; border-color: #6b5519; }

/* newsprint — broadsheet, off-white paper, heavy serif, ruled headings */
.menu.tmpl-newsprint {
  --menu-bg: #f3f0e7; --menu-fg: #1a1814; --menu-fg-muted: #5c554a; --menu-fg-faint: #9a9283;
  --menu-rule: rgba(0, 0, 0, 0.28); --menu-tag-bg: rgba(0, 0, 0, 0.08);
  --menu-head: var(--menu-serif); --menu-name: var(--menu-serif); --menu-accent: #1a1814;
  font-family: var(--menu-serif);
}
.menu.tmpl-newsprint h1 { font-size: 2.3rem; font-weight: 700; text-align: center;
  border-bottom: 3px double var(--menu-rule); padding-bottom: 0.35rem; }
.menu.tmpl-newsprint h1 + p { text-align: center; }
.menu.tmpl-newsprint h2 { font-family: var(--menu-serif); font-weight: 700; text-align: center;
  letter-spacing: 0.05em; border-top: 1px solid var(--menu-rule); border-bottom: 1px solid var(--menu-rule);
  padding: 0.3rem 0; }
.menu.tmpl-newsprint .item-price { font-family: var(--menu-serif); }

/* card — modern app / trendy café, soft grey page, white item cards */
.menu.tmpl-card {
  --menu-bg: #eef0f3; --menu-fg: #1d2530; --menu-fg-muted: #6a7280; --menu-fg-faint: #aab2bd;
  --menu-rule: rgba(0, 0, 0, 0.07); --menu-tag-bg: rgba(0, 0, 0, 0.05); --menu-accent: #3b6ea5;
}
.menu.tmpl-card h2 { border-bottom: none; color: var(--menu-accent); }
.menu.tmpl-card .item { background: #fff; border-bottom: none; border-radius: 10px;
  padding: 0.7rem 0.85rem; margin: 0 0 0.45rem; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06); }
.menu.tmpl-card .item-price { color: var(--menu-accent); }

/* ============================== print ============================== */
/* a clean, ink-friendly menu on paper: white background, dark text, no QR-source
   line, sections/items kept whole across page breaks. Applies to the bootloader
   render directly; the editor adds its own @media print to hide the chrome. */
@media print {
  .menu { max-width: none; margin: 0; padding: 1cm; }   /* fill the page, drop card chrome */
  /* ink-friendly paper: white bg + dark ink (the accent stays colored). A `.keep-color`
     menu opts OUT → its full template palette prints (colour printing / branded export).
     !important so these beat the more-specific .menu.tmpl-<x> palette (e.g. dark/noir set
     a light --menu-fg that would be invisible on the forced white background). */
  .menu:not(.keep-color) {
    background: #fff !important;
    --menu-fg: #1a1a1a !important; --menu-fg-muted: #555 !important; --menu-fg-faint: #999 !important;
    --menu-rule: rgba(0, 0, 0, 0.2) !important; --menu-tag-bg: rgba(0, 0, 0, 0.06) !important;
  }
  .menu:not(.keep-color) a { color: inherit; text-decoration: none; }
  .menu:not(.keep-color) .item { background: none !important; box-shadow: none !important; }
  .menu .attribution { display: none; }   /* the QR-source line — never on paper */
  .menu .item, .menu h2 { break-inside: avoid; }
  .menu h2 { break-after: avoid; }
}
  /* @build:menu-templates:end */
  .error { padding: 1.25rem; background: #fee; border: 1px solid #fcc;
           border-radius: 4px; color: #800; }
  .error pre { background: rgba(0,0,0,0.04); padding: 0.5rem; overflow-x: auto;
               font-size: 0.8rem; }

  /* ---------- doorbell renderer styles ---------- */
  .doorbell-title { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.5rem; color: var(--fg); }
  .doorbell-info { background: var(--tag-bg); padding: 0.85rem 1rem; border-radius: 6px;
                   margin: 1rem 0 1.5rem; font-size: 0.95rem; line-height: 1.45; }
  .doorbell-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin: 1.25rem 0; }
  @media (min-width: 480px) { .doorbell-buttons { grid-template-columns: 1fr 1fr 1fr; } }
  .ring-btn { display: flex; flex-direction: column; align-items: center; justify-content: center;
              gap: 0.35rem; min-height: 90px; padding: 0.85rem 0.5rem;
              border: 2px solid var(--rule); background: var(--bg); color: var(--fg);
              border-radius: 10px; font-size: 1rem; font-weight: 500; cursor: pointer;
              transition: border-color 0.15s, background 0.15s, transform 0.05s;
              font-family: inherit; }
  .ring-btn .ring-emoji { font-size: 1.8rem; line-height: 1; }
  .ring-btn:hover, .ring-btn:focus-visible { border-color: var(--fg); outline: none; }
  .ring-btn:active { transform: scale(0.97); }
  .ring-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .doorbell-text { width: 100%; min-height: 60px; padding: 0.65rem 0.8rem; margin: 0.75rem 0 0.5rem;
                   border: 1px solid var(--rule); border-radius: 6px; background: var(--bg); color: var(--fg);
                   font-family: inherit; font-size: 0.95rem; resize: vertical; box-sizing: border-box; }
  .doorbell-text:focus { outline: 1px solid var(--fg); border-color: var(--fg); }
  .doorbell-send { display: block; width: 100%; padding: 0.85rem; border-radius: 6px;
                   border: 2px solid var(--fg); background: var(--fg); color: var(--bg);
                   font-size: 1rem; font-weight: 500; cursor: pointer; font-family: inherit; }
  .doorbell-send:disabled { opacity: 0.5; cursor: not-allowed; }
  .doorbell-status { margin: 1rem 0; padding: 0.75rem 1rem; border-radius: 6px;
                     font-size: 0.95rem; text-align: center; display: none; }
  .doorbell-status.show { display: block; }
  .doorbell-status.sending { background: #fef3c7; color: #78350f; }
  .doorbell-status.success { background: #d1fae5; color: #065f46; }
  .doorbell-status.error   { background: #fee2e2; color: #7f1d1d; }
</style>
</head>

<main id="root"></main>

    payloadStart = us + 1;
  }
  const payload = body.slice(payloadStart);
  const raw = base45Decode(payload);
  return inflateByCodec(codec, raw, dicts);
}

function compactCodec(c) {
  if (c === "r") return "raw";
  if (c === "d") return "deflate";
  if (c === "b") return "brotli";
  throw new Error("EUNSUPPORTEDCODEC: unknown compact codec char '" + c + "'");
}

function inflateByCodec(codec, raw, dicts) {
  if (codec === "raw") return raw;
  if (codec === "deflate") return pako.inflateRaw(raw);
  if (codec === "brotli") throw new Error("EUNSUPPORTEDCODEC: brotli not implemented in this build");
  if (codec.startsWith("deflate-dict.")) {
    const dictId = codec.slice("deflate-dict.".length);
    const dict = dicts[dictId];
    if (!dict) throw new Error("EUNSUPPORTEDCODEC: unknown dict-id '" + dictId + "'");
    const dictBytes = new TextEncoder().encode(dict);
    return pako.inflateRaw(raw, { dictionary: dictBytes });
  }
  throw new Error("EUNSUPPORTEDCODEC: " + codec);
}

// Reverse the §6.4.1 URL-fragment escaping for q: capsules. A single
// left-to-right pass that recognizes exactly the two triplets the producer
// introduces (%25 -> %, %20 -> space) and copies every other character
// verbatim. Per SPEC-capsule §6.4.1 a conformant decoder MUST NOT use
// decodeURIComponent: that would also decode fragment-legal triplets a raw
// base45 payload may contain literally (e.g. a literal "%20" encodes to
// "%2520" and must round-trip back to "%20", not to a space).
function fragmentDecode(s) {
  let out = "";
  for (let i = 0; i < s.length; i++) {
    if (s[i] === "%" && i + 2 < s.length) {
      const t = s.slice(i, i + 3);
      if (t === "%25") { out += "%"; i += 2; continue; }
      if (t === "%20") { out += " "; i += 2; continue; }
    }
    out += s[i];
  }
  return out;
}

function resolveCapsule(capsule, dicts) {
  const colonIdx = capsule.indexOf(":");
  if (colonIdx < 0) throw new Error("EBADCAPSULE: missing scheme separator");
  const scheme = capsule.slice(0, colonIdx);
  const body = capsule.slice(colonIdx + 1);
  switch (scheme) {
    case "inline": return parseInline(body, dicts);
    case "i":      return parseI(body, dicts);
    case "q":      return parseQ(body, dicts);
    default:       throw new Error("EUNKNOWN-SCHEME: " + scheme);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}

function renderInline(text) {
  text = escapeHtml(text);
  text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  return text;
}

function formatMoney(value, locale) {
  const num = parseFloat(value);
  if (isNaN(num)) return value;
  if (locale === "pt-BR") return "R$ " + num.toFixed(2).replace(".", ",");
  return "$" + num.toFixed(2);
}
function formatPrice(price, locale) {
  const m = String(price == null ? "" : price).match(/^(\d+(?:\.\d+)?)(\/(?:kg|un))?$/);
  if (!m) return price;
  return formatMoney(m[1], locale) + (m[2] || "");
}
// multi-price: "18/78" → ["R$ 18,00","R$ 78,00"]; an empty token ("/140") → "" (skip that
// column). Returns null for a single price or a unit suffix ("34/kg"), which formatPrice owns.
function splitPrices(price, locale) {
  const raw = String(price == null ? "" : price);
  if (!raw.includes("/")) return null;
  const toks = raw.split("/");
  if (toks.length === 2 && /^(kg|un)$/.test(toks[1].trim())) return null;
  return toks.map(t => t.trim() === "" ? "" : formatMoney(t.trim(), locale));
}
function formatDate(iso, locale) {
  try {
    const d = new Date(iso + "T12:00:00");
    if (isNaN(d)) return iso;
    return new Intl.DateTimeFormat(locale, { day: "numeric", month: "long", year: "numeric" }).format(d);
  } catch { return iso; }
}

function parseMenuBody(body) {
  const lines = body.split("\n");
  const directives = {};
  const blocks = [];
  let inDirective = true;
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { inDirective = false; continue; }
    if (inDirective && line.startsWith("@") && line.includes(":")) {
      const idx = line.indexOf(":");
      directives[line.slice(1, idx).trim()] = line.slice(idx + 1).trim();
      continue;
    }
    inDirective = false;
    if (line === "---") { blocks.push({ type: "hr" }); continue; }
    if (line.startsWith("## ")) {
      // optional price columns: "## Vinhos | taça | garrafa" (h2 parsed before pipe-rows)
      const hp = line.slice(3).split("|").map(s => s.trim());
      blocks.push({ type: "h2", text: hp[0], cols: hp.slice(1).filter(Boolean) });
      continue;
    }
    if (line.startsWith("# ")) { blocks.push({ type: "h1", text: line.slice(2) }); continue; }
    if (line.includes("|")) {
      const parts = line.split("|").map(p => p.trim());
      blocks.push({
        type: "item",
        name: parts[0] || "", price: parts[1] || "", desc: parts[2] || "",
        tags: (parts[3] || "").split(",").map(t => t.trim()).filter(Boolean),
      });
      continue;
    }
    blocks.push({ type: "p", text: line });
  }
  return { directives, blocks };
}

// body text (after the magic line) + locale + an attribution line -> rendered
// menu HTML and the presentation hints the consumer applies.
function renderMenuHTML(body, locale, attribution) {
  const strings = MENU_LOCALES[locale] || MENU_LOCALES["pt-BR"];
  const parsed = parseMenuBody(body);
  const dirs = parsed.directives;
  const parts = [];
  // dot leaders (name ⋯⋯ price) are the default; @leaders: off restores full-width rules
  const leaders = !/^(off|false|no|0)$/i.test(dirs.leaders || "");
  // tag legend: on by default (decodes the v/g/p pills, which have no hover on paper);
  // @legend: off suppresses it. Built below from the tags actually used, in vocab order.
  const legendOn = !/^(off|false|no|0)$/i.test(dirs.legend || "");

  // valid_until: a quiet "valid through X" footer line while current, escalating to a
  // warning banner once expired.
  let validUntilExpired = false, validUntilOk = false;
  if (dirs.valid_until) {
    const expiry = new Date(dirs.valid_until + "T23:59:59");
    if (!isNaN(expiry)) {
      validUntilOk = true;
      validUntilExpired = expiry < new Date();
      if (validUntilExpired) parts.push(`<div class="stale">${escapeHtml(strings.stale(dirs.valid_until))}</div>`);
    }
  }

  for (const b of parsed.blocks) {
    if (b.type === "h1") parts.push(`<h1>${renderInline(b.text)}</h1>`);
    else if (b.type === "h2") {
      parts.push(`<h2>${renderInline(b.text)}</h2>`);
      // a column-header row aligns over the items' price columns below
      if (b.cols && b.cols.length) {
        parts.push(`<div class="cols"><span class="col-fill"></span>` +
          b.cols.map(c => `<span class="col-h">${renderInline(c)}</span>`).join("") + `</div>`);
      }
    }
    else if (b.type === "p") parts.push(`<p>${renderInline(b.text)}</p>`);
    else if (b.type === "hr") parts.push(`<hr>`);
    else if (b.type === "item") {
      const tagsHtml = b.tags
        .filter(t => strings.tags[t])
        .map(t => `<span class="tag" title="${escapeHtml(strings.tags[t])}">${escapeHtml(t)}</span>`)
        .join("");
      // name ⋯⋯ price on one line (dot leaders fill the gap via CSS), description
      // below spanning full width. The leader span only appears when there's a price.
      // A "/"-list price renders as aligned columns (matching the section's headers).
      const cells = splitPrices(b.price, locale);
      let priceHtml = "";
      if (cells) {
        priceHtml = `<span class="leader"></span>` +
          cells.map(c => `<span class="item-price col">${c ? escapeHtml(c) : ""}</span>`).join("");
      } else if (b.price) {
        priceHtml = `<span class="leader"></span><span class="item-price">${escapeHtml(formatPrice(b.price, locale))}</span>`;
      }
      const descHtml = b.desc ? `<div class="item-desc">${renderInline(b.desc)}</div>` : "";
      parts.push(
        `<div class="item">` +
        `<div class="item-line"><span class="item-name">${renderInline(b.name)}${tagsHtml}</span>${priceHtml}</div>` +
        descHtml + `</div>`
      );
    }
  }

  // legend: collect tags actually used (in the locale vocab's order), decode each
  let legendHtml = "";
  if (legendOn) {
    const used = new Set();
    for (const b of parsed.blocks) if (b.type === "item") for (const tg of b.tags) used.add(tg);
    const keys = Object.keys(strings.tags).filter(k => used.has(k));
    if (keys.length) {
      legendHtml = `<div class="legend">` + keys.map(k =>
        `<span class="legend-item"><span class="tag">${escapeHtml(k)}</span> ${escapeHtml(strings.tags[k])}</span>`
      ).join("") + `</div>`;
    }
  }

  const footerLines = [];
  if (dirs.service) footerLines.push(strings.service(dirs.service));
  if (dirs.couvert) footerLines.push(strings.couvert(dirs.couvert));
  // opt-in: the "valid through" line shows only when @valid_show is on (the expiry
  // banner above is always-on regardless — it's a safety guard).
  if (validUntilOk && !validUntilExpired && /^(true|yes|on|1)$/i.test(dirs.valid_show || "")) {
    footerLines.push(strings.validThrough(dirs.valid_until));
  }
  if (dirs.social || footerLines.length || legendHtml) {
    let footer = '<footer>';
    footer += legendHtml;   // dietary key first — closest to the items it decodes
    for (const l of footerLines) footer += `<div class="footer-line">${escapeHtml(l)}</div>`;
    if (dirs.social) {
      footer += '<div class="socials">';
      for (const pair of dirs.social.split(",")) {
        const [prefix, handle] = pair.split("=").map(s => s.trim());
        const def = SOCIAL[prefix];
        if (def && handle) {
          footer += `<a href="${def.url(handle)}" target="_blank" rel="noopener noreferrer">${def.icon}<span>${escapeHtml(def.label(handle))}</span></a>`;
        }
      }
      footer += '</div>';
    }
    footer += '</footer>';
    parts.push(footer);
  }

  if (attribution) parts.push(`<div class="attribution">${escapeHtml(attribution)}</div>`);

  return { html: parts.join(""), template: dirs.template || "minimal", accent: dirs.accent || null, lang: locale, leaders };
}

function menuRenderer(header, body, ctx) {
  const text = new TextDecoder("utf-8").decode(body);
  const r = renderMenuHTML(text, header.params, "decoded · " + ctx.bootloaderUrl);
  document.documentElement.lang = r.lang;
  // the mount IS the menu root: scope the template CSS to it; override accent only when set
  ctx.mount.className = "menu tmpl-" + r.template + (r.leaders ? "" : " ruled");
  if (r.accent && ctx.mount.style) ctx.mount.style.setProperty("--menu-accent", r.accent);
  ctx.mount.innerHTML = r.html;
  // let the template own the whole page: fill the body with the menu's background
  try {
    document.body.style.padding = "0";
    const bg = getComputedStyle(ctx.mount).backgroundColor;
    if (bg) document.body.style.background = bg;
  } catch (e) { /* headless / no layout */ }
}

// Base64url decode to Uint8Array
function b64urlToBytes(s) {
  const pad = (4 - (s.length % 4)) % 4;
  const norm = (s + "=".repeat(pad)).replace(/-/g, "+").replace(/_/g, "/");
  const bin = atob(norm);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

// Encrypt per SPEC-doorbell §5.2
async function doorbellEncrypt(recipientPubBytes, plaintext) {
  const ephemeral = await crypto.subtle.generateKey(
    { name: "X25519" }, true, ["deriveBits", "deriveKey"]);
  const ephemeralPubBuf = await crypto.subtle.exportKey("raw", ephemeral.publicKey);
  const ephemeralPubBytes = new Uint8Array(ephemeralPubBuf);

  const recipientPubKey = await crypto.subtle.importKey(
    "raw", recipientPubBytes, { name: "X25519" }, false, []);

  const sharedBits = await crypto.subtle.deriveBits(
    { name: "X25519", public: recipientPubKey }, ephemeral.privateKey, 256);

  const salt = new Uint8Array(64);
  salt.set(ephemeralPubBytes, 0);
  salt.set(recipientPubBytes, 32);

  const sharedKey = await crypto.subtle.importKey(
    "raw", sharedBits, "HKDF", false, ["deriveKey"]);
  const aesKey = await crypto.subtle.deriveKey(
    {
      name: "HKDF",
      hash: "SHA-256",
      salt: salt,
      info: new TextEncoder().encode("cradle/doorbell-v1"),
    },
    sharedKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt"]);

  const nonce = crypto.getRandomValues(new Uint8Array(12));
  const ciphertext = new Uint8Array(await crypto.subtle.encrypt(
    { name: "AES-GCM", iv: nonce, additionalData: ephemeralPubBytes },
    aesKey, plaintext));

  const wire = new Uint8Array(32 + 12 + ciphertext.length);
  wire.set(ephemeralPubBytes, 0);
  wire.set(nonce, 32);
  wire.set(ciphertext, 44);
  return wire;
}

async function doorbellSend(wire, relay, topic) {
  const url = `https://${relay}/${encodeURIComponent(topic)}`;
  const res = await fetch(url, {
    method: "POST",

function doorbellRenderer(header, body, ctx) {
  const locale = header.params || "en-US";
  const strings = DOORBELL_LOCALES[locale] || DOORBELL_LOCALES["en-US"];
  const text = new TextDecoder("utf-8").decode(body);
  const { directives: d, title: bareTitle } = parseDoorbellBody(text);

  // Validate required directives
  if (!d.pubkey) throw new Error("EDOORBELL: missing @pubkey directive");
  if (!d.topic) throw new Error("EDOORBELL: missing @topic directive");

  let pubBytes;
  try {
    pubBytes = b64urlToBytes(d.pubkey);
    if (pubBytes.length !== 32) throw new Error("wrong length");
  } catch (e) {
    throw new Error("EDOORBELL: @pubkey must be a base64url 32-byte X25519 public key");
  }

  const relay = d.relay || "ntfy.sh";
  const buttonKeys = (d.buttons || "delivery,visitor,other").split(",").map(s => s.trim()).filter(Boolean);
  const allowText = (d.allow_text || "").toLowerCase() === "true";
  const title = d.title || bareTitle || "";

  // Build UI
  document.documentElement.lang = locale;
  document.body.className = "tmpl-minimal";

  const parts = [];
  if (title) parts.push(`<div class="doorbell-title">${escapeHtml(title)}</div>`);
  if (d.info) parts.push(`<div class="doorbell-info">${renderInline(d.info)}</div>`);

  parts.push(`<div class="doorbell-buttons">`);
  for (const key of buttonKeys) {
    const btn = strings.buttons[key];
    if (!btn) continue;
    parts.push(
      `<button class="ring-btn" data-key="${escapeHtml(key)}" data-label="${escapeHtml(btn.emoji + " " + btn.label)}">` +
      `<span class="ring-emoji">${btn.emoji}</span>` +
      `<span>${escapeHtml(btn.label)}</span>` +
      `</button>`
    );
  }
  parts.push(`</div>`);

  if (allowText) {
    parts.push(`<textarea class="doorbell-text" placeholder="${escapeHtml(strings.placeholder)}" maxlength="200"></textarea>`);
    parts.push(`<button class="doorbell-send">${escapeHtml(strings.sendBtn)}</button>`);
  }

  parts.push(`<div class="doorbell-status" id="doorbell-status"></div>`);
  parts.push(`<div class="attribution">${escapeHtml(ctx.bootloaderUrl)}</div>`);
  ctx.mount.innerHTML = parts.join("");

  const status = ctx.mount.querySelector("#doorbell-status");
  const allButtons = ctx.mount.querySelectorAll(".ring-btn, .doorbell-send");

  function setStatus(state, msg) {
    status.className = "doorbell-status show " + state;
    status.textContent = msg;
  }

  async function ring(plaintext) {
    for (const b of allButtons) b.disabled = true;
    setStatus("sending", strings.sending);
    try {
      const wire = await doorbellEncrypt(pubBytes, new TextEncoder().encode(plaintext));
      await doorbellSend(wire, relay, d.topic);
      setStatus("success",
        strings.success + " (" + new Date().toLocaleTimeString(locale, { hour: "2-digit", minute: "2-digit" }) + ")");
    } catch (err) {
      console.error(err);
      setStatus("error", strings.error);
      for (const b of allButtons) b.disabled = false;
    }
  }

  for (const btn of ctx.mount.querySelectorAll(".ring-btn")) {
    btn.addEventListener("click", () => {
      const key = btn.getAttribute("data-key");
      const label = btn.getAttribute("data-label");
      ring(key + "\n" + label);
    });
  }
  const sendBtn = ctx.mount.querySelector(".doorbell-send");
  const textarea = ctx.mount.querySelector(".doorbell-text");
  if (sendBtn && textarea) {
    sendBtn.addEventListener("click", () => {
      const msg = textarea.value.trim();
      if (!msg) return;
      ring("text\n" + msg);
    });
  }
}

// arcr engine — parses the SPEC-arcr DSL and runs it on a
// shared juice/render substrate (lifted from arcade.html).
// A game is DATA; nothing here ever evals it. DSL = sandbox.
// ============================================================

// ---- seeded PRNG ----
function mulberry32(a){ return function(){ a|=0; a=(a+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a);
  t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }

// ============================================================
// PARSER  (line-oriented, keyword-led — SPEC-arcr §3)
// ============================================================
function tokenize(s){ const out=[]; const re=/"[^"]*"|\S+/g; let m; while((m=re.exec(s))) out.push(m[0]); return out; }

function parseArcr(src){
  const directives={}, objects={}, rules=[], warnings=[];
  let order=0, sceneNo=1;
  for (const raw of src.split("\n")){
    const line = raw.trim();
    if (!line || line[0]==="#") continue;
    if (line[0]==="@"){
      const sp = line.indexOf(" ");
      const k = (sp<0?line.slice(1):line.slice(1,sp)).toLowerCase();
      directives[k] = sp<0 ? "" : line.slice(sp+1).trim();
      continue;
    }
    const t = tokenize(line);
    if (t[0]==="scene"){ sceneNo = parseInt(t[1]) || 1; continue; }
    if (t[0]==="obj"){
      const ci = t.indexOf(":");
      if (ci<0 || !t[1]){ warnings.push("obj needs `name : kind` → "+line); continue; }
      const name = t[1].toLowerCase();
      const kind = (t[ci+1]||"emoji").toLowerCase();
      const hasArg = t[ci+2] && !t[ci+2].includes("=");
      const arg = hasArg ? unq(t[ci+2]) : "";
      const props = {};
      for (let i=ci+2; i<t.length; i++){ if (t[i].includes("=")){ const j=t[i].indexOf("="); props[t[i].slice(0,j).toLowerCase()] = unq(t[i].slice(j+1)); } }
      objects[name] = { name, kind, arg, tag:(props.tag||null), move:(props.move||"still").toLowerCase(),
        at:(props.at||"center").toLowerCase(), speed:+(props.speed||1)||1, size:(props.size||"normal").toLowerCase(), order:order++, scene:sceneNo };
      continue;
    }
    if (t[0]==="on" || t[0]==="every" || t[0]==="at" || t[0]==="when" || t[0]==="chance"){
      const ci = t.indexOf(":");
      if (ci<0){ warnings.push("rule needs `event : action` → "+line); continue; }
      const ev = t.slice(0,ci);
      const actions = t.slice(ci+1).join(" ").split(";").map(a=>tokenize(a.trim())).filter(a=>a.length);
      rules.push({ ev, actions, fired:false, next: ev[0]==="every" ? (+ev[1]||1) : ev[0]==="chance" ? CHANCE_TICK : null, scene:sceneNo });
      continue;
    }
    warnings.push("unrecognized → "+line);
  }
  // surface what the HUD should show
  const txt = src;
  const flags = {
    score: /(^|\n)\s*(on|every|at|when|chance)[^\n]*\bscore\b/.test(txt) || /score\s*[+\-=]/.test(txt),
    lives: ("lives" in directives) || /\blife\s*[+\-]/.test(txt) || /when[^\n]*\blives\b/.test(txt),
    timeGoal: 0,
    scoreGoal: 0,
  };
  for (const r of rules){
    if (r.ev[0]==="when"){
      const c=r.ev.slice(1);
      const win = r.actions.some(a=>a[0]==="win");
      if (win && c[0]==="score" && c[1]===">=") flags.scoreGoal = +c[2]||0;
      if (win && c[0]==="time"  && c[1]===">=") flags.timeGoal  = +c[2]||0;
    }
  }
  return { directives, objects, rules, warnings, flags,
           title:(directives.title||"untitled"), about:(directives.about||"") };
}

  else if(bg==="stars"){ ctx.fillStyle=p.fg; for(const s of BGFIELD){const y=(s.y+t*0.04*s.z)%1; ctx.globalAlpha=0.25+0.6*Math.abs(Math.sin(t*2*s.s+s.x*10)); const rr=s.z*1.8; ctx.fillRect(s.x*W,y*H,rr,rr);} }
  else if(bg==="bubbles"){ ctx.globalAlpha=0.10; ctx.fillStyle=p.player; for(const s of BGFIELD){const y=((s.y-t*0.05*s.z)%1+1)%1; ctx.beginPath(); ctx.arc(s.x*W,y*H,4+s.z*16,0,7); ctx.fill();} }
  else if(bg==="dots"){ ctx.globalAlpha=0.16; ctx.fillStyle=p.fg; for(const s of BGFIELD){const x=((s.x+t*0.02*s.z)%1+1)%1; ctx.beginPath(); ctx.arc(x*W,s.y*H,1.5+s.z*2,0,7); ctx.fill();} }
  ctx.restore(); ctx.globalAlpha=1; }

// ============================================================
// INTERPRETER  (SPEC-arcr §4 execution model)
// ============================================================
let PROG=null, PAL=null, AUD={wave:"square",root:50}, SEED=1;
let RNG=mulberry32(1);                   // seeded GAMEPLAY rng (spawn jitter, scatter, move random, chance) — reset per game in setupGame
const CHANCE_TICK=0.1;                   // `chance` is evaluated on this fixed game-time step (frame-rate independent, deterministic)
let state="card";                       // card | play | win | lose | end | refuse
let OBJ=[], S=null, parts=[], shake=0, msgs=[], ending=null, tapQ=0, lastBg="plain", scene=1, totalTime=0, pendingScene=null;
const target = { x:0.5, y:0.85 };

function zonePix(z){ switch(z){ case "top":return [W*0.5,H*0.14]; case "bottom":return [W*0.5,H*0.85];
  case "left":return [W*0.18,H*0.5]; case "right":return [W*0.82,H*0.5]; default:return [W*0.5,H*0.5]; } }
function radOf(o){ const base=W*0.052; return base*(o.size==="small"?0.7:o.size==="big"?1.5:1)*(o.scale||1)*(o.kind==="text"?1.1:1); }
function isPlayer(o){ return o.move==="tap"||o.move==="chase"; }
function refMatch(o,ref){ return ref[0]==="#" ? o.tag===ref.slice(1) : o.name===ref; }

function spawnObj(spec){ // {kind,arg,tag,move,speed,at,size}
  const o = { name:"_s"+(frame)+"_"+OBJ.length, kind:spec.kind||"emoji", arg:spec.arg||"", tag:spec.tag||null,
    move:spec.move||"fall", speed:+spec.speed||1, size:spec.size||"normal", scale:1, alive:true, sx:1, sy:1 };
  if (spec.x!=null){ o.x=spec.x; o.y=spec.y; }
  else if (spec.at==="scatter"){ const rr=radOf(o); o.x=rr+RNG()*(W-2*rr); o.y=H*(0.12+RNG()*0.5); }
  else { const z=zonePix(spec.at||"top"); o.x = (spec.at&&spec.at!=="top") ? z[0] : (radOf(o)+RNG()*(W-2*radOf(o))); o.y=z[1]; }
  OBJ.push(o); return o; }

// instantiate one scene's declared objects (auto-spread per zone) and (re)arm its rules
function placeScene(prog, sceneNo){
  const decl=Object.values(prog.objects).filter(d=>(d.scene||1)===sceneNo).sort((a,b)=>a.order-b.order);
  const byZone={}; for(const d of decl){ (byZone[d.at]=byZone[d.at]||[]).push(d); }
  for(const z in byZone){ const arr=byZone[z]; arr.forEach((d,i)=>{
    let x,y; const n=arr.length;
    if(z==="scatter"){ const rr=W*0.052*(d.scale||1); x=rr+RNG()*(W-2*rr); y=H*(0.12+RNG()*0.5); }
    else { const zp=zonePix(z); const span=Math.min(W*0.7, n*W*0.16); x = n>1 ? (W/2 - span/2 + span*(i+0.5)/n) : zp[0]; y=zp[1]; }
    OBJ.push({ ...d, x, y, scale:1, alive:true, sx:1, sy:1 });
  }); }
  for(const r of prog.rules){ if((r.scene||1)===sceneNo){ r.fired=false; r.next = r.ev[0]==="every" ? (+r.ev[1]||1) : r.ev[0]==="chance" ? CHANCE_TICK : null; } }
}

// transition to scene n: tear down the current stage, set up the next, scene-relative time
function gotoScene(n){
  scene=n; OBJ=[]; parts=[]; msgs=[]; shake=0; tapQ=0; S.time=0; pendingScene=null;
  placeScene(PROG, n);
}

function setupGame(prog,seed){
  PROG=prog; SEED=seed; PAL=buildPalette(prog,seed); buildBgField(prog,seed);
  RNG=mulberry32((seed^0x9e3779b9)>>>0); // gameplay rng: identical seed → identical play (SPEC-arcr §10)
  const r=mulberry32(seed^0x55); AUD={ wave:["square","sawtooth","triangle"][Math.floor(r()*3)], root:48+Math.floor(r()*12) };
  OBJ=[]; parts=[]; msgs=[]; shake=0; ending=null; tapQ=0; frame=0; totalTime=0; pendingScene=null;
  S={ score:0, lives:("lives" in prog.directives)?(+prog.directives.lives||0):3, time:0, taps:0, vars:{} };
  for(const r2 of prog.rules){ r2.fired=false; r2.next = r2.ev[0]==="every" ? (+r2.ev[1]||1) : null; }
  const scenes=[...new Set([...Object.values(prog.objects).map(o=>o.scene||1), ...prog.rules.map(r2=>r2.scene||1)])].sort((a,b)=>a-b);
  scene = scenes[0] || 1;
  placeScene(prog, scene);
}

function num(expr){ if(expr[0]==="count"){ const ref=expr[1]||""; return OBJ.filter(o=>o.alive&&refMatch(o,ref)).length; }
  const k=expr[0]; if(k in S) return S[k]; return S.vars[k]||0; }
function evalOne(c){ if(c.length<3) return false; const L=num([c[0],c[1]]); const op=c[c.length-2], R=+c[c.length-1];
  return op==="=="?L===R:op==="!="?L!==R:op===">="?L>=R:op==="<="?L<=R:op===">"?L>R:op==="<"?L<R:false; }
// compound: comparisons joined by `and`/`or`, evaluated left-to-right (no precedence)
function evalCond(c){
  const parts=[[]], ops=[];
  for(const tok of c){ if(tok==="and"||tok==="or"){ ops.push(tok); parts.push([]); } else parts[parts.length-1].push(tok); }
  let res=evalOne(parts[0]);
  for(let i=0;i<ops.length;i++){ const r=evalOne(parts[i+1]); res = ops[i]==="and" ? (res&&r) : (res||r); }
  return res; }

function burst(x,y,color,n,spd){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2,s=spd*(0.3+Math.random());
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-spd*0.3,life:1,color,r:2+Math.random()*3}); } }
// {score}/{lives}/{time}/{taps}/{var} → live values, for narration + endings
function interp(s){ return String(s).replace(/\{(\w+)\}/g,(m,k)=> k==="score"?S.score : k==="lives"?S.lives : k==="time"?Math.floor(S.time) : k==="taps"?S.taps : (S&&k in S.vars)?S.vars[k] : m ); }
function say(txt){ msgs.push({txt:interp(txt),life:2.4}); if(msgs.length>3) msgs.shift(); }

function doAction(a, srcObj){
  const v=a[0];
  if(v==="say"){ say(unq(a.slice(1).join(" "))); return; }
  if(v==="nothing") return;
  if(v==="shake"){ shake=Math.min(24,shake+14); return; }
  if(v==="flash"){ shake=Math.min(8,shake+5); return; }
  if(v==="score"){ const d=a[1]||"+0"; if(d[0]==="=")S.score=+d.slice(1)||0; else S.score+=+d||0;
    if(+d>0||d[0]!=="-"){ sfxGood(S.score); if(srcObj){burst(srcObj.x,srcObj.y,PAL.accent,12,220);} } return; }
  if(v==="life"){ S.lives+=+a[1]||0; if((+a[1]||0)<0){ shake=Math.min(24,shake+16); sfxBad(); if(srcObj)burst(srcObj.x,srcObj.y,"#f55",14,240);} return; }
  if(v==="set"){ S.vars[a[1]]=+a[2]||0; return; }
  if(v==="add"){ S.vars[a[1]]=(S.vars[a[1]]||0)+(+a[2]||0); return; }
  if(v==="spawn"){ let st=1, n=1; if(/^\d+$/.test(a[1])){ n=Math.max(1,Math.min(64,+a[1]||1)); st=2; } // optional leading burst count
    const kind=a[st]; const props={}; let arg=""; // first non-`key=value` token after kind is the (optional) positional arg
    for(let i=st+1;i<a.length;i++){ if(a[i].includes("=")){const j=a[i].indexOf("=");props[a[i].slice(0,j)]=unq(a[i].slice(j+1));} else if(!arg) arg=unq(a[i]); }
    for(let k=0;k<n;k++) spawnObj({kind,arg,tag:props.tag,move:props.move,speed:props.speed,at:props.at,size:props.size}); return; }
  if(v==="destroy"){ let n=Infinity,ref=a[1]; if(/^\d+$/.test(a[1])){n=+a[1];ref=a[2];}
    const targets = ref==="it" ? (srcObj?[srcObj]:[]) : OBJ.filter(o=>o.alive&&refMatch(o,ref));
    let c=0; for(const o of targets){ if(c>=n) break; o.alive=false; burst(o.x,o.y,PAL.fg,6,140); c++; } return; }
  if(v==="move"){ const o = a[1]==="it" ? srcObj : OBJ.find(x=>x.alive&&x.name===a[1]);
    if(o){ if(a[2]==="random"){o.x=radOf(o)+RNG()*(W-2*radOf(o)); o.y=H*(0.18+RNG()*0.6);} else {const z=zonePix(a[2]); o.x=z[0]; o.y=z[1];} } return; }
  if(v==="become"){ const targets = a[1]==="it" ? (srcObj?[srcObj]:[]) : OBJ.filter(o=>o.alive&&refMatch(o,a[1]));
    for(const o of targets){ o.kind=a[2]; o.arg=unq(a[3]||""); o.sx=1.4; o.sy=0.7; } return; }
  if(v==="tune"){ const prop=a[2], d=+a[3]||0; const targets = a[1]==="it" ? (srcObj?[srcObj]:[]) : OBJ.filter(o=>o.alive&&refMatch(o,a[1]));
    for(const o of targets){ if(prop==="speed") o.speed=Math.max(0.15,Math.min(3,(o.speed||1)+d));
      else if(prop==="scale") o.scale=Math.max(0.3,Math.min(3,(o.scale||1)+d)); } return; }
  if(v==="shoot"){ // shoot [from <ref>] <kind> [arg] [up|down|left|right | at <ref>] [props]
    const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
    const props={}, pos=[]; let dir=null, fromRef=null; // positionals = kind, arg (like obj/spawn)
    for(let i=1;i<a.length;i++){ const tk=a[i];
      if(tk==="from"){ fromRef=a[++i]; }
      else if(tk==="at"){ dir={at:a[++i]}; }
      else if(DIRS[tk]){ dir={vec:DIRS[tk]}; }
      else if(tk.includes("=")){ const j=tk.indexOf("="); props[tk.slice(0,j)]=unq(tk.slice(j+1)); }
      else pos.push(unq(tk)); }
    const kind=pos[0]||"shape", arg=pos[1]||""; // no kind given → a palette-circle bullet
    const PL=OBJ.find(o=>o.alive&&isPlayer(o));
    let origins = fromRef ? OBJ.filter(o=>o.alive&&refMatch(o,fromRef)) : ((srcObj||PL) ? [srcObj||PL] : []);
    if(!origins.length) origins=[{x:W*0.5,y:H*0.9,_virtual:true}];
    for(const src of origins){ let dx=0,dy=-1; // default heading: up
      if(dir&&dir.vec){ dx=dir.vec[0]; dy=dir.vec[1]; }
      else if(dir&&dir.at){ let best=null,bd=Infinity; for(const o of OBJ){ if(!o.alive||o===src||!refMatch(o,dir.at)) continue; const d=Math.hypot(o.x-src.x,o.y-src.y); if(d<bd){bd=d;best=o;} }
        if(best){ const d=Math.hypot(best.x-src.x,best.y-src.y)||1; dx=(best.x-src.x)/d; dy=(best.y-src.y)/d; } }
      else if(!src._virtual&&!isPlayer(src)&&PL){ const d=Math.hypot(PL.x-src.x,PL.y-src.y)||1; dx=(PL.x-src.x)/d; dy=(PL.y-src.y)/d; } // a non-player shooter aims at the player
      const o=spawnObj({kind,arg,tag:props.tag,move:"shot",speed:props.speed,size:props.size||"small",x:src.x,y:src.y});
      o.dirx=dx; o.diry=dy; }
    if(origins.length) playCue("blip");
    return; }
  if(v==="sound"){ playCue(a[1]||""); return; }
  if(v==="goto"){ pendingScene = parseInt(a[1]) || 1; return; }
  if(v==="win"||v==="lose"||v==="end"||v==="refuse"){ if(!ending){ ending={type:v,msg:interp(unq(a.slice(1).join(" ")))}; } return; }
}
function fire(rule, srcObj){ for(const a of rule.actions) doAction(a, srcObj); }

function update(dt){
  frame++;
  if(state!=="play") return;
  S.time += dt; totalTime += dt;
  const tx=target.x*W, ty=target.y*H;

  // movement
  const PL = OBJ.find(o=>o.alive&&isPlayer(o));
  for(const o of OBJ){ if(!o.alive) continue;
    if(o.move==="tap"){ const k=16*(o.speed||1); o.vx=(o.vx||0)+((tx-o.x)*k*dt); o.vx*=Math.pow(0.0008,dt); o.vy=(o.vy||0)+((ty-o.y)*k*dt); o.vy*=Math.pow(0.0008,dt); o.x+=o.vx*dt; o.y+=o.vy*dt; }
    else if(o.move==="chase"){ const dx=tx-o.x,dy=ty-o.y,d=Math.hypot(dx,dy)||1,sp=W*0.9*(o.speed||1); o.x+=dx/d*sp*dt; o.y+=dy/d*sp*dt; }
    else if(o.move==="flee"){ const dx=o.x-tx,dy=o.y-ty,d=Math.hypot(dx,dy)||1,sp=W*0.6*(o.speed||1); if(d<W*0.45){o.x+=dx/d*sp*dt; o.y+=dy/d*sp*dt;} }
    else if(o.move==="seek"){ if(PL){ const dx=PL.x-o.x,dy=PL.y-o.y,d=Math.hypot(dx,dy)||1,sp=W*0.5*(o.speed||1); o.x+=dx/d*sp*dt; o.y+=dy/d*sp*dt; } else { o.y+=H*0.28*(o.speed||1)*dt; } }
    else if(o.move==="fall"){ o.y+=H*0.28*(o.speed||1)*dt; }
    else if(o.move==="rise"){ o.y-=H*0.28*(o.speed||1)*dt; }
    else if(o.move==="drift"){ o.x+=Math.sin(S.time*2+(o.order||0)*1.3)*W*0.06*dt*30; }
    else if(o.move==="shot"){ const sp=H*0.62*(o.speed||1); o.x+=(o.dirx||0)*sp*dt; o.y+=(o.diry==null?-1:o.diry)*sp*dt; } // ballistic: flies its fixed heading, culled off-screen
    if(o.move==="tap"||o.move==="chase"||o.move==="flee"||o.move==="seek"){ const rr=radOf(o); o.x=Math.max(rr,Math.min(W-rr,o.x)); o.y=Math.max(rr,Math.min(H-rr,o.y)); }
    if(isPlayer(o)){ const sp=Math.min(1,Math.hypot(o.vx||0,o.vy||0)/900); o.sx+=((1+sp*0.3)-o.sx)*12*dt; o.sy+=((1-sp*0.2)-o.sy)*12*dt; }
    else { o.sx+=(1-o.sx)*8*dt; o.sy+=(1-o.sy)*8*dt; }
  }

  // timers (scene-relative)
  for(const r of PROG.rules){
    if((r.scene||1)!==scene) continue;
    if(r.ev[0]==="every"){ while(S.time>=r.next){ r.next+=(+r.ev[1]||1); fire(r); } }
    else if(r.ev[0]==="chance"){ const p=+r.ev[1]||0; while(S.time>=r.next){ r.next+=CHANCE_TICK; if(RNG()<p*CHANCE_TICK) fire(r); } } // ~p times/sec, deterministic
    else if(r.ev[0]==="at"&&!r.fired&&S.time>=(+r.ev[1]||0)){ r.fired=true; fire(r); }
  }
  if(ending) return endGame();

  // collisions (on hit A B) — fire once per pair; consume the non-player member
  // UNLESS the rule transformed `it` (become/move/tune it), in which case it survives
  for(const r of PROG.rules){ if(r.ev[0]!=="on"||r.ev[1]!=="hit"||(r.scene||1)!==scene) continue; const A=r.ev[2],B=r.ev[3];
    const keepIt = r.actions.some(a=>(a[0]==="become"||a[0]==="move"||a[0]==="tune")&&a[1]==="it");
    for(const o1 of OBJ){ if(!o1.alive||!refMatch(o1,A)) continue;
      for(const o2 of OBJ){ if(!o2.alive||o2===o1||!refMatch(o2,B)) continue;
        if(o2.fired&&o2.fired.has(r)) continue;
        if(Math.hypot(o1.x-o2.x,o1.y-o2.y) < radOf(o1)+radOf(o2)*0.8){
          const src = isPlayer(o1)?o2:o1; fire(r, src);
          (o2.fired=o2.fired||new Set()).add(r);
          if(!keepIt){ if(!isPlayer(o1)) o1.alive=false; if(!isPlayer(o2)) o2.alive=false; }
          if(isPlayer(o1)){o1.sx=0.7;o1.sy=1.4;} if(isPlayer(o2)){o2.sx=0.7;o2.sy=1.4;}
        }
      } } }
  if(ending) return endGame();

  // taps
  while(tapQ>0){ tapQ--; S.taps++;
    for(const r of PROG.rules){ if(r.ev[0]!=="on"||r.ev[1]!=="tap"||(r.scene||1)!==scene) continue;
      if(r.ev[2]){ // on tap <ref> — must land on a matching object
        const hit=OBJ.find(o=>o.alive&&refMatch(o,r.ev[2])&&Math.hypot(o.x-tx,o.y-ty)<radOf(o)*1.4);
        if(hit) fire(r,hit);
      } else fire(r);
    }
  }
  if(ending) return endGame();

  // when (rising edge)
  for(const r of PROG.rules){ if(r.ev[0]==="when"&&(r.scene||1)===scene&&!r.fired&&evalCond(r.ev.slice(1))){ r.fired=true; fire(r); } }
  if(ending) return endGame();
  if(pendingScene!=null){ gotoScene(pendingScene); return; }

  // default lose at 0 lives (if a life system is in use)
  if(PROG.flags.lives && S.lives<=0){ ending={type:"lose",msg:""}; return endGame(); }
  // safety net: a game with no reachable ending is force-ended (SPEC-arcr §11) — total time, not scene time
  if(totalTime>=SAFETY){ ending={type:"end",msg:""}; return endGame(); }

  // cull: drop dead objects; an alive object that left the field is "missed" → fire `on miss <ref>` then drop it
  const kept=[];
  for(const o of OBJ){
    const onField = o.y>-H*0.2 && o.y<H*1.2 && o.x>-W*0.2 && o.x<W*1.2;
    if(o.alive && onField){ kept.push(o); continue; }
    if(o.alive && !onField){ for(const r of PROG.rules){ if(r.ev[0]==="on"&&r.ev[1]==="miss"&&(r.scene||1)===scene&&refMatch(o,r.ev[2])) fire(r,o); } }
  }
  OBJ=kept;
  if(ending) return endGame();
  for(const p of parts){ p.vy+=700*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt*1.6; } parts=parts.filter(p=>p.life>0);
  for(const m of msgs) m.life-=dt; msgs=msgs.filter(m=>m.life>0);
  shake*=Math.pow(0.0015,dt);
}

const SAFETY=120;
function endGame(){
  if(!ending && S.time>=SAFETY) ending={type:"end",msg:""};
  if(!ending) return;
  state=ending.type;
  if(ending.type==="win") sfxWin(); else if(ending.type==="lose") sfxDie(); else sfxUi();
  const head = {win:"YOU WIN",lose:"GAME OVER",end:"THE END",refuse:"—"}[ending.type];
  headEl.textContent = head;
  headEl.style.color = PAL.fg;
  msgEl.textContent = ending.msg || "";
  resultEl.style.color = PAL.fg; resultEl.style.display = "flex";
}

// ---- render ----
function drawObj(o){ const r=radOf(o); ctx.save(); ctx.translate(o.x,o.y); ctx.scale(o.sx||1,o.sy||1);
  if(o.kind==="emoji"){ drawEmoji(o.arg, 0,0, r*2.1); }
  else if(o.kind==="text"){ ctx.fillStyle=isPlayer(o)?PAL.player:PAL.fg; ctx.shadowColor="rgba(0,0,0,0.4)"; ctx.shadowBlur=6;
    ctx.font=`800 ${Math.round(r*0.95)}px system-ui`; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(o.arg,0,0); }
  else if(o.kind==="sprite"){ const sp=spriteFor(o); ctx.imageSmoothingEnabled=false; ctx.drawImage(sp,-r,-r,r*2,r*2); ctx.imageSmoothingEnabled=true; }
  else { drawShape(o.arg||"circle", r, isPlayer(o)?PAL.player:PAL.fg); }
  ctx.restore(); }

function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(PROG) drawBackground(); else { ctx.fillStyle="#0b0b10"; ctx.fillRect(0,0,W,H); }
  const ox=(Math.random()*2-1)*shake, oy=(Math.random()*2-1)*shake; ctx.translate(ox,oy);
  if(state==="play"||state==="win"||state==="lose"||state==="end"||state==="refuse"){
    for(const o of OBJ) if(o.alive) drawObj(o);
    for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }
    ctx.globalAlpha=1;
  }
  ctx.setTransform(DPR,0,0,DPR,0,0);

  // narration (say)
  let yy=H*0.30;
  for(let i=msgs.length-1;i>=0;i--){ const m=msgs[i]; ctx.globalAlpha=Math.min(1,m.life*1.5);
    ctx.fillStyle=PAL?PAL.fg:"#eee"; ctx.font=`600 ${Math.round(W*0.05)}px system-ui`; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(m.txt, W*0.5, yy); yy-=H*0.05; }
  ctx.globalAlpha=1;

  // HUD
  if(state==="play" && PROG){
    ctx.fillStyle=PAL.fg; ctx.font=`700 ${Math.round(W*0.055)}px system-ui`; ctx.textBaseline="top"; ctx.textAlign="left";
    let label="";
    if(PROG.flags.timeGoal) label=`${Math.max(0,Math.ceil(PROG.flags.timeGoal-S.time))}s`;
    else if(PROG.flags.scoreGoal) label=`${S.score}/${PROG.flags.scoreGoal}`;
    else if(PROG.flags.score) label=`${S.score}`;
    if(label) ctx.fillText(label, W*0.05, H*0.05);
    if(PROG.flags.lives && S.lives>0){ ctx.textAlign="right"; ctx.fillStyle="#f66"; ctx.fillText("♥".repeat(Math.min(9,S.lives)), W*0.95, H*0.05); }
  }
}

let last=0;
function loop(t){ const dt=Math.min(0.05,(t-last)/1000||0); last=t; update(dt); draw(); requestAnimationFrame(loop); }

// ============================================================
// shell: card reveal, input, library, editor
// ============================================================


  // ---- the cradle renderer entry (SPEC-cradle §6 signature) ----
  return function arcrRenderer(header, body, rctx){
    const program = new TextDecoder("utf-8").decode(body);
    const sm = /seed=(\d+)/.exec(header.params || "");
    const seed = sm ? ((+sm[1]) >>> 0) : hashStr(program);
    buildDOM(rctx.mount);
    boot(program, seed);
  };

})();
// @build:arcr-renderer:end

// ============================================================
// Renderer registry
// ============================================================
const RENDERERS = {
  menu:     menuRenderer,
  doorbell: doorbellRenderer,
  arcr:     arcrRenderer,
};

// ============================================================
// Magic-byte dispatch
// ============================================================

function parseMagicLine(bytes) {
  // Read up to 4096 bytes or first 0x0A
  const cap = Math.min(bytes.length, 4096);
  let nl = -1;
  for (let i = 0; i < cap; i++) {
    if (bytes[i] === 0x0a) { nl = i; break; }
  }
  if (nl < 0) throw new Error("EMAGIC: no newline within first 4 KB");
  const line = new TextDecoder("utf-8").decode(bytes.slice(0, nl));
  const m = line.match(/^!([A-Za-z]+)(\d+)\+(.*)$/);
  if (!m) throw new Error("EMAGIC: malformed magic line: " + line);
  return {
    header: { formatName: m[1], version: parseInt(m[2], 10), params: m[3] },
    body: bytes.slice(nl + 1)
  };
}

// ============================================================
// Main
// ============================================================

const BOOTLOADER_URL = location.origin + location.pathname;

async function main() {
  const root = document.getElementById("root");
  try {
    const frag = fragmentDecode(location.hash.slice(1));
    if (!frag) {
      root.innerHTML =
        '<div class="error">No capsule. This page renders payloads addressed by cradle capsules in the URL fragment. See <a href="https://gentropic.org">gentropic.org</a>.</div>';
      return;
    }

    const bytes = resolveCapsule(frag, DICTS);
    const { header, body } = parseMagicLine(bytes);

    const renderer = RENDERERS[header.formatName];
    if (!renderer) throw new Error("EUNKNOWN-FORMAT: " + header.formatName);

    await renderer(header, body, {
      mount: root,
      bootloaderUrl: BOOTLOADER_URL,
      capsule: frag,
    });
  } catch (err) {
    root.innerHTML =
      `<div class="error"><strong>${escapeHtml(err.message.split(":")[0])}</strong>: ${escapeHtml(err.message.split(":").slice(1).join(":").trim() || err.message)}<pre>${escapeHtml(location.hash.slice(1, 200))}${location.hash.length > 201 ? "…" : ""}</pre></div>`;
    console.error(err);
  }
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", main);
} else {
  main();
}

// Service worker registration (silent failure if SW not supported / not served from same origin)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(err => {
      console.warn("SW registration failed:", err);
    });
  });
}
</script>
