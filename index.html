<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>cradle</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a1a1a">
<style>
  /* ---------- base ---------- */
  :root {
    --accent: #444;
    --bg: #fff;
    --fg: #1a1a1a;
    --fg-muted: #666;
    --fg-faint: #999;
    --rule: rgba(0,0,0,0.1);
    --tag-bg: rgba(0,0,0,0.06);
    --banner-bg: #fef3c7;
    --banner-fg: #78350f;
    --banner-border: #fbbf24;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-serif: Georgia, "Times New Roman", serif;
    --maxw: 640px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--fg);
    line-height: 1.55;
    -webkit-text-size-adjust: 100%;
  }
  main {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 1.5rem 1.25rem 3rem;
  }

  /* ---------- menu renderer styles — single source: ext/menu/templates.css ---------- */
  /* @build:menu-templates:start */
/* Menu template visuals — the SINGLE SOURCE for how a rendered menu looks.
   Scoped to a `.menu` root so the bootloader render and the editor preview are
   pixel-identical. Inlined into index.html + menu/index.html by build/build.js
   (between @build:menu-templates markers). Edit here, then `npm run build`.

   Each template sets its own palette + fonts via --menu-* custom properties; an
   author's @accent overrides --menu-accent inline (consumer-applied) when present,
   otherwise the template's tasteful default stands. No web fonts (offline). */

.menu {
  --menu-accent: #b1543a;
  --menu-bg: #ffffff;
  --menu-fg: #1f1d1b;
  --menu-fg-muted: #6b655f;
  --menu-fg-faint: #a39c94;
  --menu-rule: rgba(0, 0, 0, 0.12);
  --menu-tag-bg: rgba(0, 0, 0, 0.06);
  --menu-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --menu-serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  --menu-head: var(--menu-sans);
  --menu-name: var(--menu-sans);
  --menu-maxw: 30rem;
  box-sizing: border-box;
  max-width: var(--menu-maxw);
  margin: 0 auto;
  padding: 2rem 1.5rem 3rem;
  background: var(--menu-bg);
  color: var(--menu-fg);
  font-family: var(--menu-sans);
  line-height: 1.55;
  -webkit-text-size-adjust: 100%;
}
.menu * { box-sizing: border-box; }
.menu h1 {
  font-family: var(--menu-head); font-size: 1.7rem; font-weight: 600; line-height: 1.15;
  margin: 0 0 0.35rem; color: var(--menu-accent); letter-spacing: -0.01em;
}
.menu h1 + p { margin-top: 0; color: var(--menu-fg-muted); }   /* the subtitle line */
.menu h2 {
  font-family: var(--menu-sans); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--menu-fg-muted); margin: 2rem 0 0.6rem;
  padding-bottom: 0.35rem; border-bottom: 1px solid var(--menu-rule);
}
.menu p { margin: 0.55rem 0; color: var(--menu-fg); }
.menu p em { color: var(--menu-fg-muted); font-style: italic; }
.menu strong { font-weight: 600; }
.menu a { color: var(--menu-accent); text-decoration: underline; text-underline-offset: 2px; }
.menu hr { border: 0; border-top: 1px solid var(--menu-rule); margin: 1.75rem 0 1rem; }
.menu .item { padding: 0.55rem 0; }   /* leaders + whitespace separate rows, not a full rule */
/* @leaders: off → the pre-leaders look: full-width rule between items, dots hidden (the
   leader span still grows, so name stays left / price right). Placed BEFORE the templates so
   per-template .item overrides — warm's no-rule, card's boxes — still win, faithfully
   restoring the original per-template behaviour. */
.menu.ruled .item { border-bottom: 1px solid var(--menu-rule); }
.menu.ruled .item:last-of-type { border-bottom: none; }
.menu.ruled .leader { border-bottom: none; }
.menu .item-line { display: flex; align-items: baseline; }
.menu .item-name { font-family: var(--menu-name); font-size: 1rem; font-weight: 600; min-width: 0; }
/* dot leaders: an empty flex-grow span whose dotted underline sits on the text
   baseline, filling the gap between name and price the way a printed menu does */
.menu .leader {
  flex: 1 1 auto; min-width: 1.2rem; margin: 0 0.5rem; align-self: baseline;
  border-bottom: 1.5px dotted var(--menu-rule); transform: translateY(-0.18em);
}
.menu .item-desc { font-size: 0.84rem; color: var(--menu-fg-muted); margin-top: 0.12rem; line-height: 1.4; }
.menu .item-price {
  font-size: 0.98rem; font-weight: 600; white-space: nowrap; color: var(--menu-fg);
  font-variant-numeric: tabular-nums; flex-shrink: 0;
}
/* multi-price columns: every price cell is the SAME fixed width (flex-basis, not
   min-width — min-width lets a wide value like R$ 140,00 expand and shove the inner
   column out of line), right-aligned, so item prices line up exactly under the section's
   column headers (taça / garrafa, S / M / L, …). --menu-col-w is tunable per template. */
.menu { --menu-col-w: 5.4rem; }
.menu .item-price.col, .menu .col-h {
  flex: 0 0 var(--menu-col-w); width: var(--menu-col-w); padding-left: 0.7rem; text-align: right;
}
.menu .cols { display: flex; align-items: baseline; margin: 0.05rem 0 0.35rem; }
.menu .col-fill { flex: 1 1 auto; }
.menu .col-h {
  font-size: 0.66rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--menu-fg-faint);
}
.menu .tag {
  display: inline-block; font-size: 0.62rem; font-weight: 600; padding: 0.06rem 0.42rem;
  border-radius: 999px; background: var(--menu-tag-bg); color: var(--menu-fg-muted);
  margin-left: 0.35rem; vertical-align: 1.5px; letter-spacing: 0.03em; text-transform: uppercase;
}
.menu .stale {
  background: #fef3c7; color: #78350f; border: 1px solid #fbbf24;
  padding: 0.7rem 0.9rem; border-radius: 6px; margin-bottom: 1.5rem; font-size: 0.88rem;
}
.menu footer {
  margin-top: 2.25rem; padding-top: 1.1rem; border-top: 1px solid var(--menu-rule);
  font-size: 0.78rem; color: var(--menu-fg-muted);
}
.menu .footer-line { margin: 0.22rem 0; }
.menu .legend {
  display: flex; flex-wrap: wrap; gap: 0.3rem 0.85rem; margin: 0 0 0.85rem;
  font-size: 0.74rem; color: var(--menu-fg-muted);
}
.menu .legend-item { display: inline-flex; align-items: baseline; gap: 0.3rem; }
.menu .legend-item .tag { margin-left: 0; }
.menu .socials { display: flex; gap: 0.55rem; margin: 0.7rem 0; flex-wrap: wrap; }
.menu .socials a {
  display: inline-flex; align-items: center; gap: 0.3rem; text-decoration: none;
  color: var(--menu-fg-muted); padding: 0.3rem 0.6rem; border: 1px solid var(--menu-rule);
  border-radius: 999px; font-size: 0.78rem;
}
.menu .socials a:hover { color: var(--menu-accent); border-color: var(--menu-accent); }
.menu .socials svg { width: 14px; height: 14px; flex-shrink: 0; }
.menu .attribution {
  font-size: 0.68rem; color: var(--menu-fg-faint); text-align: center;
  margin-top: 1.5rem; letter-spacing: 0.04em;
}

/* ============================== templates ============================== */

/* minimal — clean modern sans, white, airy (the base above). */

/* bistro — classic cream paper, elegant serif, centered, dotted dividers */
.menu.tmpl-bistro {
  --menu-bg: #faf5ec; --menu-fg: #2b2620; --menu-fg-muted: #7a6f5f; --menu-fg-faint: #b3a795;
  --menu-rule: rgba(80, 60, 30, 0.2); --menu-tag-bg: rgba(120, 90, 40, 0.12);
  --menu-head: var(--menu-serif); --menu-name: var(--menu-serif); --menu-accent: #9c4724;
}
.menu.tmpl-bistro h1 { font-style: italic; font-size: 2.05rem; text-align: center; }
.menu.tmpl-bistro h1 + p { text-align: center; font-style: italic; }
.menu.tmpl-bistro h2 { border-bottom: none; text-align: center; letter-spacing: 0.22em; }
.menu.tmpl-bistro .item-name { font-size: 1.1rem; font-weight: 500; }

/* serif — editorial / magazine, full serif, larger type */
.menu.tmpl-serif {
  --menu-head: var(--menu-serif); --menu-name: var(--menu-serif); --menu-accent: #1f1d1b;
  font-family: var(--menu-serif);
}
.menu.tmpl-serif h1 { font-size: 2.15rem; font-weight: 600; }
.menu.tmpl-serif h2 { font-family: var(--menu-sans); }
.menu.tmpl-serif .item-price { font-family: var(--menu-sans); }

/* dark — moody bar / izakaya, near-black with a warm amber accent */
.menu.tmpl-dark {
  --menu-bg: #16140f; --menu-fg: #ece7df; --menu-fg-muted: #a59c8e; --menu-fg-faint: #5f594e;
  --menu-rule: rgba(255, 255, 255, 0.14); --menu-tag-bg: rgba(255, 255, 255, 0.1);
  --menu-accent: #e0a458;
}
.menu.tmpl-dark .stale { background: #3a2e0a; color: #fde68a; border-color: #92740f; }

/* warm — cozy bakery / brunch, soft warm paper, friendly, no item rules */
.menu.tmpl-warm {
  --menu-bg: #fdf6f0; --menu-fg: #3a2e28; --menu-fg-muted: #8a7468; --menu-fg-faint: #c2ad9f;
  --menu-rule: rgba(150, 90, 60, 0.16); --menu-tag-bg: rgba(190, 110, 70, 0.13); --menu-accent: #c4683a;
}
.menu.tmpl-warm h1 { font-weight: 700; }
.menu.tmpl-warm h2 { color: var(--menu-accent); border-bottom: none; }
.menu.tmpl-warm .item { border-bottom: none; padding: 0.5rem 0; }

/* noir — fine dining, near-black, gold accent, centered serif, generous */
.menu.tmpl-noir {
  --menu-bg: #0d0d10; --menu-fg: #ece8df; --menu-fg-muted: #9b9384; --menu-fg-faint: #56514a;
  --menu-rule: rgba(200, 180, 140, 0.18); --menu-tag-bg: rgba(200, 180, 140, 0.12);
  --menu-head: var(--menu-serif); --menu-name: var(--menu-serif); --menu-accent: #c8a96a;
  padding-top: 2.5rem;
}
.menu.tmpl-noir h1 { font-size: 2rem; text-align: center; letter-spacing: 0.02em; }
.menu.tmpl-noir h1 + p { text-align: center; }
.menu.tmpl-noir h2 { text-align: center; border-bottom: none; color: var(--menu-accent);
  letter-spacing: 0.26em; font-weight: 600; }
.menu.tmpl-noir .item-name { font-weight: 500; }
.menu.tmpl-noir .stale { background: #2a230f; color: #f0d9a0; border-color: #6b5519; }

/* newsprint — broadsheet, off-white paper, heavy serif, ruled headings */
.menu.tmpl-newsprint {
  --menu-bg: #f3f0e7; --menu-fg: #1a1814; --menu-fg-muted: #5c554a; --menu-fg-faint: #9a9283;
  --menu-rule: rgba(0, 0, 0, 0.28); --menu-tag-bg: rgba(0, 0, 0, 0.08);
  --menu-head: var(--menu-serif); --menu-name: var(--menu-serif); --menu-accent: #1a1814;
  font-family: var(--menu-serif);
}
.menu.tmpl-newsprint h1 { font-size: 2.3rem; font-weight: 700; text-align: center;
  border-bottom: 3px double var(--menu-rule); padding-bottom: 0.35rem; }
.menu.tmpl-newsprint h1 + p { text-align: center; }
.menu.tmpl-newsprint h2 { font-family: var(--menu-serif); font-weight: 700; text-align: center;
  letter-spacing: 0.05em; border-top: 1px solid var(--menu-rule); border-bottom: 1px solid var(--menu-rule);
  padding: 0.3rem 0; }
.menu.tmpl-newsprint .item-price { font-family: var(--menu-serif); }

/* card — modern app / trendy café, soft grey page, white item cards */
.menu.tmpl-card {
  --menu-bg: #eef0f3; --menu-fg: #1d2530; --menu-fg-muted: #6a7280; --menu-fg-faint: #aab2bd;
  --menu-rule: rgba(0, 0, 0, 0.07); --menu-tag-bg: rgba(0, 0, 0, 0.05); --menu-accent: #3b6ea5;
}
.menu.tmpl-card h2 { border-bottom: none; color: var(--menu-accent); }
.menu.tmpl-card .item { background: #fff; border-bottom: none; border-radius: 10px;
  padding: 0.7rem 0.85rem; margin: 0 0 0.45rem; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06); }
.menu.tmpl-card .item-price { color: var(--menu-accent); }

/* ============================== print ============================== */
/* a clean, ink-friendly menu on paper: white background, dark text, no QR-source
   line, sections/items kept whole across page breaks. Applies to the bootloader
   render directly; the editor adds its own @media print to hide the chrome. */
@media print {
  .menu { max-width: none; margin: 0; padding: 1cm; }   /* fill the page, drop card chrome */
  /* ink-friendly paper: white bg + dark ink (the accent stays colored). A `.keep-color`
     menu opts OUT → its full template palette prints (colour printing / branded export).
     !important so these beat the more-specific .menu.tmpl-<x> palette (e.g. dark/noir set
     a light --menu-fg that would be invisible on the forced white background). */
  .menu:not(.keep-color) {
    background: #fff !important;
    --menu-fg: #1a1a1a !important; --menu-fg-muted: #555 !important; --menu-fg-faint: #999 !important;
    --menu-rule: rgba(0, 0, 0, 0.2) !important; --menu-tag-bg: rgba(0, 0, 0, 0.06) !important;
  }
  .menu:not(.keep-color) a { color: inherit; text-decoration: none; }
  .menu:not(.keep-color) .item { background: none !important; box-shadow: none !important; }
  .menu .attribution { display: none; }   /* the QR-source line — never on paper */
  .menu .item, .menu h2 { break-inside: avoid; }
  .menu h2 { break-after: avoid; }
}
  /* @build:menu-templates:end */

  /* ---------- contact renderer styles — single source: ext/contact/templates.css ---------- */
  /* @build:contact-templates:start */
/* Contact (vCard hub) visuals — the SINGLE SOURCE for how a contact card looks.
   Scoped to a `.contact` root so the bootloader render and the editor preview are
   pixel-identical. Inlined into index.html + contact/index.html by build/build.js
   (between @build:contact-templates markers). Edit here, then `npm run build`.

   Each template sets its palette via --contact-* custom properties; an author's
   @accent overrides --contact-accent inline (consumer-applied). No web fonts. */

.contact {
  --contact-accent: #3b6ea5;
  --contact-bg: #ffffff;
  --contact-fg: #1d2530;
  --contact-fg-muted: #6a7280;
  --contact-fg-faint: #aab2bd;
  --contact-rule: rgba(0, 0, 0, 0.12);
  --contact-btn-bg: #ffffff;
  --contact-avatar-fg: #ffffff;
  --contact-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  box-sizing: border-box;
  max-width: 26rem;
  margin: 0 auto;
  padding: 2.75rem 1.5rem 3rem;
  background: var(--contact-bg);
  color: var(--contact-fg);
  font-family: var(--contact-sans);
  line-height: 1.5;
  text-align: center;
  -webkit-text-size-adjust: 100%;
}
.contact * { box-sizing: border-box; }
.contact-avatar {
  width: 92px; height: 92px; border-radius: 50%; margin: 0 auto 1.1rem;
  display: flex; align-items: center; justify-content: center;
  background: var(--contact-accent); color: var(--contact-avatar-fg);
  font-size: 2.2rem; font-weight: 600; line-height: 1; overflow: hidden;
}
.contact-name { font-size: 1.6rem; font-weight: 700; margin: 0 0 0.25rem; letter-spacing: -0.01em; }
.contact-tagline { color: var(--contact-fg-muted); margin: 0; font-size: 1rem; }
.contact-bio { color: var(--contact-fg); margin: 0.9rem 0 0; font-size: 0.94rem; }
.contact-bio:first-of-type { margin-top: 1rem; }
.contact a { color: var(--contact-accent); }

.contact-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin: 1.6rem 0 0; }
@media (min-width: 360px) { .contact-actions { grid-template-columns: 1fr 1fr 1fr; } }
.contact-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.32rem;
  min-height: 76px; padding: 0.7rem 0.4rem; text-decoration: none;
  border: 1px solid var(--contact-rule); border-radius: 12px;
  background: var(--contact-btn-bg); color: var(--contact-fg);
  font-size: 0.82rem; font-weight: 500;
  transition: border-color 0.15s, transform 0.05s;
}
.contact-btn:hover, .contact-btn:focus-visible { border-color: var(--contact-accent); outline: none; }
.contact-btn:active { transform: scale(0.98); }
.contact-btn-emoji { font-size: 1.45rem; line-height: 1; }

.contact-socials { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.6rem; margin: 1.3rem 0 0; }
.contact-social {
  display: inline-flex; width: 42px; height: 42px; align-items: center; justify-content: center;
  border: 1px solid var(--contact-rule); border-radius: 50%;
  color: var(--contact-fg-muted); text-decoration: none; transition: color 0.15s, border-color 0.15s;
}
.contact-social:hover { color: var(--contact-accent); border-color: var(--contact-accent); }
.contact-social svg { width: 18px; height: 18px; }

.contact-save {
  display: block; width: 100%; margin: 1.6rem 0 0; padding: 0.9rem 1rem; border-radius: 11px;
  background: var(--contact-accent); color: #fff; text-decoration: none;
  font-size: 1rem; font-weight: 600; text-align: center;
  transition: transform 0.05s, filter 0.15s;
}
.contact-save:hover { filter: brightness(1.06); }
.contact-save:active { transform: scale(0.99); }

.contact .attribution {
  margin-top: 1.75rem; font-size: 0.68rem; color: var(--contact-fg-faint);
  letter-spacing: 0.04em; text-align: center;
}

/* ============================== templates ============================== */

/* minimal — clean light card with a blue accent (the base above). */

/* dark — near-black, soft on the eyes, light accent */
.contact.tmpl-dark {
  --contact-bg: #15171c; --contact-fg: #e8eaed; --contact-fg-muted: #9aa0aa; --contact-fg-faint: #5a606b;
  --contact-rule: rgba(255, 255, 255, 0.14); --contact-btn-bg: rgba(255, 255, 255, 0.03);
  --contact-accent: #6ea8e0; --contact-avatar-fg: #15171c;
}

/* bold — warm accent, rounded-square avatar, accent name */
.contact.tmpl-bold {
  --contact-accent: #e0533b;
}
.contact.tmpl-bold .contact-avatar { border-radius: 20px; }
.contact.tmpl-bold .contact-name { color: var(--contact-accent); }

/* mono — typographic, monochrome, square avatar, no accent fill */
.contact.tmpl-mono {
  --contact-accent: #1a1a1a;
  --contact-avatar-fg: #1a1a1a;
}
.contact.tmpl-mono .contact-avatar {
  background: none; border: 2px solid var(--contact-fg); border-radius: 0;
}
.contact.tmpl-mono .contact-save { background: var(--contact-fg); }

/* ============================== print ============================== */
@media print {
  .contact { max-width: none; }
  .contact .attribution, .contact-save { display: none; }   /* not useful on paper */
  .contact-btn { break-inside: avoid; }
}
  /* @build:contact-templates:end */

  /* ---------- bio (link hub) styles — single source: ext/bio/templates.css ---------- */
  /* @build:bio-templates:start */
/* bio ("link in bio" hub) visuals — the SINGLE SOURCE for how a bio hub looks.
   Scoped to a `.bio` root so the bootloader render and the editor preview are
   pixel-identical. Inlined into index.html + bio/index.html by build/build.js
   (between @build:bio-templates markers). Edit here, then `npm run build`.

   Templates set their palette via --bio-* props; @accent overrides --bio-accent
   inline; @font swaps --bio-sans via a .font-* class (consumer-applied). No web
   fonts — only system stacks (offline). */

.bio {
  --bio-accent: #1a1a1a;
  --bio-bg: #ffffff;
  --bio-fg: #14181d;
  --bio-fg-muted: #6a7280;
  --bio-fg-faint: #aab2bd;
  --bio-rule: rgba(0, 0, 0, 0.14);
  --bio-link-bg: #ffffff;
  --bio-avatar-fg: #ffffff;
  --bio-radius: 12px;
  --bio-border: 1px;
  --bio-shadow: none;
  --bio-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --bio-mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
  --bio-serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  box-sizing: border-box;
  max-width: 26rem;
  margin: 0 auto;
  padding: 2.75rem 1.4rem 3rem;
  background: var(--bio-bg);
  color: var(--bio-fg);
  font-family: var(--bio-sans);
  line-height: 1.5;
  text-align: center;
  -webkit-text-size-adjust: 100%;
}
.bio * { box-sizing: border-box; }
.bio.font-mono { --bio-sans: var(--bio-mono); }
.bio.font-serif { --bio-sans: var(--bio-serif); }

.bio-avatar {
  width: 88px; height: 88px; border-radius: 50%; margin: 0 auto 1rem;
  display: flex; align-items: center; justify-content: center;
  background: var(--bio-accent); color: var(--bio-avatar-fg);
  font-size: 2.1rem; font-weight: 700; line-height: 1; overflow: hidden;
}
.bio-avatar.has-face { background: #fff; }
/* @avatarshape — explicit override of the template default (!important to win over
   per-template avatar radius like brutal/mono's square or bold's rounded). */
.bio-avatar.shape-circle { border-radius: 50% !important; }
.bio-avatar.shape-rounded { border-radius: 22% !important; }
.bio-avatar.shape-square { border-radius: 0 !important; }
.bio-avatar.sz-sm { width: 64px; height: 64px; font-size: 1.5rem; }
.bio-avatar.sz-lg { width: 124px; height: 124px; font-size: 3rem; }
.bio-avatar.sz-xl { width: 168px; height: 168px; font-size: 4rem; margin-bottom: 1.2rem; }
.bio-face { width: 100%; height: 100%; object-fit: cover; display: block;
  image-rendering: pixelated; image-rendering: crisp-edges; }
.bio-name { font-size: 1.55rem; font-weight: 700; margin: 0 0 0.2rem; letter-spacing: -0.01em; }
.bio-tagline { color: var(--bio-fg-muted); margin: 0; font-size: 0.98rem; }
.bio-note { color: var(--bio-fg); margin: 0.8rem 0 0; font-size: 0.9rem; }

/* one-tap action buttons (shared mechanism with contact) */
.bio-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; margin: 1.5rem 0 0; }
@media (min-width: 360px) { .bio-actions { grid-template-columns: repeat(4, 1fr); } }
.bio-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.3rem;
  min-height: 68px; padding: 0.6rem 0.3rem; text-decoration: none;
  border: var(--bio-border) solid var(--bio-rule); border-radius: var(--bio-radius);
  background: var(--bio-link-bg); color: var(--bio-fg); box-shadow: var(--bio-shadow);
  font-size: 0.74rem; font-weight: 600;
  transition: border-color 0.12s, transform 0.05s;
}
.bio-btn:hover, .bio-btn:focus-visible { border-color: var(--bio-accent); outline: none; }
.bio-btn:active { transform: translate(1px, 1px); }
.bio-btn-emoji { font-size: 1.3rem; line-height: 1; }

/* the link rows — bio's headline */
.bio-links { display: flex; flex-direction: column; gap: 0.55rem; margin: 1.4rem 0 0; }
.bio-section { text-align: left; font: 700 0.64rem var(--bio-mono); letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--bio-fg-faint); margin: 0.7rem 0 -0.1rem; padding: 0 0.15rem; }
.bio-section:first-child { margin-top: 0; }
.bio-link {
  display: flex; align-items: center; gap: 0.85rem; text-align: left; width: 100%;
  padding: 0.8rem 0.95rem; text-decoration: none; font: inherit; cursor: pointer;
  border: var(--bio-border) solid var(--bio-rule); border-radius: var(--bio-radius);
  background: var(--bio-link-bg); color: var(--bio-fg); box-shadow: var(--bio-shadow);
  transition: border-color 0.12s, transform 0.05s, background 0.12s;
}
.bio-link:hover, .bio-link:focus-visible { border-color: var(--bio-accent); outline: none; }
.bio-link:active { transform: translate(1px, 1px); }
/* featured (highlighted) row — accent-flooded */
.bio-link.featured { background: var(--bio-accent); border-color: var(--bio-accent); color: var(--bio-avatar-fg); }
.bio-link.featured .bio-link-icon, .bio-link.featured .bio-link-go { color: var(--bio-avatar-fg); }
.bio-link.featured .bio-link-sub { color: var(--bio-avatar-fg); opacity: 0.8; }
.bio-link-icon { flex: 0 0 auto; width: 22px; height: 22px; color: var(--bio-accent); display: inline-flex;
  align-items: center; justify-content: center; font-size: 1.15rem; line-height: 1; }
.bio-link-icon svg { width: 22px; height: 22px; }
.bio-link-text { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; }
.bio-link-label { font-weight: 600; font-size: 0.96rem; }
.bio-link-sub { font-size: 0.78rem; color: var(--bio-fg-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bio-link-go { flex: 0 0 auto; color: var(--bio-fg-faint); font-size: 1rem; }

/* small social-icon row (shared with contact) */
.bio-socials { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.55rem; margin: 1.2rem 0 0; }
.bio-social {
  display: inline-flex; width: 40px; height: 40px; align-items: center; justify-content: center;
  border: var(--bio-border) solid var(--bio-rule); border-radius: 50%;
  color: var(--bio-fg-muted); text-decoration: none; transition: color 0.12s, border-color 0.12s;
}
.bio-social:hover { color: var(--bio-accent); border-color: var(--bio-accent); }
.bio-social svg { width: 17px; height: 17px; }

.bio .attribution {
  margin-top: 1.7rem; font-size: 0.66rem; color: var(--bio-fg-faint);
  letter-spacing: 0.04em; text-align: center;
}

/* ============================== templates ============================== */

/* minimal — clean light, monochrome accent (the base above). */

/* brutal — raw, high-contrast, hard edges + a hard offset shadow. The byte-cheap,
   intentional look: thick borders, no radius, monospace. */
.bio.tmpl-brutal {
  --bio-accent: #111111; --bio-rule: #111111; --bio-radius: 0px; --bio-border: 2.5px;
  --bio-shadow: 4px 4px 0 #111111; --bio-sans: var(--bio-mono); --bio-avatar-fg: #ffffff;
}
.bio.tmpl-brutal .bio-avatar { border-radius: 0; border: 2.5px solid #111; }
.bio.tmpl-brutal .bio-name { text-transform: uppercase; letter-spacing: 0.01em; }
.bio.tmpl-brutal .bio-link-go { color: var(--bio-accent); }

/* dark — near-black, light accent */
.bio.tmpl-dark {
  --bio-bg: #14161b; --bio-fg: #e8eaed; --bio-fg-muted: #9aa0aa; --bio-fg-faint: #565c66;
  --bio-rule: rgba(255, 255, 255, 0.16); --bio-link-bg: rgba(255, 255, 255, 0.03);
  --bio-accent: #6ea8e0; --bio-avatar-fg: #14161b;
}

/* bold — warm accent flooded into the avatar + link hover */
.bio.tmpl-bold {
  --bio-accent: #e0533b;
}
.bio.tmpl-bold .bio-avatar { border-radius: 20px; }
.bio.tmpl-bold .bio-name { color: var(--bio-accent); }
.bio.tmpl-bold .bio-link:hover { background: var(--bio-accent); color: #fff; }
.bio.tmpl-bold .bio-link:hover .bio-link-icon, .bio.tmpl-bold .bio-link:hover .bio-link-go,
.bio.tmpl-bold .bio-link:hover .bio-link-sub { color: #fff; }

/* mono — typographic, monochrome, square avatar */
.bio.tmpl-mono {
  --bio-accent: #1a1a1a; --bio-avatar-fg: #1a1a1a; --bio-sans: var(--bio-mono); --bio-radius: 4px;
}
.bio.tmpl-mono .bio-avatar { background: none; border: 2px solid var(--bio-fg); border-radius: 0; }

/* ===== @bg surface modifiers (consumer-applied via bioApplyBg) ===== */
/* fill mode on a dark @bg: the card is transparent, so flip text + rules to light. */
.bio.on-dark {
  --bio-fg: #f3f5f8; --bio-fg-muted: #c6ccd6; --bio-fg-faint: #8a93a3;
  --bio-rule: rgba(255, 255, 255, 0.22); --bio-link-bg: rgba(255, 255, 255, 0.08);
}
/* @card mode: the bg floods the stage; the content floats as a card (keeps its
   template surface) centered on it. */
.bio.floating {
  margin: 1.5rem auto; border-radius: 24px; box-shadow: 0 14px 50px rgba(0, 0, 0, 0.28);
}

/* ===== @fx effects (consumer-wired via bioApplyFx) =====
   The engine drives --fx-x / --fx-y in [-1,1] from tilt / pointer / idle drift. */
.bio { --fx-x: 0; --fx-y: 0; }

/* holo — a rainbow foil + a moving glare that sweep as the card tilts. */
.bio.fx-holo { position: relative; isolation: isolate; }
.bio.fx-holo::before, .bio.fx-holo::after {
  content: ""; position: absolute; inset: 0; pointer-events: none; border-radius: inherit; z-index: 6;
}
.bio.fx-holo::after {
  background: repeating-linear-gradient(115deg,
    hsla(330, 100%, 60%, 0.16) 0%, hsla(50, 100%, 60%, 0.16) 10%, hsla(160, 100%, 55%, 0.16) 20%,
    hsla(200, 100%, 60%, 0.16) 30%, hsla(280, 100%, 65%, 0.16) 40%, hsla(330, 100%, 60%, 0.16) 50%);
  background-size: 300% 300%;
  background-position: calc(50% + var(--fx-x) * 80%) calc(50% + var(--fx-y) * 80%);
  mix-blend-mode: color-dodge; opacity: 0.55;
}
.bio.fx-holo::before {
  background: radial-gradient(60% 60% at calc(50% + var(--fx-x) * 50%) calc(50% + var(--fx-y) * 50%),
    rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0) 60%);
  mix-blend-mode: soft-light; opacity: 0.85;
}

/* tilt — the card pitches/rolls toward the input (best with @card). */
.bio.fx-tilt {
  transform: perspective(900px) rotateY(calc(var(--fx-x) * 7deg)) rotateX(calc(var(--fx-y) * -7deg));
  transform-style: preserve-3d; will-change: transform;
}

/* shine — a specular highlight glides over featured rows + the avatar. */
.bio.fx-shine .bio-link.featured { position: relative; overflow: hidden; }
.bio.fx-shine .bio-link.featured::after, .bio.fx-shine .bio-avatar::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(120px circle at calc(50% + var(--fx-x) * 45%) calc(50% + var(--fx-y) * 45%),
    rgba(255, 255, 255, 0.5), transparent 60%);
  mix-blend-mode: soft-light; opacity: 0.85;
}

/* living — the @bg surface drifts/breathes on its own (no input needed). */
.fx-living-stage { animation: bioFxDrift 16s linear infinite; }
@keyframes bioFxDrift { from { background-position: 0% 50%; } to { background-position: 200% 50%; } }

@media (prefers-reduced-motion: reduce) {
  .bio.fx-tilt { transform: none; }
  .fx-living-stage { animation: none; }
}

/* ============================== print ============================== */
@media print {
  .bio { max-width: none; }
  .bio.floating { box-shadow: none; margin: 0 auto; }
  .bio .attribution { display: none; }
  .bio-link, .bio-btn { break-inside: avoid; box-shadow: none; }
}

  /* ---------- recipe styles — single source: ext/recipe/templates.css ---------- */
  /* @build:recipe-templates:start */
/* Recipe visuals — the SINGLE SOURCE for how a recipe renders. Scoped to a `.recipe`
   root so the bootloader render and the (future) editor preview are pixel-identical.
   Inlined into index.html by build/build.js (between @build:recipe-templates markers).
   Edit here, then `npm run build`.

   Each template sets its palette via --recipe-* custom properties; an author's @accent
   overrides --recipe-accent inline (consumer-applied). No web fonts. */

.recipe {
  --recipe-accent: #6b4423;
  --recipe-bg: #ffffff;
  --recipe-fg: #23201c;
  --recipe-muted: #6f6a63;
  --recipe-faint: #a8a29a;
  --recipe-rule: rgba(0, 0, 0, 0.1);
  --recipe-panel: #f7f5f1;
  --recipe-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --recipe-serif: Georgia, "Times New Roman", serif;
  --recipe-font: var(--recipe-sans);
  box-sizing: border-box;
  max-width: 38rem;
  margin: 0 auto;
  padding: 1.75rem 1.25rem 3rem;
  background: var(--recipe-bg);
  color: var(--recipe-fg);
  font-family: var(--recipe-font);
  line-height: 1.55;
  -webkit-text-size-adjust: 100%;
}
.recipe * { box-sizing: border-box; }
.recipe a { color: var(--recipe-accent); }

/* ---- header ---- */
.recipe-head { border-bottom: 1px solid var(--recipe-rule); padding-bottom: 1.1rem; margin-bottom: 1.3rem; }
.recipe-title { font-size: 1.85rem; line-height: 1.15; margin: 0 0 0.5rem; letter-spacing: -0.01em; }
.recipe-meta { display: flex; flex-wrap: wrap; gap: 0.4rem 1rem; color: var(--recipe-muted); font-size: 0.86rem; margin-bottom: 0.9rem; }
.recipe-serves {
  display: inline-flex; align-items: center; gap: 0.1rem;
  border: 1px solid var(--recipe-rule); border-radius: 999px; padding: 0.15rem 0.35rem; margin: 0.2rem 0.6rem 0.2rem 0; vertical-align: middle;
}
.serves-btn {
  font: inherit; font-size: 1.1rem; line-height: 1; width: 1.9rem; height: 1.9rem; border-radius: 50%;
  border: none; background: none; color: var(--recipe-accent); cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
}
.serves-btn:hover { background: var(--recipe-panel); }
.serves-label { font-size: 0.92rem; padding: 0 0.55rem; white-space: nowrap; }
.serves-label b { font-variant-numeric: tabular-nums; }
.serves-reset {
  font: inherit; font-size: 0.78rem; margin-left: 0.2rem; padding: 0.2rem 0.5rem; border-radius: 999px;
  border: 1px solid var(--recipe-rule); background: none; color: var(--recipe-muted); cursor: pointer;
}
.recipe-cook {
  font: inherit; font-size: 0.82rem; padding: 0.35rem 0.8rem; border-radius: 999px; vertical-align: middle;
  border: 1px solid var(--recipe-rule); background: none; color: var(--recipe-fg); cursor: pointer;
}
.recipe-cook:hover, .recipe-cook.on { border-color: var(--recipe-accent); color: var(--recipe-accent); }

/* ---- sections / notes ---- */
.recipe-section { font-size: 1.1rem; margin: 1.8rem 0 0.7rem; color: var(--recipe-accent); letter-spacing: 0.01em; }
.recipe-note { color: var(--recipe-fg); margin: 0.9rem 0; }
.recipe hr { border: none; border-top: 1px solid var(--recipe-rule); margin: 1.6rem 0; }

/* ---- ingredients ---- */
.recipe-ings { list-style: none; padding: 0; margin: 0.4rem 0 1.2rem; }
.ing {
  display: flex; gap: 0.5rem; padding: 0.4rem 0.2rem 0.4rem 1.6rem; position: relative;
  border-bottom: 1px solid var(--recipe-rule); cursor: pointer;
}
.ing:last-child { border-bottom: none; }
.ing::before {
  content: ""; position: absolute; left: 0; top: 0.7rem; width: 0.85rem; height: 0.85rem;
  border: 1.5px solid var(--recipe-faint); border-radius: 4px; transition: background 0.12s, border-color 0.12s;
}
.ing.done::before { background: var(--recipe-accent); border-color: var(--recipe-accent); }
.ing.done { color: var(--recipe-faint); }
.ing.done .ing-item { text-decoration: line-through; }
.ing-amt { font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
.ing-item { color: inherit; }

/* ---- steps ---- */
.recipe-steps { list-style: none; padding: 0; margin: 0.4rem 0 1.2rem; counter-reset: step; }
.step {
  display: flex; gap: 0.8rem; padding: 0.7rem 0; align-items: baseline;
  border-bottom: 1px solid var(--recipe-rule); cursor: pointer;
}
.step:last-child { border-bottom: none; }
.step-check {
  counter-increment: step; flex: 0 0 1.7rem; width: 1.7rem; height: 1.7rem; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center; align-self: flex-start;
  background: var(--recipe-panel); color: var(--recipe-accent); font-size: 0.85rem; font-weight: 700;
  font-variant-numeric: tabular-nums; transition: background 0.12s, color 0.12s;
}
.step-check::before { content: counter(step); }
.step.done .step-check { background: var(--recipe-accent); color: #fff; }
.step.done .step-check::before { content: "✓"; }
.step.done .step-body { color: var(--recipe-faint); text-decoration: line-through; }
.step-body { flex: 1; }

/* ---- timer chips ---- */
.recipe-timer {
  font: inherit; font-size: 0.86rem; display: inline-flex; align-items: center; gap: 0.25rem; vertical-align: baseline;
  padding: 0.1rem 0.5rem; margin: 0 0.1rem; border-radius: 999px; cursor: pointer;
  border: 1px solid var(--recipe-accent); background: none; color: var(--recipe-accent); font-variant-numeric: tabular-nums;
}
.recipe-timer:hover { background: var(--recipe-panel); }
.recipe-timer.running { background: var(--recipe-accent); color: #fff; }
.recipe-timer.done { border-color: var(--recipe-faint); color: var(--recipe-faint); animation: recipe-flash 0.5s ease 3; }
@keyframes recipe-flash { 50% { background: var(--recipe-accent); color: #fff; } }
@media (prefers-reduced-motion: reduce) { .recipe-timer.done { animation: none; } }

/* ---- footer ---- */
.recipe-foot { margin-top: 2rem; padding-top: 1.1rem; border-top: 1px solid var(--recipe-rule); font-size: 0.85rem; color: var(--recipe-muted); }
.recipe-source { font-weight: 600; text-decoration: none; }
.recipe-socials { display: flex; flex-wrap: wrap; gap: 0.4rem 1rem; margin-top: 0.5rem; }
.recipe-socials a { text-decoration: none; }
.recipe .attribution { margin-top: 0.8rem; color: var(--recipe-faint); font-size: 0.74rem; }

/* ---- cook mode: bigger, calmer, across-the-counter ---- */
.recipe.cook { max-width: 44rem; font-size: 1.18rem; }
.recipe.cook .step { padding: 1rem 0; }
.recipe.cook .recipe-meta, .recipe.cook .recipe-foot { display: none; }

/* ================= templates ================= */
.recipe.tmpl-card { --recipe-bg: #ffffff; }
.recipe.tmpl-card .recipe-body { }

.recipe.tmpl-paper {
  --recipe-accent: #8a5a2b; --recipe-bg: #fbf7ee; --recipe-fg: #312a20; --recipe-panel: #f0e8d8;

    payloadStart = us + 1;
  }
  const payload = body.slice(payloadStart);
  const raw = base45Decode(payload);
  return inflateByCodec(codec, raw, dicts);
}

function compactCodec(c) {
  if (c === "r") return "raw";
  if (c === "d") return "deflate";
  if (c === "b") return "brotli";
  throw new Error("EUNSUPPORTEDCODEC: unknown compact codec char '" + c + "'");
}

function inflateByCodec(codec, raw, dicts) {
  if (codec === "raw") return raw;
  if (codec === "deflate") return pako.inflateRaw(raw);
  if (codec === "brotli") throw new Error("EUNSUPPORTEDCODEC: brotli not implemented in this build");
  if (codec.startsWith("deflate-dict.")) {
    const dictId = codec.slice("deflate-dict.".length);
    const dict = dicts[dictId];
    if (!dict) throw new Error("EUNSUPPORTEDCODEC: unknown dict-id '" + dictId + "'");
    const dictBytes = new TextEncoder().encode(dict);
    return pako.inflateRaw(raw, { dictionary: dictBytes });
  }
  throw new Error("EUNSUPPORTEDCODEC: " + codec);
}

// Reverse the §6.4.1 URL-fragment escaping for q: capsules. A single
// left-to-right pass that recognizes exactly the two triplets the producer
// introduces (%25 -> %, %20 -> space) and copies every other character
// verbatim. Per SPEC-capsule §6.4.1 a conformant decoder MUST NOT use
// decodeURIComponent: that would also decode fragment-legal triplets a raw
// base45 payload may contain literally (e.g. a literal "%20" encodes to
// "%2520" and must round-trip back to "%20", not to a space).
function fragmentDecode(s) {
  let out = "";
  for (let i = 0; i < s.length; i++) {
    if (s[i] === "%" && i + 2 < s.length) {
      const t = s.slice(i, i + 3);
      if (t === "%25") { out += "%"; i += 2; continue; }
      if (t === "%20") { out += " "; i += 2; continue; }
    }
    out += s[i];
  }
  return out;
}

function resolveCapsule(capsule, dicts) {
  const colonIdx = capsule.indexOf(":");
  if (colonIdx < 0) throw new Error("EBADCAPSULE: missing scheme separator");
  const scheme = capsule.slice(0, colonIdx);
  const body = capsule.slice(colonIdx + 1);
  switch (scheme) {
    case "inline": return parseInline(body, dicts);
    case "i":      return parseI(body, dicts);
    case "q":      return parseQ(body, dicts);
    default:       throw new Error("EUNKNOWN-SCHEME: " + scheme);
  }
}

// @build:inline:start  (generated from ext/shared/inline.js — do not hand-edit)
// Shared safe-inline text core: escapeHtml + renderInline. Single source for the
// bootloader and every editor (inlined by build/build.js between @build:inline
// markers). The substrate the field-shaped renderers — menu, contact, bio, recipe —
// use for all text fields.
//
// Security invariant: escape-first-then-decorate. Author text is HTML-escaped BEFORE
// any markup, and only a fixed set of tags is inserted, so a parser slip degrades
// formatting, never injects. The one author-controlled attribute — a link href — is
// scheme-allowlisted to https/http/mailto/tel (or an in-page #anchor); anything else
// (javascript:, data:, vbscript:, or tab/newline-obfuscated schemes a browser would
// still run) renders as plain text. Mirrors doc's reviewed link policy (SPEC-doc §3.3,
// SPEC-recipe §3.2). Kept as two self-contained function declarations (no module-level
// helpers) so each host inlines them verbatim and the tests extract them by name.
// Edit here, then `npm run build`.
function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function renderInline(text) {
  let s = escapeHtml(text);
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
    // url is already HTML-escaped → it can't break the attribute or inject a tag. Detect the
    // scheme as a browser would (ignore leading ASCII control/space chars, so java\tscript:
    // can't slip past a naive check); allow the allowlist or an in-page #anchor; a schemeless
    // /relative target is safe (no scheme to abuse); anything else drops to plain text.
    const probe = url.replace(/[\x00-\x20]+/g, "");
    const scheme = probe.match(/^[a-z][a-z0-9+.-]*:/i);
    const ok = probe.charAt(0) === "#" || !scheme || /^(https?|mailto|tel):/i.test(probe);
    return ok ? `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>` : label;
  });
  return s;
}
// @build:inline:end

function formatMoney(value, locale) {
  const num = parseFloat(value);
  if (isNaN(num)) return value;
  if (locale === "pt-BR") return "R$ " + num.toFixed(2).replace(".", ",");
  return "$" + num.toFixed(2);
}
function formatPrice(price, locale) {
  const m = String(price == null ? "" : price).match(/^(\d+(?:\.\d+)?)(\/(?:kg|un))?$/);
  if (!m) return price;
  return formatMoney(m[1], locale) + (m[2] || "");
}
// multi-price: "18/78" → ["R$ 18,00","R$ 78,00"]; an empty token ("/140") → "" (skip that
// column). Returns null for a single price or a unit suffix ("34/kg"), which formatPrice owns.
function splitPrices(price, locale) {
  const raw = String(price == null ? "" : price);
  if (!raw.includes("/")) return null;
  const toks = raw.split("/");
  if (toks.length === 2 && /^(kg|un)$/.test(toks[1].trim())) return null;
  return toks.map(t => t.trim() === "" ? "" : formatMoney(t.trim(), locale));
}
function formatDate(iso, locale) {
  try {
    const d = new Date(iso + "T12:00:00");
    if (isNaN(d)) return iso;
    return new Intl.DateTimeFormat(locale, { day: "numeric", month: "long", year: "numeric" }).format(d);
  } catch { return iso; }
}

function parseMenuBody(body) {
  const lines = body.split("\n");
  const directives = {};
  const blocks = [];
  let inDirective = true;
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { inDirective = false; continue; }
    if (inDirective && line.startsWith("@") && line.includes(":")) {
      const idx = line.indexOf(":");
      directives[line.slice(1, idx).trim()] = line.slice(idx + 1).trim();
      continue;
    }
    inDirective = false;
    if (line === "---") { blocks.push({ type: "hr" }); continue; }
    if (line.startsWith("## ")) {
      // optional price columns: "## Vinhos | taça | garrafa" (h2 parsed before pipe-rows)
      const hp = line.slice(3).split("|").map(s => s.trim());
      blocks.push({ type: "h2", text: hp[0], cols: hp.slice(1).filter(Boolean) });
      continue;
    }
    if (line.startsWith("# ")) { blocks.push({ type: "h1", text: line.slice(2) }); continue; }
    if (line.includes("|")) {
      const parts = line.split("|").map(p => p.trim());
      blocks.push({
        type: "item",
        name: parts[0] || "", price: parts[1] || "", desc: parts[2] || "",
        tags: (parts[3] || "").split(",").map(t => t.trim()).filter(Boolean),
      });
      continue;
    }
    blocks.push({ type: "p", text: line });
  }
  return { directives, blocks };
}

// body text (after the magic line) + locale + an attribution line -> rendered
// menu HTML and the presentation hints the consumer applies.
function renderMenuHTML(body, locale, attribution) {
  const strings = MENU_LOCALES[locale] || MENU_LOCALES["pt-BR"];
  const parsed = parseMenuBody(body);
  const dirs = parsed.directives;
  const parts = [];
  // dot leaders (name ⋯⋯ price) are the default; @leaders: off restores full-width rules
  const leaders = !/^(off|false|no|0)$/i.test(dirs.leaders || "");
  // tag legend: on by default (decodes the v/g/p pills, which have no hover on paper);
  // @legend: off suppresses it. Built below from the tags actually used, in vocab order.
  const legendOn = !/^(off|false|no|0)$/i.test(dirs.legend || "");

  // valid_until: a quiet "valid through X" footer line while current, escalating to a
  // warning banner once expired.
  let validUntilExpired = false, validUntilOk = false;
  if (dirs.valid_until) {
    const expiry = new Date(dirs.valid_until + "T23:59:59");
    if (!isNaN(expiry)) {
      validUntilOk = true;
      validUntilExpired = expiry < new Date();
      if (validUntilExpired) parts.push(`<div class="stale">${escapeHtml(strings.stale(dirs.valid_until))}</div>`);
    }
  }

  for (const b of parsed.blocks) {
    if (b.type === "h1") parts.push(`<h1>${renderInline(b.text)}</h1>`);
    else if (b.type === "h2") {
      parts.push(`<h2>${renderInline(b.text)}</h2>`);
      // a column-header row aligns over the items' price columns below
      if (b.cols && b.cols.length) {
        parts.push(`<div class="cols"><span class="col-fill"></span>` +
          b.cols.map(c => `<span class="col-h">${renderInline(c)}</span>`).join("") + `</div>`);
      }
    }
    else if (b.type === "p") parts.push(`<p>${renderInline(b.text)}</p>`);
    else if (b.type === "hr") parts.push(`<hr>`);
    else if (b.type === "item") {
      const tagsHtml = b.tags
        .filter(t => strings.tags[t])
        .map(t => `<span class="tag" title="${escapeHtml(strings.tags[t])}">${escapeHtml(t)}</span>`)
        .join("");
      // name ⋯⋯ price on one line (dot leaders fill the gap via CSS), description
      // below spanning full width. The leader span only appears when there's a price.
      // A "/"-list price renders as aligned columns (matching the section's headers).
      const cells = splitPrices(b.price, locale);
      let priceHtml = "";
      if (cells) {
        priceHtml = `<span class="leader"></span>` +
          cells.map(c => `<span class="item-price col">${c ? escapeHtml(c) : ""}</span>`).join("");
      } else if (b.price) {
        priceHtml = `<span class="leader"></span><span class="item-price">${escapeHtml(formatPrice(b.price, locale))}</span>`;
      }
      const descHtml = b.desc ? `<div class="item-desc">${renderInline(b.desc)}</div>` : "";
      parts.push(
        `<div class="item">` +
        `<div class="item-line"><span class="item-name">${renderInline(b.name)}${tagsHtml}</span>${priceHtml}</div>` +
        descHtml + `</div>`
      );
    }
  }

  // legend: collect tags actually used (in the locale vocab's order), decode each
  let legendHtml = "";
  if (legendOn) {
    const used = new Set();
    for (const b of parsed.blocks) if (b.type === "item") for (const tg of b.tags) used.add(tg);
    const keys = Object.keys(strings.tags).filter(k => used.has(k));
    if (keys.length) {
      legendHtml = `<div class="legend">` + keys.map(k =>
        `<span class="legend-item"><span class="tag">${escapeHtml(k)}</span> ${escapeHtml(strings.tags[k])}</span>`
      ).join("") + `</div>`;
    }
  }

  const footerLines = [];
  if (dirs.service) footerLines.push(strings.service(dirs.service));
  if (dirs.couvert) footerLines.push(strings.couvert(dirs.couvert));
  // opt-in: the "valid through" line shows only when @valid_show is on (the expiry
  // banner above is always-on regardless — it's a safety guard).
  if (validUntilOk && !validUntilExpired && /^(true|yes|on|1)$/i.test(dirs.valid_show || "")) {
    footerLines.push(strings.validThrough(dirs.valid_until));
  }
  if (dirs.social || footerLines.length || legendHtml) {
    let footer = '<footer>';
    footer += legendHtml;   // dietary key first — closest to the items it decodes
    for (const l of footerLines) footer += `<div class="footer-line">${escapeHtml(l)}</div>`;
    if (dirs.social) {
      footer += '<div class="socials">';
      for (const pair of dirs.social.split(",")) {
        const [prefix, handle] = pair.split("=").map(s => s.trim());
        const def = SOCIAL[prefix];

        }

      footer += '</div>';

    footer += '</footer>';
    parts.push(footer);
  }

function menuRenderer(header, body, ctx) {
  const text = new TextDecoder("utf-8").decode(body);
  const r = renderMenuHTML(text, header.params, "decoded · " + ctx.bootloaderUrl);
  document.documentElement.lang = r.lang;
  // the mount IS the menu root: scope the template CSS to it; override accent only when set
  ctx.mount.className = "menu tmpl-" + r.template + (r.leaders ? "" : " ruled");
  if (r.accent && ctx.mount.style) ctx.mount.style.setProperty("--menu-accent", r.accent);
  ctx.mount.innerHTML = r.html;
  // let the template own the whole page: fill the body with the menu's background
  try {
    document.body.style.padding = "0";
    const bg = getComputedStyle(ctx.mount).backgroundColor;
    if (bg) document.body.style.background = bg;
  } catch (e) { /* headless / no layout */ }
}

const contactDigits = (s) => String(s == null ? "" : s).replace(/[^\d+]/g, "");
const contactUrl = (s) => (/^https?:\/\//i.test(s) ? s : "https://" + s);

function parseContactBody(body) {
  const directives = {};
  const blocks = [];
  let inDirective = true, gotSub = false;
  for (const raw of body.split("\n")) {
    const line = raw.trim();
    if (!line) { inDirective = false; continue; }
    if (inDirective && line.startsWith("@") && line.includes(":")) {
      const i = line.indexOf(":");
      directives[line.slice(1, i).trim()] = line.slice(i + 1).trim();
      continue;
    }
    inDirective = false;
    if (line.startsWith("# ")) { blocks.push({ type: "h1", text: line.slice(2) }); continue; }
    const sm = line.match(/^\*(.+)\*$/);
    if (sm && !gotSub) { blocks.push({ type: "sub", text: sm[1] }); gotSub = true; continue; }
    blocks.push({ type: "p", text: line });
  }
  return { directives, blocks };
}

// vCard 3.0 — the file the OS's add-contact sheet understands (CRLF lines per RFC).
function buildVCard(d, name, tagline) {
  const ve = (s) => String(s == null ? "" : s).replace(/\\/g, "\\\\").replace(/\n/g, "\\n").replace(/,/g, "\\,").replace(/;/g, "\\;");
  const out = ["BEGIN:VCARD", "VERSION:3.0", "FN:" + ve(name), "N:" + ve(name) + ";;;;"];
  if (d.org) out.push("ORG:" + ve(d.org));
  if (d.role || tagline) out.push("TITLE:" + ve(d.role || tagline));
  if (d.tel) out.push("TEL;TYPE=CELL:" + contactDigits(d.tel));
  if (d.wa && contactDigits(d.wa) !== contactDigits(d.tel)) out.push("TEL;TYPE=CELL:" + contactDigits(d.wa));
  if (d.email) out.push("EMAIL;TYPE=INTERNET:" + ve(d.email));
  if (d.site) out.push("URL:" + ve(contactUrl(d.site)));
  if (d.map) out.push("ADR;TYPE=WORK:;;" + ve(d.map) + ";;;;");
  out.push("END:VCARD");
  return out.join("\r\n");
}

function renderContactHTML(body, locale, attribution) {
  const L = CONTACT_LOCALES[locale] || CONTACT_LOCALES["pt-BR"];
  const { directives: d, blocks } = parseContactBody(body);
  const name = (blocks.find((b) => b.type === "h1") || {}).text || "";
  const tagline = (blocks.find((b) => b.type === "sub") || {}).text || "";
  const bio = blocks.filter((b) => b.type === "p").map((b) => `<p class="contact-bio">${renderInline(b.text)}</p>`).join("");

  // avatar: emoji override, else initials from the name
  const initials = name.split(/\s+/).filter(Boolean).slice(0, 2).map((w) => w[0]).join("").toUpperCase();
  const avatar = d.avatar ? escapeHtml(d.avatar) : escapeHtml(initials || "•");

  const btn = (emoji, label, href) =>
    `<a class="contact-btn" href="${escapeHtml(href)}"><span class="contact-btn-emoji">${emoji}</span><span>${escapeHtml(label)}</span></a>`;
  const acts = [];
  if (d.tel) acts.push(btn("📞", L.call, "tel:" + contactDigits(d.tel)));
  if (d.wa) acts.push(btn("💬", L.whatsapp, "https://wa.me/" + contactDigits(d.wa).replace(/^\+/, "")));
  if (d.email) acts.push(btn("✉️", L.email, "mailto:" + d.email));
  if (d.site) acts.push(btn("🌐", L.site, contactUrl(d.site)));
  if (d.map) acts.push(btn("📍", L.directions, "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(d.map)));
  const actionsHtml = acts.length ? `<div class="contact-actions">${acts.join("")}</div>` : "";

  let socialsHtml = "";
  if (d.social) {
    const items = [];
    for (const pair of d.social.split(",")) {
      const [pre, handle] = pair.split("=").map((s) => s.trim());
      const def = CONTACT_SOCIAL[pre];
      if (def && handle) items.push(`<a class="contact-social" href="${escapeHtml(def.url(handle))}" target="_blank" rel="noopener noreferrer" aria-label="${escapeHtml(pre)}">${def.icon}</a>`);
    }
    if (items.length) socialsHtml = `<div class="contact-socials">${items.join("")}</div>`;
  }

  const fname = (name || "contact").replace(/[^\w.-]+/g, "_") || "contact";
  const vcf = buildVCard(d, name, tagline);
  const saveHtml = `<a class="contact-save" download="${escapeHtml(fname)}.vcf" href="data:text/vcard;charset=utf-8,${encodeURIComponent(vcf)}">${escapeHtml(L.save)}</a>`;

  const parts = [
    `<div class="contact-card">`,
    `<div class="contact-avatar">${avatar}</div>`,
    name ? `<h1 class="contact-name">${renderInline(name)}</h1>` : "",
    tagline ? `<p class="contact-tagline">${renderInline(tagline)}</p>` : "",
    bio,
    actionsHtml,
    socialsHtml,
    saveHtml,
    `</div>`,
    attribution ? `<div class="attribution">${escapeHtml(attribution)}</div>` : "",
  ];
  return { html: parts.join(""), template: d.template || "minimal", accent: d.accent || null, lang: locale };
}
// @build:contact-renderer:end

function contactRenderer(header, body, ctx) {
  const text = new TextDecoder("utf-8").decode(body);
  const r = renderContactHTML(text, header.params, "via cradle · " + ctx.bootloaderUrl);
  document.documentElement.lang = r.lang;
  ctx.mount.className = "contact tmpl-" + r.template;
  if (r.accent && ctx.mount.style) ctx.mount.style.setProperty("--contact-accent", r.accent);
  ctx.mount.innerHTML = r.html;
  try {
    document.body.style.padding = "0";
    const bg = getComputedStyle(ctx.mount).backgroundColor;
    if (bg) document.body.style.background = bg;
  } catch (e) { /* headless / no layout */ }
}

function renderBioHTML(body, locale, attribution) {
  const L = BIO_LOCALES[locale] || BIO_LOCALES["pt-BR"];
  const { directives: d, blocks } = parseBioBody(body);
  const name = (blocks.find((b) => b.type === "h1") || {}).text || "";
  const tagline = (blocks.find((b) => b.type === "sub") || {}).text || "";

  const initials = name.split(/\s+/).filter(Boolean).slice(0, 2).map((w) => w[0]).join("").toUpperCase();
  const faceImg = d.face ? bioFaceImg(d.face, bioFacePalette(d.facepal, d.accent)) : null;   // dithered photo wins over emoji/initials
  const avatar = faceImg || (d.avatar ? escapeHtml(d.avatar) : escapeHtml(initials || "•"));
  const sz = { sm: 1, md: 1, lg: 1, xl: 1 }[d.avatarsize] ? d.avatarsize : "md";   // avatar display size
  const shape = d.avatarshape && { circle: 1, rounded: 1, square: 1 }[d.avatarshape.toLowerCase()] ? d.avatarshape.toLowerCase() : "";  // override template default

  const acts = [];
  if (d.tel) acts.push(btn("📞", L.call, "tel:" + bioDigits(d.tel)));
  if (d.wa) acts.push(btn("💬", L.whatsapp, "https://wa.me/" + bioDigits(d.wa).replace(/^\+/, "")));
  if (d.email) acts.push(btn("✉️", L.email, "mailto:" + d.email));
  if (d.site) acts.push(btn("🌐", L.site, bioUrl(d.site)));
  if (d.map) acts.push(btn("📍", L.directions, "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(d.map)));

  // the link rows — bio's reason to exist: sections, featured rows, per-link emoji, tap-to-copy
  const iconCell = (h) => `<span class="bio-link-icon">${h}</span>`;
  const emojiOr = (label, fallback) => { const m = label.match(BIO_EMOJI); return m ? { icon: escapeHtml(m[1]), text: m[2] } : { icon: fallback, text: label }; };
  const link = (iconHtml, label, sub, href, feat) =>
    `<a class="bio-link${feat ? " featured" : ""}" href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">` +
      iconCell(iconHtml) +
      `<span class="bio-link-text"><span class="bio-link-label">${escapeHtml(label)}</span>` +
      (sub ? `<span class="bio-link-sub">${escapeHtml(sub)}</span>` : "") + `</span>` +
      `<span class="bio-link-go">↗</span></a>`;
  const rows = [];
  for (const b of blocks) {
    if (b.type === "section") { rows.push(`<div class="bio-section">${renderInline(b.text)}</div>`); continue; }
    if (b.type === "copy") {
      const { icon, text } = emojiOr(b.label, BIO_COPY);
      rows.push(`<button type="button" class="bio-link bio-copy${b.featured ? " featured" : ""}" data-copy="${escapeHtml(b.value)}">` +
        iconCell(icon) +
        `<span class="bio-link-text"><span class="bio-link-label">${escapeHtml(text)}</span><span class="bio-link-sub">${escapeHtml(b.value)}</span></span>` +
        `<span class="bio-link-go">⧉</span></button>`);
      continue;

    if (b.type !== "link") continue;
    if (b.plat) { const def = BIO_PLATFORMS[b.plat]; rows.push(link(def.icon, def.name, b.handle, def.url(b.handle), b.featured)); }
    else if (b.label) { const { icon, text } = emojiOr(b.label, BIO_LINK); rows.push(link(icon, text, bioHost(b.url), bioUrl(b.url), b.featured)); }

  }

    const items = [];
    for (const pair of d.social.split(",")) {
      const [pre, handle] = pair.split("=").map((s) => s.trim());
      const def = BIO_PLATFORMS[(pre || "").toLowerCase()];
      if (def && handle) items.push(`<a class="bio-social" href="${escapeHtml(def.url(handle))}" target="_blank" rel="noopener noreferrer" aria-label="${escapeHtml(def.name)}">${def.icon}</a>`);
    }

  const parts = [
    `<div class="bio-card">`,
    `<div class="bio-avatar${sz !== "md" ? " sz-" + sz : ""}${shape ? " shape-" + shape : ""}${faceImg ? " has-face" : ""}">${avatar}</div>`,
    name ? `<h1 class="bio-name">${renderInline(name)}</h1>` : "",
    tagline ? `<p class="bio-tagline">${renderInline(tagline)}</p>` : "",

    actionsHtml,
    linksHtml,
    socialsHtml,
    `</div>`,

  ];

    html: parts.join(""),
    template: { minimal: 1, brutal: 1, dark: 1, bold: 1, mono: 1 }[d.template] ? d.template : "minimal",  // allowlist → explicit fallback
    accent: d.accent || null,
    font: { sans: 1, mono: 1, serif: 1 }[d.font] && d.font !== "sans" ? d.font : null,   // sans (default) | mono | serif
    bg: bioParseBg(d.bg, d.accent),   // @bg surface (null = none); consumer calls bioApplyBg

// @build:bio-renderer:end

function bioRenderer(header, body, ctx) {
  const text = new TextDecoder("utf-8").decode(body);
  const r = renderBioHTML(text, header.params, "via cradle · " + ctx.bootloaderUrl);
  document.documentElement.lang = r.lang;
  ctx.mount.className = "bio tmpl-" + r.template + (r.font ? " font-" + r.font : "");
  if (r.accent && ctx.mount.style) ctx.mount.style.setProperty("--bio-accent", r.accent);
  ctx.mount.innerHTML = r.html;
  if (ctx.mount.addEventListener) ctx.mount.addEventListener("click", bioCopyHandler);  // tap-to-copy rows
  try {
    document.body.style.padding = "0";
    document.body.style.minHeight = "100vh";
    bioApplyBg(ctx.mount, document.body, r);   // @bg surface + @card float (no-op when no @bg)
    bioApplyFx(ctx.mount, document.body, r);   // @fx holo/tilt/shine/living (no-op when no @fx)
  } catch (e) { /* headless / no layout */ }
}

      const c = t.slice(2), pipe = c.indexOf("|");
      blocks.push(pipe < 0 ? { type: "ing", amount: null, item: c }
                           : { type: "ing", amount: c.slice(0, pipe).trim(), item: c.slice(pipe + 1).trim() });
      continue;
    }
    const sm = t.match(/^\d+\.\s+(.*)$/);
    if (sm) { blocks.push({ type: "step", text: sm[1] }); continue; }
    blocks.push({ type: "p", text: t });
  }
  return { directives, blocks };
}

// ---- one ingredient <li> (escaped; scalable amount carries data-* for the client scaler) ----
function recipeIngHtml(b, dec) {
  const item = b.item ? `<span class="ing-item">${renderInline(b.item)}</span>` : "";
  if (b.amount == null) return `<li class="ing">${item}</li>`;
  const p = recipeParseQty(b.amount);
  if (!p) {
    const a = b.amount ? `<span class="ing-amt">${escapeHtml(b.amount)}</span> ` : "";
    return `<li class="ing">${a}${item}</li>`;
  }
  return `<li class="ing"><span class="ing-amt amt" data-lo="${p.lo}" data-hi="${p.hi == null ? "" : p.hi}"` +
    ` data-unit="${escapeHtml(p.unit)}">${escapeHtml(recipeFmtQty(p, 1, dec))}</span> ${item}</li>`;
}

// ---- one step <li> (renderInline first so real [text](url) links win; surviving
// [10m] tokens then become timer chips — a bracket+`(` was already consumed as a link) ----
function recipeStepHtml(text) {
  let body = renderInline(text);
  body = body.replace(/\[((?:\d+[hms])+)\]/g, (m, d) => {
    const sec = recipeDurSecs(d);
    return sec ? `<button type="button" class="recipe-timer" data-sec="${sec}"><span class="t-icon">⏱</span> <span class="t-clock">${recipeClock(sec)}</span></button>` : m;
  });
  return `<li class="step"><span class="step-check" aria-hidden="true"></span><div class="step-body">${body}</div></li>`;
}

// body text (after the magic line) + locale + attribution -> rendered recipe HTML + hints
function renderRecipeHTML(body, locale, attribution) {
  const L = RECIPE_LOCALES[locale] || RECIPE_LOCALES["pt-BR"];
  const { directives: d, blocks } = recipeParseBody(body);

  // header: title, meta (time/prep/cook), serves scaler, cook-mode toggle
  const titleBlock = blocks.find((b) => b.type === "h1");
  const title = titleBlock ? `<h1 class="recipe-title">${renderInline(titleBlock.text)}</h1>` : "";
  const meta = [];
  if (d.time) meta.push(`<span>⏱ ${escapeHtml(d.time)}</span>`);
  if (d.prep) meta.push(`<span>${L.prepLabel} ${escapeHtml(d.prep)}</span>`);
  if (d.cook) meta.push(`<span>${L.cookLabel} ${escapeHtml(d.cook)}</span>`);
  const metaHtml = meta.length ? `<div class="recipe-meta">${meta.join("")}</div>` : "";

  let servesHtml = "";
  const base = parseInt(d.serves, 10);
  if (base >= 1) {
    const yld = d.yield;
    const prefix = yld ? L.makesPrefix : L.servesPrefix;
    const suffix = yld ? yld : L.servesSuffix;
    servesHtml =
      `<div class="recipe-serves" data-base="${base}">` +
      `<button type="button" class="serves-btn serves-dec" aria-label="−">−</button>` +
      `<span class="serves-label">${escapeHtml(prefix)} <b class="serves-n">${base}</b>${suffix ? " " + escapeHtml(suffix) : ""}</span>` +
      `<button type="button" class="serves-btn serves-inc" aria-label="+">+</button>` +
      `<button type="button" class="serves-reset" hidden>${escapeHtml(L.reset)}</button>` +
      `</div>`;
  }
  const cookHtml = `<button type="button" class="recipe-cook">${escapeHtml(L.cookmode)}</button>`;
  const header = `<header class="recipe-head">${title}${metaHtml}${servesHtml}${cookHtml}</header>`;

  // body: group consecutive ingredients into <ul>, steps into <ol>; flush on other blocks
  const out = [];
  let kind = null, buf = [];
  const flush = () => {
    if (!buf.length) return;
    out.push(kind === "ing" ? `<ul class="recipe-ings">${buf.join("")}</ul>` : `<ol class="recipe-steps">${buf.join("")}</ol>`);
    buf = []; kind = null;
  };
  for (const b of blocks) {
    if (b.type === "ing") { if (kind !== "ing") flush(); kind = "ing"; buf.push(recipeIngHtml(b, L.decimal)); continue; }
    if (b.type === "step") { if (kind !== "step") flush(); kind = "step"; buf.push(recipeStepHtml(b.text)); continue; }
    flush();
    if (b.type === "h1") continue;                                 // already in the header
    if (b.type === "h2") out.push(`<h2 class="recipe-section">${renderInline(b.text)}</h2>`);
    else if (b.type === "p") out.push(`<p class="recipe-note">${renderInline(b.text)}</p>`);
    else if (b.type === "hr") out.push(`<hr>`);
  }
  flush();
  const bodyHtml = `<div class="recipe-body">${out.join("")}</div>`;

  // footer: @source link + @social text links + attribution
  const foot = [];
  if (d.source) {
    const u = escapeHtml(d.source);
    if (/^https?:/i.test(u)) foot.push(`<a class="recipe-source" href="${u}" target="_blank" rel="noopener noreferrer">${escapeHtml(L.source)} →</a>`);
  }
  if (d.social) {
    const links = [];
    for (const pair of d.social.split(",")) {
      const [pfx, handle] = pair.split("=").map((x) => (x || "").trim());
      const f = RECIPE_SOCIAL[pfx];
      if (f && handle) { const [label, url] = f(handle.replace(/^@/, "")); links.push(`<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`); }
    }
    if (links.length) foot.push(`<div class="recipe-socials">${links.join("")}</div>`);
  }
  if (attribution) foot.push(`<div class="attribution">${escapeHtml(attribution)}</div>`);
  const footHtml = foot.length ? `<footer class="recipe-foot">${foot.join("")}</footer>` : "";

  return {
    html: header + bodyHtml + footHtml,
    template: RECIPE_TEMPLATES[d.template] ? d.template : "card",
    accent: d.accent || null,
    lang: locale,
  };
}

// ---- client behavior: scaler / timers / cook-mode / check-off (no-op headless) ----
function recipeAttach(mount, locale) {
  if (!mount || !mount.querySelectorAll || !mount.addEventListener) return;
  const L = RECIPE_LOCALES[locale] || RECIPE_LOCALES["pt-BR"];
  const servesEl = mount.querySelector(".recipe-serves");
  const base = servesEl ? parseInt(servesEl.getAttribute("data-base"), 10) : 0;
  let target = base;

  function rescale() {
    if (!(base >= 1)) return;
    const factor = target / base;
    const nEl = mount.querySelector(".serves-n");
    if (nEl) nEl.textContent = String(target);
    const reset = mount.querySelector(".serves-reset");
    if (reset) reset.hidden = target === base;
    const amts = mount.querySelectorAll(".amt");
    for (let i = 0; i < amts.length; i++) {
      const el = amts[i], lo = parseFloat(el.getAttribute("data-lo"));
      const hiRaw = el.getAttribute("data-hi"), hi = hiRaw ? parseFloat(hiRaw) : null;
      if (isFinite(lo)) el.textContent = recipeFmtQty({ lo: lo, hi: hi, unit: el.getAttribute("data-unit") || "" }, factor, L.decimal);
    }
  }

  let wakeLock = null;
  async function toggleCook(btn) {
    const on = mount.classList.toggle("cook");
    if (btn) btn.classList.toggle("on", on);
    try {
      if (on && mount.ownerDocument && mount.ownerDocument.defaultView && navigator.wakeLock) wakeLock = await navigator.wakeLock.request("screen");
      else if (wakeLock) { wakeLock.release(); wakeLock = null; }
    } catch (e) { /* unsupported / denied — cook mode still styles */ }
  }

  function startTimer(btn) {
    if (btn._iv) return;                                   // already running
    let left = parseInt(btn.getAttribute("data-sec"), 10);
    const clock = btn.querySelector(".t-clock");
    btn.classList.add("running");
    const tick = () => {
      left -= 1;
      if (left <= 0) {
        clearInterval(btn._iv); btn._iv = null;
        btn.classList.remove("running"); btn.classList.add("done");
        if (clock) clock.textContent = L.timerDone;
        try { if (navigator.vibrate) navigator.vibrate([200, 100, 200]); } catch (e) {}
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) { const a = new AC(), o = a.createOscillator(), g = a.createGain(); o.connect(g); g.connect(a.destination); o.frequency.value = 880; g.gain.value = 0.08; o.start(); o.stop(a.currentTime + 0.4); }
        } catch (e) {}
        return;
      }
      if (clock) clock.textContent = recipeClock(left);
    };
    btn._iv = setInterval(tick, 1000);
  }

  mount.addEventListener("click", (e) => {
    const t = e.target.closest ? e.target.closest("button, .step, .ing") : null;
    if (!t) return;
    if (t.classList.contains("serves-dec")) { if (target > 1) { target -= 1; rescale(); } return; }
    if (t.classList.contains("serves-inc")) { target += 1; rescale(); return; }
    if (t.classList.contains("serves-reset")) { target = base; rescale(); return; }
    if (t.classList.contains("recipe-cook")) { toggleCook(t); return; }
    if (t.classList.contains("recipe-timer")) { startTimer(t); return; }
    if (t.classList.contains("step") || t.classList.contains("ing")) t.classList.toggle("done");
  });
}

if (typeof module !== "undefined" && module.exports) module.exports = { renderRecipeHTML, recipeAttach, recipeParseQty, recipeFmtQty, recipeFmtNum, recipeDurSecs };
// @build:recipe-renderer:end

function recipeRenderer(header, body, ctx) {
  const text = new TextDecoder("utf-8").decode(body);
  const r = renderRecipeHTML(text, header.params, "via cradle · " + ctx.bootloaderUrl);
  document.documentElement.lang = r.lang;
  ctx.mount.className = "recipe tmpl-" + r.template;
  if (r.accent && ctx.mount.style) ctx.mount.style.setProperty("--recipe-accent", r.accent);
  ctx.mount.innerHTML = r.html;
  try { recipeAttach(ctx.mount, header.params); } catch (e) { /* headless / no layout */ }
}

const DOORBELL_LOCALES = {
  "pt-BR": {
    buttons: {
      delivery: { emoji: "📦", label: "Entrega" },
      visitor:  { emoji: "👋", label: "Visita" },
      service:  { emoji: "🔧", label: "Serviço" },

      other:    { emoji: "✋", label: "Outro" },
    },
    sending: "Tocando a campainha…",
    success: "Campainha tocada! Aguarde.",
    error:   "Não foi possível tocar. Verifique sua conexão.",
    placeholder: "Digite uma mensagem curta…",
    sendBtn: "Tocar",
  },
  "en-US": {
    buttons: {
      delivery: { emoji: "📦", label: "Delivery" },
      visitor:  { emoji: "👋", label: "Visitor" },
      service:  { emoji: "🔧", label: "Service" },
      urgent:   { emoji: "⚠️",  label: "Urgent" },
      other:    { emoji: "✋", label: "Other" },
    },
    sending: "Ringing the bell…",
    success: "Rang! Please wait.",
    error:   "Couldn't ring. Check your connection.",
    placeholder: "Type a short message…",
    sendBtn: "Ring",
  },
};

function parseDoorbellBody(body) {
  const lines = body.split("\n");
  const directives = {};
  let title = "";
  let inDirective = true;
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { inDirective = false; continue; }
    if (inDirective && line.startsWith("@") && line.includes(":")) {
      const idx = line.indexOf(":");
      directives[line.slice(1, idx).trim()] = line.slice(idx + 1).trim();
      continue;
    }
    inDirective = false;
    // First non-directive non-blank line is treated as bare-text title
    if (!title) title = line;
  }
  return { directives, title };
}

// Base64url decode to Uint8Array
function b64urlToBytes(s) {
  const pad = (4 - (s.length % 4)) % 4;
  const norm = (s + "=".repeat(pad)).replace(/-/g, "+").replace(/_/g, "/");
  const bin = atob(norm);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

// Encrypt per SPEC-doorbell §5.2
async function doorbellEncrypt(recipientPubBytes, plaintext) {
  const ephemeral = await crypto.subtle.generateKey(
    { name: "X25519" }, true, ["deriveBits", "deriveKey"]);
  const ephemeralPubBuf = await crypto.subtle.exportKey("raw", ephemeral.publicKey);
  const ephemeralPubBytes = new Uint8Array(ephemeralPubBuf);

  const recipientPubKey = await crypto.subtle.importKey(
    "raw", recipientPubBytes, { name: "X25519" }, false, []);

  const sharedBits = await crypto.subtle.deriveBits(
    { name: "X25519", public: recipientPubKey }, ephemeral.privateKey, 256);

  const salt = new Uint8Array(64);
  salt.set(ephemeralPubBytes, 0);
  salt.set(recipientPubBytes, 32);

  const sharedKey = await crypto.subtle.importKey(
    "raw", sharedBits, "HKDF", false, ["deriveKey"]);
  const aesKey = await crypto.subtle.deriveKey(
    {
      name: "HKDF",
      hash: "SHA-256",
      salt: salt,
      info: new TextEncoder().encode("cradle/doorbell-v1"),
    },
    sharedKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt"]);

  const nonce = crypto.getRandomValues(new Uint8Array(12));
  const ciphertext = new Uint8Array(await crypto.subtle.encrypt(
    { name: "AES-GCM", iv: nonce, additionalData: ephemeralPubBytes },
    aesKey, plaintext));

  const wire = new Uint8Array(32 + 12 + ciphertext.length);
  wire.set(ephemeralPubBytes, 0);
  wire.set(nonce, 32);
  wire.set(ciphertext, 44);
  return wire;
}

async function doorbellSend(wire, relay, topic) {
  const url = `https://${relay}/${encodeURIComponent(topic)}`;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/octet-stream" },
    body: wire,
  });
  if (!res.ok) throw new Error(`relay returned HTTP ${res.status}`);
  return res;
}

function doorbellRenderer(header, body, ctx) {
  const locale = header.params || "en-US";
  const strings = DOORBELL_LOCALES[locale] || DOORBELL_LOCALES["en-US"];
  const text = new TextDecoder("utf-8").decode(body);
  const { directives: d, title: bareTitle } = parseDoorbellBody(text);

  // Validate required directives
  if (!d.pubkey) throw new Error("EDOORBELL: missing @pubkey directive");
  if (!d.topic) throw new Error("EDOORBELL: missing @topic directive");

  let pubBytes;
  try {
    pubBytes = b64urlToBytes(d.pubkey);
    if (pubBytes.length !== 32) throw new Error("wrong length");
  } catch (e) {
    throw new Error("EDOORBELL: @pubkey must be a base64url 32-byte X25519 public key");
  }

  const relay = d.relay || "ntfy.sh";
  const buttonKeys = (d.buttons || "delivery,visitor,other").split(",").map(s => s.trim()).filter(Boolean);
  const allowText = (d.allow_text || "").toLowerCase() === "true";
  const title = d.title || bareTitle || "";

  // Build UI
  document.documentElement.lang = locale;
  document.body.className = "tmpl-minimal";

  const parts = [];
  if (title) parts.push(`<div class="doorbell-title">${escapeHtml(title)}</div>`);
  if (d.info) parts.push(`<div class="doorbell-info">${renderInline(d.info)}</div>`);

  parts.push(`<div class="doorbell-buttons">`);
  for (const key of buttonKeys) {
    const btn = strings.buttons[key];
    if (!btn) continue;
    parts.push(
      `<button class="ring-btn" data-key="${escapeHtml(key)}" data-label="${escapeHtml(btn.emoji + " " + btn.label)}">` +
      `<span class="ring-emoji">${btn.emoji}</span>` +
      `<span>${escapeHtml(btn.label)}</span>` +
      `</button>`
    );
  }
  parts.push(`</div>`);

  if (allowText) {
    parts.push(`<textarea class="doorbell-text" placeholder="${escapeHtml(strings.placeholder)}" maxlength="200"></textarea>`);
    parts.push(`<button class="doorbell-send">${escapeHtml(strings.sendBtn)}</button>`);
  }

  parts.push(`<div class="doorbell-status" id="doorbell-status"></div>`);
  parts.push(`<div class="attribution">${escapeHtml(ctx.bootloaderUrl)}</div>`);
  ctx.mount.innerHTML = parts.join("");

  const status = ctx.mount.querySelector("#doorbell-status");
  const allButtons = ctx.mount.querySelectorAll(".ring-btn, .doorbell-send");

  function setStatus(state, msg) {
    status.className = "doorbell-status show " + state;
    status.textContent = msg;
  }

  async function ring(plaintext) {
    for (const b of allButtons) b.disabled = true;
    setStatus("sending", strings.sending);
    try {
      const wire = await doorbellEncrypt(pubBytes, new TextEncoder().encode(plaintext));
      await doorbellSend(wire, relay, d.topic);
      setStatus("success",
        strings.success + " (" + new Date().toLocaleTimeString(locale, { hour: "2-digit", minute: "2-digit" }) + ")");
    } catch (err) {
      console.error(err);
      setStatus("error", strings.error);
      for (const b of allButtons) b.disabled = false;
    }
  }

  for (const btn of ctx.mount.querySelectorAll(".ring-btn")) {
    btn.addEventListener("click", () => {
      const key = btn.getAttribute("data-key");
      const label = btn.getAttribute("data-label");
      ring(key + "\n" + label);
    });
  }
  const sendBtn = ctx.mount.querySelector(".doorbell-send");
  const textarea = ctx.mount.querySelector(".doorbell-text");
  if (sendBtn && textarea) {
    sendBtn.addEventListener("click", () => {
      const msg = textarea.value.trim();
      if (!msg) return;
      ring("text\n" + msg);
    });
  }
}
