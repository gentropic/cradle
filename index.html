    resize(); showCard(); if(!__started){ __started=true; requestAnimationFrame(loop); }
  }


// ============================================================
// arcr engine — parses the SPEC-arcr DSL and runs it on a
// shared juice/render substrate (lifted from arcade.html).
// A game is DATA; nothing here ever evals it. DSL = sandbox.
// ============================================================

// ---- seeded PRNG ----
function mulberry32(a){ return function(){ a|=0; a=(a+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a);
  t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
function hashStr(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }

// ============================================================
// PARSER  (line-oriented, keyword-led — SPEC-arcr §3)
// ============================================================
function tokenize(s){ const out=[]; const re=/"[^"]*"|\S+/g; let m; while((m=re.exec(s))) out.push(m[0]); return out; }
function unq(s){ return s && s[0]==='"' ? s.slice(1,-1) : s; }

function parseArcr(src){
  const directives={}, objects={}, rules=[], warnings=[];
  let order=0, sceneNo=1;
  for (const raw of src.split("\n")){
    const line = raw.trim();
    if (!line || line[0]==="#") continue;
    if (line[0]==="@"){
      const sp = line.indexOf(" ");
      const k = (sp<0?line.slice(1):line.slice(1,sp)).toLowerCase();
      directives[k] = sp<0 ? "" : line.slice(sp+1).trim();
      continue;
    }
    const t = tokenize(line);
    if (t[0]==="scene"){ sceneNo = parseInt(t[1]) || 1; continue; }
    if (t[0]==="obj"){
      const ci = t.indexOf(":");
      if (ci<0 || !t[1]){ warnings.push("obj needs `name : kind` → "+line); continue; }
      const name = t[1].toLowerCase();
      const kind = (t[ci+1]||"emoji").toLowerCase();
      const hasArg = t[ci+2] && !t[ci+2].includes("=");
      const arg = hasArg ? unq(t[ci+2]) : "";
      const props = {};
      for (let i=ci+2; i<t.length; i++){ if (t[i].includes("=")){ const j=t[i].indexOf("="); props[t[i].slice(0,j).toLowerCase()] = unq(t[i].slice(j+1)); } }
      objects[name] = { name, kind, arg, tag:(props.tag||null), move:(props.move||"still").toLowerCase(),
        at:(props.at||"center").toLowerCase(), speed:+(props.speed||1)||1, size:(props.size||"normal").toLowerCase(), order:order++, scene:sceneNo };
      continue;
    }
    if (t[0]==="on" || t[0]==="every" || t[0]==="at" || t[0]==="when" || t[0]==="chance"){
      const ci = t.indexOf(":");
      if (ci<0){ warnings.push("rule needs `event : action` → "+line); continue; }
      const ev = t.slice(0,ci);
      const actions = t.slice(ci+1).join(" ").split(";").map(a=>tokenize(a.trim())).filter(a=>a.length);
      rules.push({ ev, actions, fired:false, next: ev[0]==="every" ? (+ev[1]||1) : ev[0]==="chance" ? CHANCE_TICK : null, scene:sceneNo });
      continue;
    }
    warnings.push("unrecognized → "+line);
  }
  // surface what the HUD should show
  const txt = src;
  const flags = {
    score: /(^|\n)\s*(on|every|at|when|chance)[^\n]*\bscore\b/.test(txt) || /score\s*[+\-=]/.test(txt),
    lives: ("lives" in directives) || /\blife\s*[+\-]/.test(txt) || /when[^\n]*\blives\b/.test(txt),
    timeGoal: 0,
    scoreGoal: 0,
  };
  for (const r of rules){
    if (r.ev[0]==="when"){
      const c=r.ev.slice(1);
      const win = r.actions.some(a=>a[0]==="win");
      if (win && c[0]==="score" && c[1]===">=") flags.scoreGoal = +c[2]||0;
      if (win && c[0]==="time"  && c[1]===">=") flags.timeGoal  = +c[2]||0;
    }
  }
  return { directives, objects, rules, warnings, flags,
           title:(directives.title||"untitled"), about:(directives.about||"") };
}

// ============================================================
// RENDER / JUICE substrate (from arcade.html)
// ============================================================
/* cv, ctx created in buildDOM */
let W=0,H=0,DPR=1,frame=0;
function resize(){
  const rb = wrapEl.getBoundingClientRect();
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = Math.round(rb.width); H = Math.round(rb.height);
  cv.width = Math.round(W*DPR); cv.height = Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize", resize);

function drawEmoji(ch,x,y,size){ ctx.save(); ctx.translate(x,y);
  ctx.font = size+"px 'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(ch,0,size*0.06); ctx.restore(); }
function poly(n,r){ ctx.beginPath(); for(let i=0;i<n;i++){const a=-Math.PI/2+i*2*Math.PI/n; ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);} ctx.closePath(); ctx.fill(); }
function starP(n,ro,ri){ ctx.beginPath(); for(let i=0;i<n*2;i++){const a=-Math.PI/2+i*Math.PI/n; const rr=i%2?ri:ro; ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);} ctx.closePath(); ctx.fill(); }
function drawShape(shape,r,color){ ctx.fillStyle=color; ctx.strokeStyle=color; ctx.shadowColor=color; ctx.shadowBlur=12;
  switch(shape){
    case "diamond": ctx.save(); ctx.rotate(Math.PI/4); ctx.fillRect(-r*0.8,-r*0.8,r*1.6,r*1.6); ctx.restore(); break;
    case "hexagon": poly(6,r); break; case "triangle": poly(3,r); break;
    case "star": starP(5,r,r*0.45); break;
    case "ring": ctx.lineWidth=r*0.45; ctx.beginPath(); ctx.arc(0,0,r*0.68,0,7); ctx.stroke(); break;
    case "spike": starP(8,r*1.05,r*0.58); break; case "saw": starP(12,r,r*0.72); break;
    case "x": ctx.lineWidth=r*0.5; ctx.lineCap="round"; ctx.beginPath();
      ctx.moveTo(-r*0.6,-r*0.6); ctx.lineTo(r*0.6,r*0.6); ctx.moveTo(r*0.6,-r*0.6); ctx.lineTo(-r*0.6,r*0.6); ctx.stroke(); break;
    default: ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.fill();
  } ctx.shadowBlur=0; }

// procedural pixel-creature: a 7x7 mirror-symmetric "invader", seeded → consistent
// per object/game, varied across games. Body colour from the palette, contrasting eyes.
const _spriteCache={};
function makeSprite(key, seed, body, eye){
  if(_spriteCache[key]) return _spriteCache[key];
  const rnd=mulberry32(seed>>>0), cols=7, rows=7, cell=8, half=4;
  const cvs=document.createElement("canvas"); cvs.width=cols*cell; cvs.height=rows*cell;
  const cx=cvs.getContext("2d");
  for(let y=0;y<rows;y++) for(let x=0;x<half;x++){ const edge=(y===0||y===rows-1);
    if(rnd()<(edge?0.3:0.62)){ cx.fillStyle=body; cx.fillRect(x*cell,y*cell,cell,cell); cx.fillRect((cols-1-x)*cell,y*cell,cell,cell); } }
  const eyeRow=2+Math.floor(rnd()*2); cx.fillStyle=eye;
  cx.fillRect(1*cell,eyeRow*cell,cell,cell); cx.fillRect((cols-2)*cell,eyeRow*cell,cell,cell);
  _spriteCache[key]=cvs; return cvs; }
function spriteFor(o){
  const sd = /^\d+$/.test(o.arg||"") ? ((+o.arg)>>>0) : (hashStr((o.name||"")+"@"+SEED)>>>0);
  const body=isPlayer(o)?PAL.player:PAL.accent, eye=PAL.fg;
  return makeSprite(sd+"|"+body+"|"+eye, sd, body, eye); }

// audio
let AC=null;
function audioOn(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==="suspended") AC.resume(); }
const mtof=(m)=>440*Math.pow(2,(m-69)/12);
function tone({freq=440,to=null,type="square",dur=0.12,vol=0.18,delay=0}){ if(!AC)return; const t0=AC.currentTime+delay;
  const o=AC.createOscillator(),g=AC.createGain(); o.type=type; o.frequency.setValueAtTime(freq,t0);
  if(to)o.frequency.exponentialRampToValueAtTime(Math.max(1,to),t0+dur);
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(vol,t0+0.008); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g).connect(AC.destination); o.start(t0); o.stop(t0+dur+0.02); }
function noise({dur=0.2,vol=0.25}){ if(!AC)return; const t0=AC.currentTime; const n=Math.floor(AC.sampleRate*dur);
  const buf=AC.createBuffer(1,n,AC.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const s=AC.createBufferSource(); s.buffer=buf; const g=AC.createGain(); g.gain.setValueAtTime(vol,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  const f=AC.createBiquadFilter(); f.type="lowpass"; f.frequency.setValueAtTime(1800,t0); f.frequency.exponentialRampToValueAtTime(300,t0+dur);
  s.connect(f).connect(g).connect(AC.destination); s.start(t0); }
function sfxGood(c){ tone({freq:mtof(AUD.root+12+Math.min(c,8)),to:mtof(AUD.root+19+Math.min(c,8)),type:AUD.wave,dur:0.10,vol:0.16}); }
function sfxBad(){ noise({dur:0.22,vol:0.28}); tone({freq:160,to:60,type:"sawtooth",dur:0.25,vol:0.18}); }
function sfxUi(){ tone({freq:520,to:780,type:"square",dur:0.07,vol:0.12}); }
function sfxWin(){ [0,4,7,12].forEach((iv,i)=>tone({freq:mtof(AUD.root+12+iv),type:"triangle",dur:0.18,vol:0.16,delay:i*0.09})); }
function sfxDie(){ [0,-2,-4,-9].forEach((iv,i)=>tone({freq:mtof(58+iv),type:"sawtooth",dur:0.22,vol:0.16,delay:i*0.1})); noise({dur:0.3,vol:0.22}); }
// named cues for the `sound <id>` action — relative to the game's AUD root, so they fit the palette
function playCue(id){ switch(id){
  case "ding":  tone({freq:mtof(AUD.root+19),to:mtof(AUD.root+24),type:"triangle",dur:0.14,vol:0.16}); break;
  case "blip":  tone({freq:mtof(AUD.root+12),type:AUD.wave,dur:0.07,vol:0.14}); break;
  case "pop":   tone({freq:mtof(AUD.root+24),to:mtof(AUD.root+12),type:"square",dur:0.08,vol:0.14}); break;
  case "thud":  noise({dur:0.18,vol:0.22}); tone({freq:90,to:50,type:"sawtooth",dur:0.18,vol:0.16}); break;
  case "buzz":  tone({freq:140,type:"sawtooth",dur:0.18,vol:0.14}); break;
  case "chord": [0,4,7].forEach((iv,i)=>tone({freq:mtof(AUD.root+12+iv),type:"triangle",dur:0.22,vol:0.12,delay:i*0.02})); break;
  default:      tone({freq:mtof(AUD.root+12),type:AUD.wave,dur:0.08,vol:0.12});
} }

// palette + background field
function buildPalette(prog,seed){
  const r=mulberry32(seed);
  let hue = ("palette" in prog.directives && /^\d+$/.test(prog.directives.palette)) ? +prog.directives.palette : Math.floor(r()*360);
  return { bg:`hsl(${hue},30%,${9+Math.floor(r()*6)}%)`, bg2:`hsl(${(hue+40)%360},34%,15%)`,
    player:`hsl(${(hue+180)%360},78%,62%)`, fg:`hsl(${hue},16%,93%)`, accent:`hsl(${(hue+90)%360},70%,60%)`, hue };
}
let BGFIELD=[];
function buildBgField(prog,seed){ const r=mulberry32(seed^0x1b873593); const bg=prog.directives.bg||"plain";
  const n=bg==="stars"?70:bg==="bubbles"?22:bg==="dots"?34:0; BGFIELD=[]; for(let i=0;i<n;i++)BGFIELD.push({x:r(),y:r(),z:0.3+r(),s:0.4+r()}); }
function drawBackground(){ const p=PAL,bg=PROG.directives.bg||"plain",t=frame/60;
  const grad=ctx.createLinearGradient(0,0,0,H); grad.addColorStop(0,p.bg2); grad.addColorStop(1,p.bg);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H); ctx.save();
  if(bg==="grid"){ ctx.strokeStyle=p.player; ctx.globalAlpha=0.12; const rows=12,off=(t*0.3)%1;
    for(let i=0;i<rows;i++){const f=(i+off)/rows;const y=H*(0.45+f*0.55);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    for(let i=-6;i<=6;i++){ctx.beginPath();ctx.moveTo(W*0.5,H*0.45);ctx.lineTo(W*0.5+i*W*0.22,H);ctx.stroke();} }
  else if(bg==="stars"){ ctx.fillStyle=p.fg; for(const s of BGFIELD){const y=(s.y+t*0.04*s.z)%1; ctx.globalAlpha=0.25+0.6*Math.abs(Math.sin(t*2*s.s+s.x*10)); const rr=s.z*1.8; ctx.fillRect(s.x*W,y*H,rr,rr);} }
  else if(bg==="bubbles"){ ctx.globalAlpha=0.10; ctx.fillStyle=p.player; for(const s of BGFIELD){const y=((s.y-t*0.05*s.z)%1+1)%1; ctx.beginPath(); ctx.arc(s.x*W,y*H,4+s.z*16,0,7); ctx.fill();} }
  else if(bg==="dots"){ ctx.globalAlpha=0.16; ctx.fillStyle=p.fg; for(const s of BGFIELD){const x=((s.x+t*0.02*s.z)%1+1)%1; ctx.beginPath(); ctx.arc(x*W,s.y*H,1.5+s.z*2,0,7); ctx.fill();} }
  ctx.restore(); ctx.globalAlpha=1; }

// ============================================================
// INTERPRETER  (SPEC-arcr §4 execution model)
// ============================================================
let PROG=null, PAL=null, AUD={wave:"square",root:50}, SEED=1;
let RNG=mulberry32(1);                   // seeded GAMEPLAY rng (spawn jitter, scatter, move random, chance) — reset per game in setupGame
const CHANCE_TICK=0.1;                   // `chance` is evaluated on this fixed game-time step (frame-rate independent, deterministic)
let state="card";                       // card | play | win | lose | end | refuse
let OBJ=[], S=null, parts=[], shake=0, msgs=[], ending=null, tapQ=0, lastBg="plain", scene=1, totalTime=0, pendingScene=null;
const target = { x:0.5, y:0.85 };

function zonePix(z){ switch(z){ case "top":return [W*0.5,H*0.14]; case "bottom":return [W*0.5,H*0.85];
  case "left":return [W*0.18,H*0.5]; case "right":return [W*0.82,H*0.5]; default:return [W*0.5,H*0.5]; } }
function radOf(o){ const base=W*0.052; return base*(o.size==="small"?0.7:o.size==="big"?1.5:1)*(o.scale||1)*(o.kind==="text"?1.1:1); }
function isPlayer(o){ return o.move==="tap"||o.move==="chase"; }
function refMatch(o,ref){ return ref[0]==="#" ? o.tag===ref.slice(1) : o.name===ref; }

function spawnObj(spec){ // {kind,arg,tag,move,speed,at,size}
  const o = { name:"_s"+(frame)+"_"+OBJ.length, kind:spec.kind||"emoji", arg:spec.arg||"", tag:spec.tag||null,
    move:spec.move||"fall", speed:+spec.speed||1, size:spec.size||"normal", scale:1, alive:true, sx:1, sy:1 };
  if (spec.x!=null){ o.x=spec.x; o.y=spec.y; }
  else if (spec.at==="scatter"){ const rr=radOf(o); o.x=rr+RNG()*(W-2*rr); o.y=H*(0.12+RNG()*0.5); }
  else { const z=zonePix(spec.at||"top"); o.x = (spec.at&&spec.at!=="top") ? z[0] : (radOf(o)+RNG()*(W-2*radOf(o))); o.y=z[1]; }
  OBJ.push(o); return o; }

// instantiate one scene's declared objects (auto-spread per zone) and (re)arm its rules
function placeScene(prog, sceneNo){
  const decl=Object.values(prog.objects).filter(d=>(d.scene||1)===sceneNo).sort((a,b)=>a.order-b.order);
  const byZone={}; for(const d of decl){ (byZone[d.at]=byZone[d.at]||[]).push(d); }
  for(const z in byZone){ const arr=byZone[z]; arr.forEach((d,i)=>{
    let x,y; const n=arr.length;
    if(z==="scatter"){ const rr=W*0.052*(d.scale||1); x=rr+RNG()*(W-2*rr); y=H*(0.12+RNG()*0.5); }
    else { const zp=zonePix(z); const span=Math.min(W*0.7, n*W*0.16); x = n>1 ? (W/2 - span/2 + span*(i+0.5)/n) : zp[0]; y=zp[1]; }
    OBJ.push({ ...d, x, y, scale:1, alive:true, sx:1, sy:1 });
  }); }
  for(const r of prog.rules){ if((r.scene||1)===sceneNo){ r.fired=false; r.next = r.ev[0]==="every" ? (+r.ev[1]||1) : r.ev[0]==="chance" ? CHANCE_TICK : null; } }
}

// transition to scene n: tear down the current stage, set up the next, scene-relative time
function gotoScene(n){
  scene=n; OBJ=[]; parts=[]; msgs=[]; shake=0; tapQ=0; S.time=0; pendingScene=null;
  placeScene(PROG, n);
}

function setupGame(prog,seed){
  PROG=prog; SEED=seed; PAL=buildPalette(prog,seed); buildBgField(prog,seed);
  RNG=mulberry32((seed^0x9e3779b9)>>>0); // gameplay rng: identical seed → identical play (SPEC-arcr §10)
  const r=mulberry32(seed^0x55); AUD={ wave:["square","sawtooth","triangle"][Math.floor(r()*3)], root:48+Math.floor(r()*12) };
  OBJ=[]; parts=[]; msgs=[]; shake=0; ending=null; tapQ=0; frame=0; totalTime=0; pendingScene=null;
  S={ score:0, lives:("lives" in prog.directives)?(+prog.directives.lives||0):3, time:0, taps:0, vars:{} };
  for(const r2 of prog.rules){ r2.fired=false; r2.next = r2.ev[0]==="every" ? (+r2.ev[1]||1) : null; }
  const scenes=[...new Set([...Object.values(prog.objects).map(o=>o.scene||1), ...prog.rules.map(r2=>r2.scene||1)])].sort((a,b)=>a-b);
  scene = scenes[0] || 1;
  placeScene(prog, scene);
}

function num(expr){ if(expr[0]==="count"){ const ref=expr[1]||""; return OBJ.filter(o=>o.alive&&refMatch(o,ref)).length; }
  const k=expr[0]; if(k in S) return S[k]; return S.vars[k]||0; }
function evalOne(c){ if(c.length<3) return false; const L=num([c[0],c[1]]); const op=c[c.length-2], R=+c[c.length-1];
  return op==="=="?L===R:op==="!="?L!==R:op===">="?L>=R:op==="<="?L<=R:op===">"?L>R:op==="<"?L<R:false; }
// compound: comparisons joined by `and`/`or`, evaluated left-to-right (no precedence)
function evalCond(c){
  const parts=[[]], ops=[];
  for(const tok of c){ if(tok==="and"||tok==="or"){ ops.push(tok); parts.push([]); } else parts[parts.length-1].push(tok); }
  let res=evalOne(parts[0]);
  for(let i=0;i<ops.length;i++){ const r=evalOne(parts[i+1]); res = ops[i]==="and" ? (res&&r) : (res||r); }
  return res; }

function burst(x,y,color,n,spd){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2,s=spd*(0.3+Math.random());
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-spd*0.3,life:1,color,r:2+Math.random()*3}); } }
// {score}/{lives}/{time}/{taps}/{var} → live values, for narration + endings
function interp(s){ return String(s).replace(/\{(\w+)\}/g,(m,k)=> k==="score"?S.score : k==="lives"?S.lives : k==="time"?Math.floor(S.time) : k==="taps"?S.taps : (S&&k in S.vars)?S.vars[k] : m ); }
function say(txt){ msgs.push({txt:interp(txt),life:2.4}); if(msgs.length>3) msgs.shift(); }

function doAction(a, srcObj){
  const v=a[0];
  if(v==="say"){ say(unq(a.slice(1).join(" "))); return; }
  if(v==="nothing") return;
  if(v==="shake"){ shake=Math.min(24,shake+14); return; }
  if(v==="flash"){ shake=Math.min(8,shake+5); return; }
  if(v==="score"){ const d=a[1]||"+0"; if(d[0]==="=")S.score=+d.slice(1)||0; else S.score+=+d||0;
    if(+d>0||d[0]!=="-"){ sfxGood(S.score); if(srcObj){burst(srcObj.x,srcObj.y,PAL.accent,12,220);} } return; }
  if(v==="life"){ S.lives+=+a[1]||0; if((+a[1]||0)<0){ shake=Math.min(24,shake+16); sfxBad(); if(srcObj)burst(srcObj.x,srcObj.y,"#f55",14,240);} return; }
  if(v==="set"){ S.vars[a[1]]=+a[2]||0; return; }
  if(v==="add"){ S.vars[a[1]]=(S.vars[a[1]]||0)+(+a[2]||0); return; }
  if(v==="spawn"){ let st=1, n=1; if(/^\d+$/.test(a[1])){ n=Math.max(1,Math.min(64,+a[1]||1)); st=2; } // optional leading burst count
    const kind=a[st]; const props={}; let arg=""; // first non-`key=value` token after kind is the (optional) positional arg
    for(let i=st+1;i<a.length;i++){ if(a[i].includes("=")){const j=a[i].indexOf("=");props[a[i].slice(0,j)]=unq(a[i].slice(j+1));} else if(!arg) arg=unq(a[i]); }
    for(let k=0;k<n;k++) spawnObj({kind,arg,tag:props.tag,move:props.move,speed:props.speed,at:props.at,size:props.size}); return; }
  if(v==="destroy"){ let n=Infinity,ref=a[1]; if(/^\d+$/.test(a[1])){n=+a[1];ref=a[2];}
    const targets = ref==="it" ? (srcObj?[srcObj]:[]) : OBJ.filter(o=>o.alive&&refMatch(o,ref));
    let c=0; for(const o of targets){ if(c>=n) break; o.alive=false; burst(o.x,o.y,PAL.fg,6,140); c++; } return; }
  if(v==="move"){ const o = a[1]==="it" ? srcObj : OBJ.find(x=>x.alive&&x.name===a[1]);
    if(o){ if(a[2]==="random"){o.x=radOf(o)+RNG()*(W-2*radOf(o)); o.y=H*(0.18+RNG()*0.6);} else {const z=zonePix(a[2]); o.x=z[0]; o.y=z[1];} } return; }
  if(v==="become"){ const targets = a[1]==="it" ? (srcObj?[srcObj]:[]) : OBJ.filter(o=>o.alive&&refMatch(o,a[1]));
    for(const o of targets){ o.kind=a[2]; o.arg=unq(a[3]||""); o.sx=1.4; o.sy=0.7; } return; }
  if(v==="tune"){ const prop=a[2], d=+a[3]||0; const targets = a[1]==="it" ? (srcObj?[srcObj]:[]) : OBJ.filter(o=>o.alive&&refMatch(o,a[1]));
    for(const o of targets){ if(prop==="speed") o.speed=Math.max(0.15,Math.min(3,(o.speed||1)+d));
      else if(prop==="scale") o.scale=Math.max(0.3,Math.min(3,(o.scale||1)+d)); } return; }
  if(v==="shoot"){ // shoot [from <ref>] <kind> [arg] [up|down|left|right | at <ref>] [props]
    const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
    const props={}, pos=[]; let dir=null, fromRef=null; // positionals = kind, arg (like obj/spawn)
    for(let i=1;i<a.length;i++){ const tk=a[i];
      if(tk==="from"){ fromRef=a[++i]; }
      else if(tk==="at"){ dir={at:a[++i]}; }
      else if(DIRS[tk]){ dir={vec:DIRS[tk]}; }
      else if(tk.includes("=")){ const j=tk.indexOf("="); props[tk.slice(0,j)]=unq(tk.slice(j+1)); }
      else pos.push(unq(tk)); }
    const kind=pos[0]||"shape", arg=pos[1]||""; // no kind given → a palette-circle bullet
    const PL=OBJ.find(o=>o.alive&&isPlayer(o));
    let origins = fromRef ? OBJ.filter(o=>o.alive&&refMatch(o,fromRef)) : ((srcObj||PL) ? [srcObj||PL] : []);
    if(!origins.length) origins=[{x:W*0.5,y:H*0.9,_virtual:true}];
    for(const src of origins){ let dx=0,dy=-1; // default heading: up
      if(dir&&dir.vec){ dx=dir.vec[0]; dy=dir.vec[1]; }
      else if(dir&&dir.at){ let best=null,bd=Infinity; for(const o of OBJ){ if(!o.alive||o===src||!refMatch(o,dir.at)) continue; const d=Math.hypot(o.x-src.x,o.y-src.y); if(d<bd){bd=d;best=o;} }
        if(best){ const d=Math.hypot(best.x-src.x,best.y-src.y)||1; dx=(best.x-src.x)/d; dy=(best.y-src.y)/d; } }
      else if(!src._virtual&&!isPlayer(src)&&PL){ const d=Math.hypot(PL.x-src.x,PL.y-src.y)||1; dx=(PL.x-src.x)/d; dy=(PL.y-src.y)/d; } // a non-player shooter aims at the player
      const o=spawnObj({kind,arg,tag:props.tag,move:"shot",speed:props.speed,size:props.size||"small",x:src.x,y:src.y});

  if(v==="goto"){ pendingScene = parseInt(a[1]) || 1; return; }
  if(v==="win"||v==="lose"||v==="end"||v==="refuse"){ if(!ending){ ending={type:v,msg:interp(unq(a.slice(1).join(" ")))}; } return; }

function fire(rule, srcObj){ for(const a of rule.actions) doAction(a, srcObj); }

function update(dt){
  frame++;
  if(state!=="play") return;
  S.time += dt; totalTime += dt;
  const tx=target.x*W, ty=target.y*H;

  // movement
  const PL = OBJ.find(o=>o.alive&&isPlayer(o));
  for(const o of OBJ){ if(!o.alive) continue;
    if(o.move==="tap"){ const k=16*(o.speed||1); o.vx=(o.vx||0)+((tx-o.x)*k*dt); o.vx*=Math.pow(0.0008,dt); o.vy=(o.vy||0)+((ty-o.y)*k*dt); o.vy*=Math.pow(0.0008,dt); o.x+=o.vx*dt; o.y+=o.vy*dt; }
    else if(o.move==="chase"){ const dx=tx-o.x,dy=ty-o.y,d=Math.hypot(dx,dy)||1,sp=W*0.9*(o.speed||1); o.x+=dx/d*sp*dt; o.y+=dy/d*sp*dt; }
    else if(o.move==="flee"){ const dx=o.x-tx,dy=o.y-ty,d=Math.hypot(dx,dy)||1,sp=W*0.6*(o.speed||1); if(d<W*0.45){o.x+=dx/d*sp*dt; o.y+=dy/d*sp*dt;} }
    else if(o.move==="seek"){ if(PL){ const dx=PL.x-o.x,dy=PL.y-o.y,d=Math.hypot(dx,dy)||1,sp=W*0.5*(o.speed||1); o.x+=dx/d*sp*dt; o.y+=dy/d*sp*dt; } else { o.y+=H*0.28*(o.speed||1)*dt; } }
    else if(o.move==="fall"){ o.y+=H*0.28*(o.speed||1)*dt; }
    else if(o.move==="rise"){ o.y-=H*0.28*(o.speed||1)*dt; }
    else if(o.move==="drift"){ o.x+=Math.sin(S.time*2+(o.order||0)*1.3)*W*0.06*dt*30; }
    else if(o.move==="shot"){ const sp=H*0.62*(o.speed||1); o.x+=(o.dirx||0)*sp*dt; o.y+=(o.diry==null?-1:o.diry)*sp*dt; } // ballistic: flies its fixed heading, culled off-screen
    if(o.move==="tap"||o.move==="chase"||o.move==="flee"||o.move==="seek"){ const rr=radOf(o); o.x=Math.max(rr,Math.min(W-rr,o.x)); o.y=Math.max(rr,Math.min(H-rr,o.y)); }
    if(isPlayer(o)){ const sp=Math.min(1,Math.hypot(o.vx||0,o.vy||0)/900); o.sx+=((1+sp*0.3)-o.sx)*12*dt; o.sy+=((1-sp*0.2)-o.sy)*12*dt; }
    else { o.sx+=(1-o.sx)*8*dt; o.sy+=(1-o.sy)*8*dt; }
  }

  // timers (scene-relative)
  for(const r of PROG.rules){
    if((r.scene||1)!==scene) continue;
    if(r.ev[0]==="every"){ while(S.time>=r.next){ r.next+=(+r.ev[1]||1); fire(r); } }
    else if(r.ev[0]==="chance"){ const p=+r.ev[1]||0; while(S.time>=r.next){ r.next+=CHANCE_TICK; if(RNG()<p*CHANCE_TICK) fire(r); } } // ~p times/sec, deterministic
    else if(r.ev[0]==="at"&&!r.fired&&S.time>=(+r.ev[1]||0)){ r.fired=true; fire(r); }
  }
  if(ending) return endGame();

  // collisions (on hit A B) — fire once per pair; consume the non-player member
  // UNLESS the rule transformed `it` (become/move/tune it), in which case it survives
  for(const r of PROG.rules){ if(r.ev[0]!=="on"||r.ev[1]!=="hit"||(r.scene||1)!==scene) continue; const A=r.ev[2],B=r.ev[3];
    const keepIt = r.actions.some(a=>(a[0]==="become"||a[0]==="move"||a[0]==="tune")&&a[1]==="it");
    for(const o1 of OBJ){ if(!o1.alive||!refMatch(o1,A)) continue;
      for(const o2 of OBJ){ if(!o2.alive||o2===o1||!refMatch(o2,B)) continue;
        if(o2.fired&&o2.fired.has(r)) continue;
        if(Math.hypot(o1.x-o2.x,o1.y-o2.y) < radOf(o1)+radOf(o2)*0.8){
          const src = isPlayer(o1)?o2:o1; fire(r, src);
          (o2.fired=o2.fired||new Set()).add(r);
          if(!keepIt){ if(!isPlayer(o1)) o1.alive=false; if(!isPlayer(o2)) o2.alive=false; }
          if(isPlayer(o1)){o1.sx=0.7;o1.sy=1.4;} if(isPlayer(o2)){o2.sx=0.7;o2.sy=1.4;}
        }
      } } }
  if(ending) return endGame();

  // taps
  while(tapQ>0){ tapQ--; S.taps++;
    for(const r of PROG.rules){ if(r.ev[0]!=="on"||r.ev[1]!=="tap"||(r.scene||1)!==scene) continue;
      if(r.ev[2]){ // on tap <ref> — must land on a matching object
        const hit=OBJ.find(o=>o.alive&&refMatch(o,r.ev[2])&&Math.hypot(o.x-tx,o.y-ty)<radOf(o)*1.4);
        if(hit) fire(r,hit);
      } else fire(r);
    }
  }
  if(ending) return endGame();

  // when (rising edge)
  for(const r of PROG.rules){ if(r.ev[0]==="when"&&(r.scene||1)===scene&&!r.fired&&evalCond(r.ev.slice(1))){ r.fired=true; fire(r); } }
  if(ending) return endGame();
  if(pendingScene!=null){ gotoScene(pendingScene); return; }

  // default lose at 0 lives (if a life system is in use)
  if(PROG.flags.lives && S.lives<=0){ ending={type:"lose",msg:""}; return endGame(); }
  // safety net: a game with no reachable ending is force-ended (SPEC-arcr §11) — total time, not scene time
  if(totalTime>=SAFETY){ ending={type:"end",msg:""}; return endGame(); }

  // cull: drop dead objects; an alive object that left the field is "missed" → fire `on miss <ref>` then drop it
  const kept=[];
  for(const o of OBJ){
    const onField = o.y>-H*0.2 && o.y<H*1.2 && o.x>-W*0.2 && o.x<W*1.2;
    if(o.alive && onField){ kept.push(o); continue; }
    if(o.alive && !onField){ for(const r of PROG.rules){ if(r.ev[0]==="on"&&r.ev[1]==="miss"&&(r.scene||1)===scene&&refMatch(o,r.ev[2])) fire(r,o); } }
  }
  OBJ=kept;
  if(ending) return endGame();
  for(const p of parts){ p.vy+=700*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt*1.6; } parts=parts.filter(p=>p.life>0);
  for(const m of msgs) m.life-=dt; msgs=msgs.filter(m=>m.life>0);
  shake*=Math.pow(0.0015,dt);
}

const SAFETY=120;
function endGame(){
  if(!ending && S.time>=SAFETY) ending={type:"end",msg:""};
  if(!ending) return;
  state=ending.type;
  if(ending.type==="win") sfxWin(); else if(ending.type==="lose") sfxDie(); else sfxUi();
  const head = {win:"YOU WIN",lose:"GAME OVER",end:"THE END",refuse:"—"}[ending.type];
  headEl.textContent = head;
  headEl.style.color = PAL.fg;
  msgEl.textContent = ending.msg || "";
  resultEl.style.color = PAL.fg; resultEl.style.display = "flex";
}

// ---- render ----
function drawObj(o){ const r=radOf(o); ctx.save(); ctx.translate(o.x,o.y); ctx.scale(o.sx||1,o.sy||1);
  if(o.kind==="emoji"){ drawEmoji(o.arg, 0,0, r*2.1); }
  else if(o.kind==="text"){ ctx.fillStyle=isPlayer(o)?PAL.player:PAL.fg; ctx.shadowColor="rgba(0,0,0,0.4)"; ctx.shadowBlur=6;
    ctx.font=`800 ${Math.round(r*0.95)}px system-ui`; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(o.arg,0,0); }
  else if(o.kind==="sprite"){ const sp=spriteFor(o); ctx.imageSmoothingEnabled=false; ctx.drawImage(sp,-r,-r,r*2,r*2); ctx.imageSmoothingEnabled=true; }
  else { drawShape(o.arg||"circle", r, isPlayer(o)?PAL.player:PAL.fg); }
  ctx.restore(); }

function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(PROG) drawBackground(); else { ctx.fillStyle="#0b0b10"; ctx.fillRect(0,0,W,H); }
  const ox=(Math.random()*2-1)*shake, oy=(Math.random()*2-1)*shake; ctx.translate(ox,oy);
  if(state==="play"||state==="win"||state==="lose"||state==="end"||state==="refuse"){
    for(const o of OBJ) if(o.alive) drawObj(o);
    for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }
    ctx.globalAlpha=1;
  }
  ctx.setTransform(DPR,0,0,DPR,0,0);

  // narration (say)
  let yy=H*0.30;
  for(let i=msgs.length-1;i>=0;i--){ const m=msgs[i]; ctx.globalAlpha=Math.min(1,m.life*1.5);
    ctx.fillStyle=PAL?PAL.fg:"#eee"; ctx.font=`600 ${Math.round(W*0.05)}px system-ui`; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(m.txt, W*0.5, yy); yy-=H*0.05; }
  ctx.globalAlpha=1;

  // HUD
  if(state==="play" && PROG){
    ctx.fillStyle=PAL.fg; ctx.font=`700 ${Math.round(W*0.055)}px system-ui`; ctx.textBaseline="top"; ctx.textAlign="left";
    let label="";
    if(PROG.flags.timeGoal) label=`${Math.max(0,Math.ceil(PROG.flags.timeGoal-S.time))}s`;
    else if(PROG.flags.scoreGoal) label=`${S.score}/${PROG.flags.scoreGoal}`;
    else if(PROG.flags.score) label=`${S.score}`;
    if(label) ctx.fillText(label, W*0.05, H*0.05);
    if(PROG.flags.lives && S.lives>0){ ctx.textAlign="right"; ctx.fillStyle="#f66"; ctx.fillText("♥".repeat(Math.min(9,S.lives)), W*0.95, H*0.05); }
  }
}

let last=0;
function loop(t){ const dt=Math.min(0.05,(t-last)/1000||0); last=t; update(dt); draw(); requestAnimationFrame(loop); }

function parseMagicLine(bytes) {
  // Read up to 4096 bytes or first 0x0A
  const cap = Math.min(bytes.length, 4096);
  let nl = -1;
  for (let i = 0; i < cap; i++) {
    if (bytes[i] === 0x0a) { nl = i; break; }
  }
  if (nl < 0) throw new Error("EMAGIC: no newline within first 4 KB");
  const line = new TextDecoder("utf-8").decode(bytes.slice(0, nl));
  const m = line.match(/^!([A-Za-z]+)(\d+)\+(.*)$/);
  if (!m) throw new Error("EMAGIC: malformed magic line: " + line);
  return {
    header: { formatName: m[1], version: parseInt(m[2], 10), params: m[3] },
    body: bytes.slice(nl + 1)
  };
}

async function main() {
  const root = document.getElementById("root");
  try {
    const frag = fragmentDecode(location.hash.slice(1));
    if (!frag) { renderLanding(root); return; }

    const bytes = resolveCapsule(frag, DICTS);
    const { header, body } = parseMagicLine(bytes);

    const renderer = RENDERERS[header.formatName];
    if (!renderer) throw new Error("EUNKNOWN-FORMAT: " + header.formatName);

    await renderer(header, body, {
      mount: root,
      bootloaderUrl: BOOTLOADER_URL,
      capsule: frag,
    });
  } catch (err) {
    const code = err.message.split(":")[0];
    const detail = err.message.split(":").slice(1).join(":").trim() || err.message;
    // "I don't recognize this format/dict/codec" — when the same capsule works on
    // another device, that's the signature of a STALE cached bootloader (this build
    // predates the renderer/dictionary the capsule needs). The service worker is now
    // network-first, so a reload self-heals; point the user at that.
    const maybeStale = code === "EUNKNOWN-FORMAT" || /unknown (dict-id|compact codec|format)/i.test(err.message);
    const hint = maybeStale
      ? `<p class="error-hint">If this works on another device, this installed copy is likely out of date. <a href="${escapeHtml(location.href)}" onclick="location.reload();return false;">Reload to update</a> (or close and reopen the page).</p>`
      : "";
    root.innerHTML =
      `<div class="error"><strong>${escapeHtml(code)}</strong>: ${escapeHtml(detail)}<pre>${escapeHtml(location.hash.slice(1, 200))}${location.hash.length > 201 ? "…" : ""}</pre>${hint}</div>`;
    console.error(err);
  }
}

  const h = location.hash.slice(1);
  if (!h || fragmentDecode(h).includes(":")) main();
});

// Service worker registration (silent failure if SW not supported / not served from same origin)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(err => {
      console.warn("SW registration failed:", err);
    });
  });
}
</script>
