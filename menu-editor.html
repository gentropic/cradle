<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>menu editor</title>
<link rel="manifest" href="menu-editor.webmanifest">
<meta name="theme-color" content="#fafaf8">
<style>
  :root {
    --bg: #fafaf8; --pane: #fff; --fg: #1a1a1a; --fg-muted: #6b6b6b; --fg-faint: #999;
    --border: #e5e5e0; --border-strong: #d0d0c8; --accent: #c4453a;
    --warn: #b8860b; --warn-bg: #fef9c3; --err: #b91c1c; --err-bg: #fee2e2;
    --ok: #166534; --code-bg: #f4f4ef; --field-bg: #fbfbf8;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-mono: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: var(--font-sans); background: var(--bg); color: var(--fg); font-size: 14px;
         line-height: 1.5; display: flex; flex-direction: column; min-height: 100vh; }

  header { padding: 0.5rem 1rem; background: var(--pane); border-bottom: 1px solid var(--border);
           display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  header h1 { font-size: 0.95rem; font-weight: 600; margin: 0; letter-spacing: 0.01em; }
  header .meta { font-size: 0.78rem; color: var(--fg-muted); }
  header .spacer { flex: 1; }
  header a, header button.h-btn {
    color: var(--fg-muted); text-decoration: none; font-size: 0.78rem;
    border: 1px solid transparent; background: transparent; cursor: pointer;
    padding: 0.3rem 0.5rem; border-radius: 3px; font-family: inherit;
  }
  header a:hover, header button.h-btn:hover {
    color: var(--accent); border-color: var(--border); background: var(--bg);
  }

  /* interface-language segmented toggle */
  .uilang { display: inline-flex; border: 1px solid var(--border-strong); border-radius: 4px; overflow: hidden; }
  .uilang-btn { font: inherit; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em;
    padding: 0.25rem 0.5rem; background: white; color: var(--fg-faint); border: none; cursor: pointer; }
  .uilang-btn + .uilang-btn { border-left: 1px solid var(--border); }
  .uilang-btn:hover { color: var(--accent); }
  .uilang-btn.active { background: var(--accent); color: white; }

  /* menu picker button */
  .picker-wrap { position: relative; }
  .picker-btn {
    font-family: inherit; font-size: 0.85rem; padding: 0.35rem 0.7rem;
    border: 1px solid var(--border-strong); background: white; color: var(--fg);
    border-radius: 3px; cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem;
    max-width: 260px;
  }
  .picker-btn:hover { border-color: var(--accent); }
  .picker-btn .picker-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px;
  }
  .picker-btn .caret { font-size: 0.7rem; color: var(--fg-faint); }
  .picker-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; min-width: 280px; max-width: 360px;
    background: white; border: 1px solid var(--border-strong); border-radius: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08); z-index: 100; padding: 0.25rem 0; max-height: 70vh; overflow-y: auto;
    display: none;
  }
  .picker-dropdown.open { display: block; }
  .picker-item {
    display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 0.75rem;
    cursor: pointer; border-left: 2px solid transparent;
  }
  .picker-item:hover { background: var(--bg); }
  .picker-item.current { border-left-color: var(--accent); background: var(--field-bg); }
  .picker-item .pi-text { flex: 1; min-width: 0; }
  .picker-item .pi-name { font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .picker-item .pi-meta { font-size: 0.7rem; color: var(--fg-faint); }
  .picker-item .pi-del {
    border: none; background: transparent; color: var(--fg-faint); cursor: pointer;
    padding: 0.2rem 0.4rem; border-radius: 3px; font-size: 0.85rem;
  }
  .picker-item .pi-del:hover { color: var(--err); background: var(--err-bg); }
  .picker-divider { border-top: 1px solid var(--border); margin: 0.25rem 0; }
  .picker-action {
    display: block; width: 100%; text-align: left; padding: 0.45rem 0.75rem;
    background: transparent; border: none; cursor: pointer; font: inherit; font-size: 0.85rem; color: var(--fg);
  }
  .picker-action:hover { background: var(--bg); color: var(--accent); }

  /* modal for URL import */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
    display: none; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: white; border-radius: 6px; max-width: 540px; width: 100%;
    padding: 1.25rem; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .modal h2 { margin: 0 0 0.5rem; font-size: 1rem; font-weight: 600; }
  .modal p { margin: 0 0 0.75rem; font-size: 0.85rem; color: var(--fg-muted); }
  .modal textarea {
    width: 100%; min-height: 80px; resize: vertical;
    font-family: var(--font-mono); font-size: 12px; padding: 0.5rem;
    border: 1px solid var(--border-strong); border-radius: 3px;
  }
  .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.75rem; }
  .modal-actions button {
    font: inherit; font-size: 0.85rem; padding: 0.45rem 0.9rem;
    border: 1px solid var(--border-strong); background: white; border-radius: 3px;
    cursor: pointer; color: var(--fg);
  }
  .modal-actions button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .modal-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .modal-actions button.primary:hover { background: #a83b30; color: white; }

  main.shell { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); min-height: 0; }
  @media (max-width: 900px) { main.shell { grid-template-columns: 1fr; } }

  .pane { background: var(--pane); display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .pane-header { padding: 0; border-bottom: 1px solid var(--border); background: var(--bg);
                 display: flex; align-items: stretch; }
  .tabs { display: flex; }
  .tab { padding: 0.55rem 1rem; font-size: 0.72rem; font-weight: 600;
         text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-muted);
         cursor: pointer; border: none; background: transparent;
         border-right: 1px solid var(--border); border-bottom: 2px solid transparent;
         margin-bottom: -1px; font-family: inherit; }
  .tab:hover { color: var(--fg); }
  .tab.active { color: var(--fg); background: var(--pane); border-bottom-color: var(--accent); }
  .pane-header.label-only { padding: 0.5rem 1rem; font-size: 0.72rem; font-weight: 600;
                             text-transform: uppercase; letter-spacing: 0.08em;
                             color: var(--fg-muted); border-bottom: 1px solid var(--border); background: var(--bg); }

  .mode-panel { flex: 1; display: none; flex-direction: column; min-height: 0; min-width: 0; }
  .mode-panel.active { display: flex; }
  textarea#src { flex: 1; min-height: 200px; border: none; padding: 1rem;
                 font-family: var(--font-mono); font-size: 13px; line-height: 1.55;
                 resize: none; outline: none; background: var(--pane); color: var(--fg); tab-size: 2; }

  .form-panel { overflow-y: auto; padding: 0.5rem 0; }
  .form-group { padding: 0.5rem 1rem; }
  .form-group > details { border: 1px solid var(--border); border-radius: 4px; background: var(--field-bg); }
  .form-group > details > summary {
    cursor: pointer; padding: 0.6rem 0.85rem; font-size: 0.78rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-muted);
    list-style: none; user-select: none;
  }
  .form-group > details > summary::-webkit-details-marker { display: none; }
  .form-group > details > summary::before {
    content: "▸"; display: inline-block; width: 1em; transition: transform 0.15s; color: var(--fg-faint);
  }
  .form-group > details[open] > summary::before { transform: rotate(90deg); }
  .form-group > details > .group-body { padding: 0.5rem 0.85rem 0.85rem; }

  .field-row { display: flex; align-items: center; gap: 0.5rem; margin: 0.4rem 0; flex-wrap: wrap; }
  .field-col { margin: 0.4rem 0; }
  .field-col > label { display: block; font-size: 0.78rem; color: var(--fg-muted); margin-bottom: 0.35rem; }
  .field-row > label { font-size: 0.78rem; color: var(--fg-muted); min-width: 110px; flex-shrink: 0; }

  /* visual template picker — live mini-renders using the real template CSS */
  .tmpl-picker { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.4rem; }
  .tmpl-thumb { cursor: pointer; border: 1.5px solid var(--border-strong); border-radius: 6px;
    overflow: hidden; padding: 0; background: #fff; font: inherit; display: flex; flex-direction: column; }
  .tmpl-thumb:hover { border-color: var(--accent); }
  .tmpl-thumb.sel { border-color: var(--accent); box-shadow: 0 0 0 1.5px var(--accent); }
  .tt-prev.menu { max-width: none; margin: 0; padding: 6px 6px 7px; line-height: 1.25; min-height: 52px; }
  .tt-h1 { display: block; font-family: var(--menu-head); color: var(--menu-accent);
    font-size: 0.6rem; font-weight: 700; line-height: 1; margin-bottom: 4px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .tmpl-bistro .tt-h1, .tmpl-serif .tt-h1 { font-style: italic; }
  .tmpl-bistro .tt-h1 { text-align: center; }
  .tt-it { display: flex; justify-content: space-between; gap: 4px; font-family: var(--menu-name);
    font-size: 0.5rem; color: var(--menu-fg); border-bottom: 1px solid var(--menu-rule); padding: 1.5px 0; }
  .tmpl-warm .tt-it { border-bottom: none; }
  .tt-it b { font-weight: 600; }
  .tt-label { font-size: 0.62rem; font-weight: 600; text-align: center; padding: 0.25rem 0.1rem;
    background: #fff; color: var(--fg-muted); border-top: 1px solid var(--border); }
  .tmpl-thumb.sel .tt-label { color: var(--accent); }
  .field-row > input[type="text"], .field-row > input[type="date"],
  .field-row > input[type="number"], .field-row > select, .field-row > textarea {
    font: inherit; font-size: 0.85rem; padding: 0.35rem 0.5rem;
    border: 1px solid var(--border-strong); border-radius: 3px;
    background: white; color: var(--fg); min-width: 0; flex: 1;
  }
  .field-row > textarea { font-family: var(--font-mono); font-size: 0.78rem; min-height: 60px; resize: vertical; flex-basis: 100%; }
  .field-row > input[type="color"] { width: 32px; height: 28px; padding: 0; border: 1px solid var(--border-strong); border-radius: 3px; cursor: pointer; }
  .field-row > input:focus, .field-row > select:focus, .field-row > textarea:focus {
    outline: none; border-color: var(--accent);
  }

  .social-row { display: flex; gap: 0.4rem; margin: 0.35rem 0; align-items: center; }
  .social-row > select { flex-shrink: 0; width: 80px; font: inherit; font-size: 0.8rem; padding: 0.3rem; border: 1px solid var(--border-strong); border-radius: 3px; background: white; }
  .social-row > input { flex: 1; font: inherit; font-size: 0.85rem; padding: 0.3rem 0.5rem; border: 1px solid var(--border-strong); border-radius: 3px; background: white; }
  .social-row > button { flex-shrink: 0; }

  .icon-btn { border: 1px solid var(--border); background: white; cursor: pointer;
              padding: 0.25rem 0.45rem; font-size: 11px; border-radius: 3px;
              color: var(--fg-muted); font-family: inherit; }
  .icon-btn:hover { border-color: var(--err); color: var(--err); }
  .icon-btn.up-down { padding: 0.15rem 0.35rem; font-size: 10px; line-height: 1; }
  .icon-btn.up-down:hover { color: var(--accent); border-color: var(--accent); }
  .add-btn { display: inline-block; padding: 0.35rem 0.75rem; margin-top: 0.5rem;
             font: inherit; font-size: 0.8rem; border: 1px dashed var(--border-strong);
             background: transparent; color: var(--fg-muted); cursor: pointer; border-radius: 3px; }
  .add-btn:hover { color: var(--accent); border-color: var(--accent); }

  .section-block { border: 1px solid var(--border); border-radius: 4px;
                   margin: 0.5rem 0; background: var(--pane); }
  .section-block-header { padding: 0.5rem 0.75rem; display: flex; align-items: center; gap: 0.5rem;
                          background: var(--field-bg); border-bottom: 1px solid var(--border);
                          border-radius: 4px 4px 0 0; }
  .section-block-header > input.section-name {
    flex: 1; font: inherit; font-size: 0.95rem; font-weight: 600;
    border: none; background: transparent; padding: 0.2rem 0;
    color: var(--accent); border-bottom: 1px dotted transparent;
  }
  .section-block-header > input.section-name:focus { outline: none; border-bottom-color: var(--accent); }
  .section-block-header > .reorder { display: flex; flex-direction: column; gap: 1px; }
  .section-block-body { padding: 0.5rem 0.75rem; }

  .item-row { display: grid; grid-template-columns: 1fr auto auto;
              gap: 0.4rem 0.5rem; padding: 0.4rem 0; border-bottom: 1px dotted var(--border);
              align-items: start; }
  .item-row:last-child { border-bottom: none; }
  .item-row .item-fields { display: flex; flex-direction: column; gap: 0.25rem; min-width: 0; }
  .item-row input.item-name { font: inherit; font-size: 0.9rem; font-weight: 500; padding: 0.25rem 0.4rem;
                              border: 1px solid transparent; background: transparent; border-radius: 3px; }
  .item-row input.item-name:focus, .item-row input.item-name:hover {
    border-color: var(--border-strong); background: white; outline: none;
  }
  .item-row input.item-desc { font: inherit; font-size: 0.78rem; padding: 0.2rem 0.4rem;
                              border: 1px solid transparent; background: transparent;
                              color: var(--fg-muted); border-radius: 3px; width: 100%; }
  .item-row input.item-desc:focus, .item-row input.item-desc:hover {
    border-color: var(--border-strong); background: white; outline: none; color: var(--fg);
  }
  .item-row input.item-price { font: inherit; font-size: 0.9rem; font-weight: 500; padding: 0.25rem 0.4rem;
                                border: 1px solid var(--border-strong); border-radius: 3px;
                                background: white; width: 80px; text-align: right;
                                font-variant-numeric: tabular-nums; }
  .item-row input.item-price:focus { outline: none; border-color: var(--accent); }
  .item-controls { display: flex; gap: 0.25rem; align-items: flex-start; }
  .tag-chips { display: flex; gap: 0.25rem; flex-wrap: wrap; padding: 0.15rem 0.4rem 0; }
  .tag-chip { font-size: 0.7rem; padding: 0.1rem 0.4rem; border: 1px solid var(--border-strong);
              border-radius: 10px; cursor: pointer; user-select: none;
              color: var(--fg-faint); background: transparent; font-family: inherit; }
  .tag-chip:hover { border-color: var(--accent); color: var(--accent); }
  .tag-chip.on { background: var(--accent); color: white; border-color: var(--accent); }

  .diagnostics { border-top: 1px solid var(--border); padding: 0.5rem 1rem;
                 display: flex; gap: 1.25rem; font-size: 0.78rem; color: var(--fg-muted);
                 background: var(--bg); flex-wrap: wrap; }
  .diagnostics .metric { display: flex; gap: 0.35rem; }
  .diagnostics .metric strong { color: var(--fg); font-weight: 500; font-variant-numeric: tabular-nums; }
  .save-status { color: var(--ok); font-size: 0.72rem; }
  .save-status.unsaved { color: var(--fg-faint); }
  .warnings { border-top: 1px solid var(--border); padding: 0.5rem 1rem;
              font-size: 0.78rem; background: var(--warn-bg); color: var(--warn);
              max-height: 100px; overflow-y: auto; }
  .warnings.empty { display: none; }
  .warnings.error { background: var(--err-bg); color: var(--err); }
  .warnings ul { margin: 0; padding-left: 1.2rem; }

  .preview-pane { overflow-y: auto; }
  .qr-section { padding: 1rem; border-bottom: 1px solid var(--border); background: var(--bg);
                display: flex; gap: 1rem; align-items: flex-start; flex-wrap: wrap; }
  #qr-canvas { background: white; border: 1px solid var(--border-strong);
               border-radius: 4px; padding: 8px; width: 200px; height: 200px;
               image-rendering: pixelated; flex-shrink: 0; }
  .qr-actions { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 160px; }
  .qr-actions button { font: inherit; font-size: 0.85rem; padding: 0.45rem 0.75rem;
                       border: 1px solid var(--border-strong); background: white;
                       border-radius: 3px; cursor: pointer; color: var(--fg); text-align: left; }
  .qr-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .qr-actions .url-display { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint);
                             background: var(--code-bg); padding: 0.4rem 0.5rem; border-radius: 3px;
                             border: 1px solid var(--border); word-break: break-all; max-height: 60px;
                             overflow-y: auto; line-height: 1.4; }
  .qr-actions .ecc-row { display: flex; gap: 0.35rem; align-items: center; font-size: 0.78rem; color: var(--fg-muted); }
  .qr-actions .ecc-row select { font: inherit; font-size: 0.78rem; padding: 2px 6px;
                                 border: 1px solid var(--border-strong); background: white; border-radius: 3px; }

  /* preview container; the menu itself is styled by the single-sourced templates below */
  .menu-preview { padding: 0; background: #fff; transition: background 0.15s; }
  /* menu template visuals — single source: ext/menu/templates.css */
  /* @build:menu-templates:start */
/* Menu template visuals — the SINGLE SOURCE for how a rendered menu looks.
   Scoped to a `.menu` root so the bootloader render and the editor preview are
   pixel-identical. Inlined into index.html + menu-editor.html by build/build.js
   (between @build:menu-templates markers). Edit here, then `npm run build`.

   Each template sets its own palette + fonts via --menu-* custom properties; an
   author's @accent overrides --menu-accent inline (consumer-applied) when present,
   otherwise the template's tasteful default stands. No web fonts (offline). */

.menu {
  --menu-accent: #b1543a;
  --menu-bg: #ffffff;
  --menu-fg: #1f1d1b;
  --menu-fg-muted: #6b655f;
  --menu-fg-faint: #a39c94;
  --menu-rule: rgba(0, 0, 0, 0.12);
  --menu-tag-bg: rgba(0, 0, 0, 0.06);
  --menu-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --menu-serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  --menu-head: var(--menu-sans);
  --menu-name: var(--menu-sans);
  --menu-maxw: 30rem;
  box-sizing: border-box;
  max-width: var(--menu-maxw);
  margin: 0 auto;
  padding: 2rem 1.5rem 3rem;
  background: var(--menu-bg);
  color: var(--menu-fg);
  font-family: var(--menu-sans);
  line-height: 1.55;
  -webkit-text-size-adjust: 100%;
}
.menu * { box-sizing: border-box; }
.menu h1 {
  font-family: var(--menu-head); font-size: 1.7rem; font-weight: 600; line-height: 1.15;
  margin: 0 0 0.35rem; color: var(--menu-accent); letter-spacing: -0.01em;
}
.menu h1 + p { margin-top: 0; color: var(--menu-fg-muted); }   /* the subtitle line */
.menu h2 {
  font-family: var(--menu-sans); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--menu-fg-muted); margin: 2rem 0 0.6rem;
  padding-bottom: 0.35rem; border-bottom: 1px solid var(--menu-rule);
}
.menu p { margin: 0.55rem 0; color: var(--menu-fg); }
.menu p em { color: var(--menu-fg-muted); font-style: italic; }
.menu strong { font-weight: 600; }
.menu a { color: var(--menu-accent); text-decoration: underline; text-underline-offset: 2px; }
.menu hr { border: 0; border-top: 1px solid var(--menu-rule); margin: 1.75rem 0 1rem; }
.menu .item {
  display: flex; gap: 1rem; align-items: baseline; padding: 0.6rem 0;
  border-bottom: 1px solid var(--menu-rule);
}
.menu .item:last-of-type { border-bottom: none; }
.menu .item-body { flex: 1; min-width: 0; }
.menu .item-name { font-family: var(--menu-name); font-size: 1rem; font-weight: 600; }
.menu .item-desc { font-size: 0.84rem; color: var(--menu-fg-muted); margin-top: 0.12rem; line-height: 1.4; }
.menu .item-price {
  font-size: 0.98rem; font-weight: 600; white-space: nowrap; color: var(--menu-fg);
  font-variant-numeric: tabular-nums; flex-shrink: 0;
}
.menu .tag {
  display: inline-block; font-size: 0.62rem; font-weight: 600; padding: 0.06rem 0.42rem;
  border-radius: 999px; background: var(--menu-tag-bg); color: var(--menu-fg-muted);
  margin-left: 0.35rem; vertical-align: 1.5px; letter-spacing: 0.03em; text-transform: uppercase;
}
.menu .stale {
  background: #fef3c7; color: #78350f; border: 1px solid #fbbf24;
  padding: 0.7rem 0.9rem; border-radius: 6px; margin-bottom: 1.5rem; font-size: 0.88rem;
}
.menu footer {
  margin-top: 2.25rem; padding-top: 1.1rem; border-top: 1px solid var(--menu-rule);
  font-size: 0.78rem; color: var(--menu-fg-muted);
}
.menu .footer-line { margin: 0.22rem 0; }
.menu .socials { display: flex; gap: 0.55rem; margin: 0.7rem 0; flex-wrap: wrap; }
.menu .socials a {
  display: inline-flex; align-items: center; gap: 0.3rem; text-decoration: none;
  color: var(--menu-fg-muted); padding: 0.3rem 0.6rem; border: 1px solid var(--menu-rule);
  border-radius: 999px; font-size: 0.78rem;
}
.menu .socials a:hover { color: var(--menu-accent); border-color: var(--menu-accent); }
.menu .socials svg { width: 14px; height: 14px; flex-shrink: 0; }
.menu .attribution {

/* ============================== templates ============================== */

/* minimal — clean modern sans, white, airy (the base above). */

/* bistro — classic cream paper, elegant serif, centered, dotted dividers */
.menu.tmpl-bistro {
  --menu-bg: #faf5ec; --menu-fg: #2b2620; --menu-fg-muted: #7a6f5f; --menu-fg-faint: #b3a795;
  --menu-rule: rgba(80, 60, 30, 0.2); --menu-tag-bg: rgba(120, 90, 40, 0.12);
  --menu-head: var(--menu-serif); --menu-name: var(--menu-serif); --menu-accent: #9c4724;
}
.menu.tmpl-bistro h1 { font-style: italic; font-size: 2.05rem; text-align: center; }
.menu.tmpl-bistro h1 + p { text-align: center; font-style: italic; }
.menu.tmpl-bistro h2 { border-bottom: none; text-align: center; letter-spacing: 0.22em; }
.menu.tmpl-bistro .item { border-bottom-style: dotted; }
.menu.tmpl-bistro .item-name { font-size: 1.1rem; font-weight: 500; }

/* serif — editorial / magazine, full serif, larger type */
.menu.tmpl-serif {
  --menu-head: var(--menu-serif); --menu-name: var(--menu-serif); --menu-accent: #1f1d1b;
  font-family: var(--menu-serif);
}
.menu.tmpl-serif h1 { font-size: 2.15rem; font-weight: 600; }
.menu.tmpl-serif h2 { font-family: var(--menu-sans); }
.menu.tmpl-serif .item-price { font-family: var(--menu-sans); }

/* dark — moody bar / izakaya, near-black with a warm amber accent */
.menu.tmpl-dark {
  --menu-bg: #16140f; --menu-fg: #ece7df; --menu-fg-muted: #a59c8e; --menu-fg-faint: #5f594e;
  --menu-rule: rgba(255, 255, 255, 0.14); --menu-tag-bg: rgba(255, 255, 255, 0.1);
  --menu-accent: #e0a458;
}
.menu.tmpl-dark .stale { background: #3a2e0a; color: #fde68a; border-color: #92740f; }

/* warm — cozy bakery / brunch, soft warm paper, friendly, no item rules */
.menu.tmpl-warm {
  --menu-bg: #fdf6f0; --menu-fg: #3a2e28; --menu-fg-muted: #8a7468; --menu-fg-faint: #c2ad9f;
  --menu-rule: rgba(150, 90, 60, 0.16); --menu-tag-bg: rgba(190, 110, 70, 0.13); --menu-accent: #c4683a;
}
.menu.tmpl-warm h1 { font-weight: 700; }
.menu.tmpl-warm h2 { color: var(--menu-accent); border-bottom: none; }
.menu.tmpl-warm .item { border-bottom: none; padding: 0.5rem 0; }

<script>
"use strict";

// ============================================================
// Dictionary — MUST be byte-identical to bootloader & encoder.py
// ============================================================
const DICT_PT_BR = "|garrafa\n|6 unidades\n|8 unidades\n## Vinhos brancos\n## Vinhos tintos\n## Espumantes\n## Entradas\n## Principais\n## Massas\n## Sobremesas\n## Sushi\n## Sashimi\n## Hot rolls\n## Combinados\n## Pratos quentes\n## Bebidas\n## Cafés\nmanjericão, molho de tomate, parmesão reggiano, azeite extra virgem, salmão grelhado, filé mignon, picanha, frango à parmegiana, risoto de cogumelos, sorvete de creme, frutas vermelhas, leite de coco, calda de caramelo, calda de chocolate, molho madeira, molho de pimenta, carpaccio, bruschetta, tiramisù, cheesecake, petit gateau, pudim, spaghetti, linguine, ravioli, lasanha, nhoque, fettuccine, queijo, presunto, alho, cebola, tomate, batata, arroz, salmão, atum, camarão, filé, frango, carne, peixe, polvo, lula, yakisoba, niguiri, sashimi, uramaki, hot roll, harumaki, gyoza, tempura, philadelphia, california, espresso, cappuccino, café com leite, mocha, chocolate quente, tapioca, pão de queijo, brigadeiro, beijinho, porção, unidades, garrafa, taça, copo, @template: minimal\n@template: bistro\n@template: serif\n@template: dark\n@accent: \n@valid_until: \n@service: \n@couvert: \n@social: \n";






const DICT_EN_US = "|bottle\n|6 pack\n|case of 12\n## White wines\n## Red wines\n## Sparkling\n## Rosé\n## Cocktails\n## Starters\n## Appetizers\n## Salads\n## Soups\n## Sandwiches\n## Mains\n## Entrées\n## Pasta\n## Pizza\n## Sides\n## Desserts\n## Sushi\n## Sashimi\n## Rolls\n## Combos\n## Hot dishes\n## Drinks\n## Coffee\n## Tea\n## Kids menu\n## Brunch\nextra virgin olive oil, fresh mozzarella, parmesan reggiano, aged cheddar, grilled salmon, grilled chicken, ribeye steak, filet mignon, mushroom risotto, vanilla ice cream, mixed berries, coconut milk, caramel sauce, chocolate sauce, red wine reduction, lemon butter sauce, carpaccio, bruschetta, tiramisu, cheesecake, chocolate lava cake, panna cotta, spaghetti, linguine, ravioli, lasagna, gnocchi, fettuccine, penne, cheese, ham, garlic, onion, tomato, potato, rice, salmon, tuna, shrimp, prawns, lobster, chicken, beef, pork, lamb, fish, octopus, squid, yakisoba, nigiri, sashimi, uramaki, hand roll, gyoza, tempura, philadelphia, california, dragon roll, spicy tuna, espresso, cappuccino, latte, americano, mocha, hot chocolate, flat white, cheeseburger, hamburger, club sandwich, caesar salad, greek salad, french fries, sweet potato fries, onion rings, mashed potatoes, served with, comes with, side of, choice of, @template: minimal\n@template: bistro\n@template: serif\n@template: dark\n@accent: \n@valid_until: \n@service: \n@couvert: \n@social: \n";







const DICTS = { "pt-BR": DICT_PT_BR, "en-US": DICT_EN_US };

// @build:menu-renderer:start  (generated from ext/menu/renderer.js — do not hand-edit)
// Shared menu render logic — the single source for both the bootloader's
// menuRenderer and the editor's live preview. Inlined into index.html and
// menu-editor.html by build/build.js (between @build:menu-renderer markers).
// Uses escapeHtml + renderInline from the host (both files define them).
// renderMenuHTML returns { html, template, accent, lang }; each consumer applies
// template/accent/lang in its own way (bootloader: <body> + --accent; editor:
// the preview frame + --menu-accent) and mounts `html`.
// Edit here, then `npm run build`.
const MENU_LOCALES = {
  "pt-BR": {
    currency: "R$ ",
    decimal: ",",
    stale: (date) => `Este cardápio expirou em ${formatDate(date, "pt-BR")}. Confirme os preços com o garçom.`,
    validThrough: (date) => `Cardápio válido até ${formatDate(date, "pt-BR")}.`,
    service: (pct) => `Serviço (${pct}) não incluso.`,
    couvert: (val) => `Couvert ${formatMoney(val, "pt-BR")}.`,
    tags: { v: "vegano", vg: "vegetariano", g: "sem glúten", l: "sem lactose", p: "picante" },
  },
  "en-US": {
    currency: "$",
    decimal: ".",
    stale: (date) => `This menu expired on ${formatDate(date, "en-US")}. Please confirm prices with your server.`,
    validThrough: (date) => `Menu valid through ${formatDate(date, "en-US")}.`,
    service: (pct) => `Service charge: ${pct}.`,
    couvert: (val) => `Cover: ${formatMoney(val, "en-US")}.`,
    tags: { v: "vegan", vg: "vegetarian", gf: "gluten-free", df: "dairy-free", sp: "spicy" },
  },
};

function formatMoney(value, locale) {
  const num = parseFloat(value);
  if (isNaN(num)) return value;
  if (locale === "pt-BR") return "R$ " + num.toFixed(2).replace(".", ",");
  return "$" + num.toFixed(2);
}
function formatPrice(price, locale) {
  const m = String(price == null ? "" : price).match(/^(\d+(?:\.\d+)?)(\/(?:kg|un))?$/);
  if (!m) return price;
  return formatMoney(m[1], locale) + (m[2] || "");
}
function formatDate(iso, locale) {
  try {
    const d = new Date(iso + "T12:00:00");
    if (isNaN(d)) return iso;
    return new Intl.DateTimeFormat(locale, { day: "numeric", month: "long", year: "numeric" }).format(d);
  } catch { return iso; }
}

function parseMenuBody(body) {
  const lines = body.split("\n");
  const directives = {};
  const blocks = [];
  let inDirective = true;
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { inDirective = false; continue; }
    if (inDirective && line.startsWith("@") && line.includes(":")) {
      const idx = line.indexOf(":");
      directives[line.slice(1, idx).trim()] = line.slice(idx + 1).trim();
      continue;
    }
    inDirective = false;
    if (line === "---") { blocks.push({ type: "hr" }); continue; }
    if (line.startsWith("## ")) { blocks.push({ type: "h2", text: line.slice(3) }); continue; }
    if (line.startsWith("# ")) { blocks.push({ type: "h1", text: line.slice(2) }); continue; }
    if (line.includes("|")) {
      const parts = line.split("|").map(p => p.trim());
      blocks.push({
        type: "item",
        name: parts[0] || "", price: parts[1] || "", desc: parts[2] || "",
        tags: (parts[3] || "").split(",").map(t => t.trim()).filter(Boolean),
      });
      continue;
    }
    blocks.push({ type: "p", text: line });
  }
  return { directives, blocks };
}

const SOCIAL_ICON = (paths) =>
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
const SOCIAL = {
  ig:  { icon: SOCIAL_ICON('<rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>'), url: h => `https://instagram.com/${h}`, label: h => `@${h}` },
  fb:  { icon: SOCIAL_ICON('<path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>'), url: h => `https://facebook.com/${h}`, label: h => h },
  x:   { icon: SOCIAL_ICON('<path d="M4 4l16 16M20 4L4 20"/>'), url: h => `https://x.com/${h}`, label: h => `@${h}` },
  tk:  { icon: SOCIAL_ICON('<path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/>'), url: h => `https://tiktok.com/@${h}`, label: h => `@${h}` },
  ws:  { icon: SOCIAL_ICON('<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>'), url: h => `https://wa.me/${h}`, label: () => "WhatsApp" },
  web: { icon: SOCIAL_ICON('<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>'), url: h => `https://${h}`, label: h => h },
};

// body text (after the magic line) + locale + an attribution line -> rendered
// menu HTML and the presentation hints the consumer applies.
function renderMenuHTML(body, locale, attribution) {
  const strings = MENU_LOCALES[locale] || MENU_LOCALES["pt-BR"];
  const parsed = parseMenuBody(body);
  const dirs = parsed.directives;
  const parts = [];

  // valid_until: a quiet "valid through X" footer line while current, escalating to a
  // warning banner once expired.
  let validUntilExpired = false, validUntilOk = false;
  if (dirs.valid_until) {
    const expiry = new Date(dirs.valid_until + "T23:59:59");
    if (!isNaN(expiry)) {
      validUntilOk = true;
      validUntilExpired = expiry < new Date();
      if (validUntilExpired) parts.push(`<div class="stale">${escapeHtml(strings.stale(dirs.valid_until))}</div>`);
    }
  }

  for (const b of parsed.blocks) {
    if (b.type === "h1") parts.push(`<h1>${renderInline(b.text)}</h1>`);
    else if (b.type === "h2") parts.push(`<h2>${renderInline(b.text)}</h2>`);
    else if (b.type === "p") parts.push(`<p>${renderInline(b.text)}</p>`);
    else if (b.type === "hr") parts.push(`<hr>`);
    else if (b.type === "item") {
      const tagsHtml = b.tags
        .filter(t => strings.tags[t])
        .map(t => `<span class="tag" title="${escapeHtml(strings.tags[t])}">${escapeHtml(t)}</span>`)
        .join("");
      const priceHtml = b.price ? `<div class="item-price">${escapeHtml(formatPrice(b.price, locale))}</div>` : "";
      const descHtml = b.desc ? `<div class="item-desc">${renderInline(b.desc)}</div>` : "";
      parts.push(
        `<div class="item">` +
        `<div class="item-body">` +
        `<div class="item-name">${renderInline(b.name)}${tagsHtml}</div>` +
        descHtml + `</div>` + priceHtml + `</div>`
      );
    }
  }

  const footerLines = [];
  if (dirs.service) footerLines.push(strings.service(dirs.service));
  if (dirs.couvert) footerLines.push(strings.couvert(dirs.couvert));
  // opt-in: the "valid through" line shows only when @valid_show is on (the expiry
  // banner above is always-on regardless — it's a safety guard).
  if (validUntilOk && !validUntilExpired && /^(true|yes|on|1)$/i.test(dirs.valid_show || "")) {
    footerLines.push(strings.validThrough(dirs.valid_until));
  }
  if (dirs.social || footerLines.length) {
    let footer = '<footer>';
    for (const l of footerLines) footer += `<div class="footer-line">${escapeHtml(l)}</div>`;
    if (dirs.social) {
      footer += '<div class="socials">';
      for (const pair of dirs.social.split(",")) {
        const [prefix, handle] = pair.split("=").map(s => s.trim());
        const def = SOCIAL[prefix];
        if (def && handle) {
          footer += `<a href="${def.url(handle)}" target="_blank" rel="noopener noreferrer">${def.icon}<span>${escapeHtml(def.label(handle))}</span></a>`;
        }
      }
      footer += '</div>';
    }
    footer += '</footer>';
    parts.push(footer);
  }

  if (attribution) parts.push(`<div class="attribution">${escapeHtml(attribution)}</div>`);

  return { html: parts.join(""), template: dirs.template || "minimal", accent: dirs.accent || null, lang: locale };
}
// @build:menu-renderer:end
const VALID_TEMPLATES = ["minimal", "bistro", "serif", "dark", "warm"];
const SOCIAL_PREFIXES = [
  ["ig", "Instagram"], ["fb", "Facebook"], ["x", "X"],
  ["tk", "TikTok"], ["ws", "WhatsApp"], ["web", "Website"],
];

// ============================================================
// UI localization (the BUILDER's own chrome) — distinct from the menu's
// output language (@menu locale). Detected from the browser, toggle-able,
// remembered in localStorage.
// ============================================================
const UILANG_KEY = "cradle_menu_uilang";
const UI = {
  "en": {
    "app.title": "menu editor",
    "hdr.import": "Import URL", "hdr.sample": "Load sample", "hdr.decoder": "decoder ↗",
    "uilang.title": "Interface language",
    "save.saved": "saved", "save.saving": "saving…",
    "tab.form": "Form", "tab.source": "Source",
    "grp.header": "Header", "grp.style": "Style", "grp.status": "Fees & validity",

// base45 encode + decode
// ============================================================
const B45 = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:";
const B45_REV = (() => { const r = {}; for (let i = 0; i < B45.length; i++) r[B45[i]] = i; return r; })();
function base45Encode(bytes) {
  const out = [];
  for (let i = 0; i < bytes.length; i += 2) {
    if (i + 1 < bytes.length) {
      const n = bytes[i] * 256 + bytes[i + 1];
      out.push(B45[n % 45], B45[Math.floor(n / 45) % 45], B45[Math.floor(n / (45 * 45))]);
    } else {
      const n = bytes[i];
      out.push(B45[n % 45], B45[Math.floor(n / 45)]);
    }
  }
  return out.join("");
}
function base45Decode(s) {
  const out = [];
  for (let i = 0; i < s.length; i += 3) {
    const chunk = s.slice(i, i + 3);
    let n = 0;
    for (let j = chunk.length - 1; j >= 0; j--) {
      const v = B45_REV[chunk[j]];
      if (v === undefined) throw new Error("invalid base45 character: " + chunk[j]);
      n = n * 45 + v;
    }
    if (chunk.length === 3) out.push((n >> 8) & 0xff, n & 0xff);
    else if (chunk.length === 2) out.push(n & 0xff);
  }
  return new Uint8Array(out);
}

function parseBody(body) {

function parseToFormState(source) {
  const text = source.trim();

  const body = nl >= 0 ? text.slice(nl + 1) : "";
  const m = prefixLine.match(/^!menu1\+([A-Za-z]{2,3}(?:-[A-Za-z]{2,4})?)$/);
  const locale = m ? m[1] : "pt-BR";
  const parsed = parseBody(body);
  const socials = [];
  if (parsed.directives.social) {
    for (const pair of parsed.directives.social.split(",")) {
      const [prefix, handle] = pair.split("=").map(s => s.trim());
      if (prefix && handle) socials.push({ prefix, handle });
    }
  }
  const state = {
    locale, template: parsed.directives.template || "minimal",
    accent: parsed.directives.accent || "",
    valid_until: parsed.directives.valid_until || "",
    valid_show: /^(true|yes|on|1)$/i.test(parsed.directives.valid_show || ""),
    service: parsed.directives.service || "",

  };

    if (phase === "header") {

      if (b.type === "p" && !state.subtitle && state.title) {

        currentSection = { name: b.text, items: [] }; state.sections.push(currentSection); continue;
      }
      if (b.type === "item") {
        if (!currentSection) { currentSection = { name: "Items", items: [] }; state.sections.push(currentSection); }
        currentSection.items.push({ name: b.name, price: b.price, desc: b.desc, tags: b.tags });

    }

  let out = `!menu1+${s.locale}\n`;

  if (s.accent) out += `@accent: ${s.accent}\n`;
  if (s.valid_until) out += `@valid_until: ${s.valid_until}\n`;
  if (s.valid_until && s.valid_show) out += `@valid_show: true\n`;
  if (s.service) out += `@service: ${s.service}\n`;
  if (s.couvert) out += `@couvert: ${s.couvert}\n`;
  if (s.socials && s.socials.length) {
    const pairs = s.socials.filter(x => x.prefix && x.handle).map(x => `${x.prefix}=${x.handle}`);
    if (pairs.length) out += `@social: ${pairs.join(", ")}\n`;
  }
  if (s.title) out += `\n# ${s.title}\n`;
  if (s.subtitle) out += `\n*${s.subtitle}*\n`;
  for (const sec of s.sections) {
    out += `\n## ${sec.name || ""}\n`;
    for (const it of sec.items) {
      const parts = [it.name || "", it.price || ""];
      const hasTags = it.tags && it.tags.length > 0;
      if (it.desc || hasTags) parts.push(it.desc || "");
      if (hasTags) parts.push(it.tags.join(", "));
      out += parts.join("|") + "\n";
    }
  }
  if (s.footer && s.footer.trim()) out += `\n---\n\n${s.footer.trim()}\n`;
  return out;
}

const VALID_TAGS_BY_LOCALE = {
  "pt-BR": new Set(["v", "vg", "g", "l", "p"]),
  "en-US": new Set(["v", "vg", "gf", "df", "sp"]),
};
function validate(source) {
  const warnings = [];
  if (!source.trim()) return { warnings: ["empty source"], fatal: true };
  const lines = source.split("\n");
  const m = lines[0].match(/^!menu(\d+)\+([A-Za-z]{2,3}(?:-[A-Za-z]{2,4})?)$/);
  if (!m) return { warnings: [`first line must be !menu1+<locale>, got ${JSON.stringify(lines[0])}`], fatal: true };
  if (parseInt(m[1]) !== 1) return { warnings: [`unsupported menu version: ${m[1]}`], fatal: true };
  const locale = m[2];
  if (!DICTS[locale]) return { warnings: [`unknown locale: ${locale}`], fatal: true };
  const validTags = VALID_TAGS_BY_LOCALE[locale] || new Set();
  let lineno = 1;
  for (const raw of lines.slice(1)) {
    lineno++;
    const line = raw.trim();
    if (!line || line.startsWith("@") || line.startsWith("#") || line === "---") continue;
    if (line.includes("|")) {
      const parts = line.split("|");
      if (parts.length > 4) warnings.push(`line ${lineno}: too many fields (${parts.length})`);
      if (parts.length >= 4 && parts[3].trim()) {
        for (const t of parts[3].split(",").map(x => x.trim()).filter(Boolean)) {
          if (!validTags.has(t)) warnings.push(`line ${lineno}: unknown tag "${t}" for ${locale}`);
        }
      }
    }
  }
  return { warnings, fatal: false, locale };
}

// Locale → dict-id (lowercase, no hyphens, prefixed with menu-).
// Mirror of SPEC-menu.md §2.1.
function localeToDictId(locale) {
  return "menu-" + locale.toLowerCase().replace(/-/g, "");
}

function encodeMenu(source) {
  // Source includes the magic line. The whole thing (magic + body) is
  // compressed as one stream under the locale's dictionary, base45-encoded,
  // and prefixed with the q: scheme + dict-id framing.
  const text = source.trim();
  const nl = text.indexOf("\n");
  const prefixLine = nl >= 0 ? text.slice(0, nl) : text;
  const m = prefixLine.match(/^!menu(\d+)\+([A-Za-z]{2,3}(?:-[A-Za-z]{2,4})?)$/);
  if (!m) throw new Error("invalid magic line; expected !menu<version>+<locale>");
  if (parseInt(m[1]) !== 1) throw new Error("unsupported menu version: " + m[1]);
  const locale = m[2];
  if (!DICTS[locale]) throw new Error("unknown locale: " + locale);

  const dictId = localeToDictId(locale);
  const dictBytes = new TextEncoder().encode(DICTS[locale]);
  const payloadBytes = new TextEncoder().encode(text + "\n");
  const deflated = pako.deflateRaw(payloadBytes, { level: 9, dictionary: dictBytes });
  const b45 = base45Encode(deflated);
  const escaped = b45.replace(/%/g, "%25").replace(/ /g, "%20");
  const capsule = "q:d." + dictId + "_" + escaped;
  return {
    url: "https://gentropic.org/cradle#" + capsule,
    raw: payloadBytes.length,
    deflated: deflated.length,
    locale,
    dictId,
  };
}

// Reverse the §6.4.1 fragment escaping with a single left-to-right pass
// (%25 -> %, %20 -> space), the exact inverse of the encode step above.
// NOT decodeURIComponent — see SPEC-capsule §6.4.1.
function fragmentDecode(s) {
  let out = "";
  for (let i = 0; i < s.length; i++) {
    if (s[i] === "%" && i + 2 < s.length) {
      const t = s.slice(i, i + 3);
      if (t === "%25") { out += "%"; i += 2; continue; }
      if (t === "%20") { out += " "; i += 2; continue; }
    }
    out += s[i];
  }
  return out;
}

function decodeMenuFromUrl(urlOrFragment) {
  // Accept full URL or just the fragment, with optional q: prefix.
  let frag = urlOrFragment;
  if (frag.includes("#")) frag = frag.split("#", 2)[1];
  frag = fragmentDecode(frag);

  // Strip scheme if present
  let body;
  if (frag.startsWith("q:")) {
    body = frag.slice(2);
  } else {
    throw new Error("expected q: scheme capsule in fragment");
  }
  if (body[0] !== "d") throw new Error("expected deflate codec");
  if (body[1] !== ".") throw new Error("expected dict-id after codec");
  const us = body.indexOf("_", 2);
  if (us < 0) throw new Error("dict-id missing underscore terminator");
  const dictId = body.slice(2, us);
  const b45Payload = body.slice(us + 1);

  // Map dict-id back to locale (reverse of localeToDictId).
  const m = dictId.match(/^menu-([a-z]+)$/);
  if (!m) throw new Error("unrecognized dict-id: " + dictId);
  // We only support pt-BR and en-US in this build; locale lookup table:
  const localeLookup = { ptbr: "pt-BR", enus: "en-US" };
  const locale = localeLookup[m[1]];
  if (!locale) throw new Error("unknown dict-id locale: " + dictId);

  const compressed = base45Decode(b45Payload);
  const dictBytes = new TextEncoder().encode(DICTS[locale]);
  const inflated = pako.inflateRaw(compressed, { dictionary: dictBytes });
  const fullText = new TextDecoder("utf-8").decode(inflated);

  // Verify the magic line matches the locale derived from dict-id
  const nlIdx = fullText.indexOf("\n");
  if (nlIdx < 0) throw new Error("no magic line in decoded payload");
  const magic = fullText.slice(0, nlIdx);
  const mm = magic.match(/^!menu(\d+)\+([A-Za-z]{2,3}(?:-[A-Za-z]{2,4})?)$/);
  if (!mm) throw new Error("invalid magic line: " + magic);
  if (mm[2] !== locale) console.warn("magic-line locale differs from dict-id locale: " + mm[2] + " vs " + locale);

  return fullText;
}

function drawQR(text, eccLevel, canvas) {
  let lastError;
  for (let v = 1; v <= 40; v++) {
    try {
      const qr = qrcode(v, eccLevel); qr.addData(text, "Byte"); qr.make();
      const moduleCount = qr.getModuleCount();
      const ctx = canvas.getContext("2d");
      const cssSize = 200; const dpr = window.devicePixelRatio || 1;
      const scale = Math.floor((cssSize * dpr) / (moduleCount + 4));
      const px = scale * (moduleCount + 4);
      canvas.width = px; canvas.height = px;
      canvas.style.width = cssSize + "px"; canvas.style.height = cssSize + "px";
      ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, px, px); ctx.fillStyle = "#000";
      const off = scale * 2;
      for (let r = 0; r < moduleCount; r++)
        for (let c = 0; c < moduleCount; c++)
          if (qr.isDark(r, c)) ctx.fillRect(off + c * scale, off + r * scale, scale, scale);
      return { version: v, modules: moduleCount };
    } catch (e) { lastError = e; }
  }
  throw lastError || new Error("payload too large for QR");
}

const STORE_PREFIX = "menu1:menu:";
const STORE_CURRENT = "menu1:current_id";
const STORE_NEXT_ID = "menu1:next_id";

function listMenus() {
  const menus = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith(STORE_PREFIX)) {
      const raw = localStorage.getItem(key);
      let source = raw, updated_at = 0;
      try {
        const obj = JSON.parse(raw);
        if (obj && typeof obj === "object" && "source" in obj) {
          source = obj.source; updated_at = obj.updated_at || 0;
        }
      } catch (e) { /* legacy plain-string format, treat raw as source */ }
      menus.push({ id: key.slice(STORE_PREFIX.length), source, updated_at });
    }
  }
  return menus.sort((a, b) => b.updated_at - a.updated_at);
}
function nextMenuId() {
  const n = parseInt(localStorage.getItem(STORE_NEXT_ID) || "1", 10);
  localStorage.setItem(STORE_NEXT_ID, String(n + 1));
  return String(n);
}
function getMenu(id) {
  const raw = localStorage.getItem(STORE_PREFIX + id);
  if (!raw) return null;
  try {
    const obj = JSON.parse(raw);
    if (obj && typeof obj === "object" && "source" in obj) return obj.source;
  } catch (e) { /* legacy plain-string */ }
  return raw;
}
function setMenu(id, source) {
  localStorage.setItem(STORE_PREFIX + id, JSON.stringify({ source, updated_at: Date.now() }));
}
function deleteMenu(id) {
  localStorage.removeItem(STORE_PREFIX + id);
  if (localStorage.getItem(STORE_CURRENT) === id) localStorage.removeItem(STORE_CURRENT);
}
function getCurrentMenuId() { return localStorage.getItem(STORE_CURRENT); }
function setCurrentMenuId(id) {
  if (id) localStorage.setItem(STORE_CURRENT, id);
  else localStorage.removeItem(STORE_CURRENT);
}
function menuTitle(source) {
  if (!source) return "Untitled";
  const lines = source.split("\n");
  for (const ln of lines) {
    const t = ln.trim();
    if (t.startsWith("# ") && !t.startsWith("## ")) return t.slice(2);
  }
  return t("picker.untitled");
}

// ============================================================
// Main update — diagnostics, preview, QR
// ============================================================
function update() {
  const source = document.getElementById("src").value;
  const warningsEl = document.getElementById("warnings");
  const frameEl = document.getElementById("menu-frame");
  const eccLevel = document.getElementById("ecc").value;
  const setMetric = (id, val) => document.getElementById(id).textContent = val;

  document.getElementById("picker-current").textContent = menuTitle(source);

  const v = validate(source);
  if (v.fatal) {
    warningsEl.classList.remove("empty"); warningsEl.classList.add("error");
    warningsEl.innerHTML = "<ul>" + v.warnings.map(w => `<li>${escapeHtml(w)}</li>`).join("") + "</ul>";
    setMetric("m-raw", "—"); setMetric("m-defl", "—"); setMetric("m-url", "—"); setMetric("m-qr", "—");
    frameEl.innerHTML = '<p style="color:#999;font-style:italic;padding:1rem">' + escapeHtml(v.warnings[0]) + '</p>';
    document.getElementById("url-display").textContent = "—";
    return;
  }
  if (v.warnings.length) {
    warningsEl.classList.remove("empty", "error");
    warningsEl.innerHTML = "<ul>" + v.warnings.map(w => `<li>${escapeHtml(w)}</li>`).join("") + "</ul>";
  } else { warningsEl.classList.add("empty"); warningsEl.innerHTML = ""; }

  let enc;
  try { enc = encodeMenu(source); }
  catch (err) {
    warningsEl.classList.remove("empty"); warningsEl.classList.add("error");
    warningsEl.innerHTML = "<ul><li>encode error: " + escapeHtml(err.message) + "</li></ul>"; return;
  }
  renderToFrame(source.split("\n").slice(1).join("\n"), enc.locale, frameEl);
  let qrInfo;
  try { qrInfo = drawQR(enc.url, eccLevel, document.getElementById("qr-canvas")); }
  catch (err) {
    warningsEl.classList.remove("empty"); warningsEl.classList.add("error");
    warningsEl.innerHTML = "<ul><li>QR: " + escapeHtml(err.message) + " — try lower ECC or shorter menu</li></ul>";
  }
  setMetric("m-raw", enc.raw + " B");
  setMetric("m-defl", enc.deflated + " B (" + Math.round(enc.deflated / Math.max(1, enc.raw) * 100) + "%)");
  setMetric("m-url", enc.url.length + " chars");
  setMetric("m-qr", qrInfo ? `V${qrInfo.version} ${eccLevel} (${qrInfo.modules}px)` : "—");
  document.getElementById("url-display").textContent = enc.url;

  // Mirror current state into the editor's URL hash so the address bar IS the
  // shareable editor link. Same payload format as the bootloader URL — just a
  // different page route. replaceState (not assignment) so we don't pollute history.
  const hashIdx = enc.url.indexOf("#");
  if (hashIdx >= 0) {
    const frag = enc.url.slice(hashIdx + 1);
    if (location.hash.slice(1) !== frag) {
      history.replaceState({}, "", "#" + frag);
    }
  }
}

function refreshPicker() {

function openPicker() {
  const dd = document.getElementById("picker-dropdown");
  dd.innerHTML = "";
  const currentId = getCurrentMenuId();
  const menus = listMenus();
  if (menus.length === 0) {
    const empty = document.createElement("div");
    empty.style.padding = "0.75rem"; empty.style.fontSize = "0.85rem"; empty.style.color = "var(--fg-faint)";
    empty.textContent = t("picker.empty");
    dd.appendChild(empty);
  } else {
    for (const m of menus) {
      const item = document.createElement("div");
      item.className = "picker-item" + (m.id === currentId ? " current" : "");
      const text = document.createElement("div"); text.className = "pi-text";
      const name = document.createElement("div"); name.className = "pi-name";
      name.textContent = menuTitle(m.source);
      text.appendChild(name);
      item.appendChild(text);
      const del = document.createElement("button");
      del.className = "pi-del"; del.textContent = "✕"; del.title = t("picker.delete");
      del.addEventListener("click", (e) => {
        e.stopPropagation();
        if (confirm(t("confirm.delete", menuTitle(m.source)))) {
          deleteMenu(m.id);
          if (m.id === currentId) {
            const remaining = listMenus();
            if (remaining.length) loadMenuById(remaining[0].id);
            else newMenu();
          }
          openPicker();
        }
      });
      item.appendChild(del);
      item.addEventListener("click", () => { loadMenuById(m.id); closePicker(); });
      dd.appendChild(item);
    }
  }
  const div = document.createElement("div"); div.className = "picker-divider"; dd.appendChild(div);
  const newBtn = document.createElement("button");
  newBtn.className = "picker-action"; newBtn.textContent = t("picker.new");

  dd.appendChild(newBtn);

function importFromText(text) {
  // Accept a full URL, a fragment, or raw menu1 source pasted directly
  const t = text.trim();
  let source;
  if (t.startsWith("!menu1+")) {
    source = t;  // raw source
  } else {
    // Try as URL or fragment
    try { source = decodeMenuFromUrl(t); }
    catch (err) { throw new Error("could not decode: " + err.message); }
  }
  const id = nextMenuId(); setMenu(id, source); setCurrentMenuId(id);
  document.getElementById("src").value = source;
  flushSourceToForm(); update();
}

document.getElementById("import-cancel").addEventListener("click", closeImportModal);
document.getElementById("import-confirm").addEventListener("click", () => {
  const text = document.getElementById("import-url").value;
  try { importFromText(text); closeImportModal(); showToast(t("toast.imported")); }
  catch (err) { showToast(t("toast.importFailed") + err.message); }
});
document.getElementById("import-modal").addEventListener("click", (e) => {
  if (e.target === document.getElementById("import-modal")) closeImportModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { closeImportModal(); closePicker(); }
});

document.getElementById("copy-url").addEventListener("click", async () => {
  const url = document.getElementById("url-display").textContent;
  if (!url || url === "—") return;
  try { await navigator.clipboard.writeText(url); showToast(t("toast.urlCopied")); }
  catch (e) { showToast(t("toast.copyFailed")); }
});
document.getElementById("download-qr").addEventListener("click", () => {
  document.getElementById("qr-canvas").toBlob(blob => downloadBlob(blob, "menu-qr.png"), "image/png");
});
document.getElementById("download-menu").addEventListener("click", () => {
  const src = document.getElementById("src").value;
  if (!src) return;
  downloadBlob(new Blob([src], { type: "text/plain;charset=utf-8" }), "menu.menu1");
});

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ============================================================
// Init: ?shared_url= / ?from= → import; #hash → load; else → restore
// ============================================================
(function init() {
  applyI18n();   // localize the static chrome to the detected/remembered UI language
  buildTemplatePicker();
  const params = new URLSearchParams(window.location.search);
  const fromParam = params.get("from") || params.get("shared_url") || params.get("shared_text");
  if (fromParam) {
    try {
      importFromText(fromParam);
      // Clean only the search params; let the hash mirror set itself from update()
      history.replaceState({}, "", window.location.pathname + window.location.hash);
      return;
    } catch (err) {
      console.warn("could not import from URL params:", err);
    }
  }

  // Hash present → it IS the current menu state
  const hashContent = location.hash.startsWith("#") ? location.hash.slice(1) : "";
  if (hashContent) {
    try {
      const source = decodeMenuFromUrl(hashContent);
      // If hash matches the current localStorage menu, just load that one (preserve id)
      const currentId = getCurrentMenuId();
      if (currentId && getMenu(currentId) === source) {
        document.getElementById("src").value = source;
        flushSourceToForm(); update();
        return;
      }
      // Otherwise check whether any saved menu has identical source
      for (const m of listMenus()) {
        if (m.source === source) {
          setCurrentMenuId(m.id);
          document.getElementById("src").value = source;
          flushSourceToForm(); update();
          return;
        }
      }
      // Brand new menu from this URL
      const id = nextMenuId(); setMenu(id, source); setCurrentMenuId(id);
      document.getElementById("src").value = source;
      flushSourceToForm(); update();
      return;
    } catch (err) {
      console.warn("hash didn't decode, falling through:", err);
    }
  }

  // Fall back: restore current menu, or sample on first run
  const currentId = getCurrentMenuId();
  if (currentId && getMenu(currentId)) {
    document.getElementById("src").value = getMenu(currentId);
    flushSourceToForm(); update();
  } else {
    const all = listMenus();
    if (all.length) {
      setCurrentMenuId(all[0].id);
      document.getElementById("src").value = all[0].source;
      flushSourceToForm(); update();
    } else {
      const id = nextMenuId(); setMenu(id, SAMPLE); setCurrentMenuId(id);
      document.getElementById("src").value = SAMPLE;
      flushSourceToForm(); update();
    }
  }
})();

// ============================================================
// Service worker registration (graceful if missing)
// ============================================================
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => { /* fine if missing */ });
  });
}
