<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>arcr-factory — capsule QR sheets</title>
<style>
  :root { --fg:#1a1a1a; --muted:#666; --line:#ddd; --accent:#444; }
  * { box-sizing:border-box; }
  html,body { margin:0; background:#ececed; color:var(--fg);
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif; }

  /* ---------- toolbar (screen only) ---------- */
  .bar { position:sticky; top:0; z-index:10; background:#fff; border-bottom:1px solid var(--line);
    padding:0.7rem 1rem; display:flex; flex-wrap:wrap; gap:0.9rem 1.4rem; align-items:flex-end; }
  .bar h1 { font-size:1rem; margin:0 1rem 0 0; font-weight:700; letter-spacing:0.02em; align-self:center; }
  .bar h1 small { font-weight:400; color:var(--muted); font-size:0.72rem; letter-spacing:0; }
  .f { display:flex; flex-direction:column; gap:0.2rem; font-size:0.72rem; color:var(--muted); }
  .f input[type=text]{ width:230px; } .f input[type=number]{ width:64px; }
  .f input, .f select { font:inherit; font-size:0.82rem; padding:0.3rem 0.45rem; border:1px solid #bbb;
    border-radius:5px; background:#fff; color:var(--fg); }
  .f.chk { flex-direction:row; align-items:center; gap:0.35rem; }
  .bar button { font:inherit; font-weight:600; font-size:0.82rem; padding:0.5rem 0.95rem; border-radius:6px;
    border:1px solid var(--accent); background:var(--accent); color:#fff; cursor:pointer; }
  .bar button.ghost { background:#fff; color:var(--accent); }
  .bar button:active { transform:translateY(1px); }
  #summary { width:100%; font-size:0.75rem; color:var(--muted); border-top:1px dashed var(--line); padding-top:0.5rem; }
  #summary .warn { color:#a40; font-weight:600; }
  details.extra { width:100%; font-size:0.78rem; color:var(--muted); }
  details.extra textarea { width:100%; min-height:90px; margin-top:0.4rem; font-family:ui-monospace,Consolas,monospace;
    font-size:0.78rem; padding:0.5rem; border:1px solid #bbb; border-radius:5px; resize:vertical; }

  /* ---------- sheets ---------- */
  #sheets { padding:18px; display:flex; flex-direction:column; align-items:center; gap:18px; }
  .sheet { width:210mm; height:297mm; padding:8mm; background:#fff; box-shadow:0 1px 8px rgba(0,0,0,0.15);
    position:relative; }
  .grid { width:100%; display:grid; }
  .cell { display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; overflow:hidden; break-inside:avoid; }
  .cell.cut { border:0.15mm solid #bbb; }
  .cell .qr { line-height:0; }
  .cell .qr svg { display:block; }
  .cell .title { font-size:7pt; line-height:1.05; margin-top:1mm; max-width:100%;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cell .meta { font-size:5pt; color:#999; margin-top:0.3mm; }
  .cell .idx { position:absolute; }

  /* corner crop marks per sheet */
  .crop { position:absolute; width:5mm; height:5mm; border-color:#000; }

  @media print {
    html,body { background:#fff; }
    .no-print { display:none !important; }
    #sheets { padding:0; gap:0; }
    .sheet { box-shadow:none; page-break-after:always; }
    .sheet:last-child { page-break-after:auto; }
  }
  @page { size:A4; margin:0; }
</style>
</head>
<body>

<div class="bar no-print">
  <h1>arcr-factory<br><small>capsule → QR sheets</small></h1>
  <label class="f">decoder base URL

  <label class="f">ECC

  <label class="f">QR size (mm)

  <label class="f">columns

  <label class="f chk"><input type="checkbox" id="cut" checked> cut marks</label>
  <button id="render">render</button>
  <button id="print" class="ghost">print ⎙</button>

// ---- capsule encode (matches index.html's resolver exactly) ----
const B45 = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:";
function base45Encode(bytes) {
  const out = [];
  for (let i = 0; i < bytes.length; i += 2) {
    if (i + 1 < bytes.length) {
      const n = bytes[i] * 256 + bytes[i + 1];
      out.push(B45[n % 45], B45[Math.floor(n / 45) % 45], B45[Math.floor(n / (45 * 45))]);
    } else {
      const n = bytes[i];
      out.push(B45[n % 45], B45[Math.floor(n / 45)]);
    }
  }
  return out.join("");
}
function buildCapsule(program) {
  const payload = "!arcr1+\n" + program;
  const raw = new TextEncoder().encode(payload);
  const dict = new TextEncoder().encode(DICT_ARCR);
  const deflated = pako.deflateRaw(raw, { level: 9, dictionary: dict });
  return { capsule: "q:d.arcr_" + base45Encode(deflated), bytes: deflated.length };
}
function escapeFrag(c) { return c.replace(/%/g, "%25").replace(/ /g, "%20"); }
function titleOf(program) { const m = program.match(/^@title\s+(.+)$/m); return m ? m[1].trim() : "untitled"; }

// ---- QR as crisp SVG sized in mm ----
function qrSVG(text, ecc, mm) {
  let qr = null, version = 0;
  for (let v = 1; v <= 40; v++) {
    try { const q = qrcode(v, ecc); q.addData(text, "Byte"); q.make(); qr = q; version = v; break; } catch (e) {}
  }
  if (!qr) throw new Error("payload too large for any QR version");
  const n = qr.getModuleCount(), quiet = 4, total = n + quiet * 2;
  let d = "";
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++)
      if (qr.isDark(r, c)) d += "M" + (c + quiet) + " " + (r + quiet) + "h1v1h-1z";
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + total + ' ' + total +
    '" width="' + mm + 'mm" height="' + mm + 'mm" shape-rendering="crispEdges">' +
    '<rect width="' + total + '" height="' + total + '" fill="#fff"/>' +
    '<path fill="#000" d="' + d + '"/></svg>';
  return { svg, version, modules: n };
}

function esc(s){ return String(s).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

// ---- gather games (library + pasted extras) ----
function gatherGames() {
  const games = LIBRARY.map(g => ({ name: g.name, src: g.src }));
  const extra = document.getElementById("extra").value.trim();
  if (extra) {
    for (const chunk of extra.split(/\n\s*-{3,}\s*\n/)) {
      const src = chunk.trim();
      if (src) games.push({ name: titleOf(src), src });
    }
  }
  return games;
}

// ---- render the sheets ----
const A4W = 210, A4H = 297, MARGIN = 8;
const PRINT_W = A4W - 2 * MARGIN, PRINT_H = A4H - 2 * MARGIN;

function render() {
  const base = document.getElementById("baseUrl").value.trim().replace(/#.*$/, "");
  const ecc = document.getElementById("ecc").value;
  const mm = Math.max(10, +document.getElementById("qrmm").value || 20);
  const cols = Math.max(1, +document.getElementById("cols").value || 6);
  const showT = document.getElementById("titles").checked;
  const showM = document.getElementById("meta").checked;
  const cut = document.getElementById("cut").checked;

  const games = gatherGames();
  const capH = (showT ? 4.5 : 0) + (showM ? 3 : 0);
  const cellH = mm + capH + 5;
  const rowsPerPage = Math.max(1, Math.floor(PRINT_H / cellH));
  const perPage = cols * rowsPerPage;

  const sheets = document.getElementById("sheets");
  sheets.innerHTML = "";
  let maxVer = 0, minModule = Infinity, errors = [];

  // pre-build all cells, tracking density
  const cells = games.map((g, i) => {
    try {
      const { capsule, bytes } = buildCapsule(g.src);
      const url = base + "#" + escapeFrag(capsule);
      const { svg, version, modules } = qrSVG(url, ecc, mm);
      maxVer = Math.max(maxVer, version);
      minModule = Math.min(minModule, mm / (modules + 8));
      return { i, name: g.name, svg, version, bytes, urlLen: url.length };
    } catch (e) { errors.push(g.name + ": " + e.message); return null; }
  }).filter(Boolean);

  for (let p = 0; p * perPage < cells.length; p++) {
    const sheet = document.createElement("div"); sheet.className = "sheet";
    const grid = document.createElement("div"); grid.className = "grid";
    grid.style.gridTemplateColumns = "repeat(" + cols + ", 1fr)";
    grid.style.gridAutoRows = cellH + "mm";
    for (const cell of cells.slice(p * perPage, (p + 1) * perPage)) {
      const el = document.createElement("div");
      el.className = "cell" + (cut ? " cut" : "");
      el.innerHTML =
        '<div class="qr">' + cell.svg + '</div>' +
        (showT ? '<div class="title">' + esc(cell.name) + '</div>' : '') +
        (showM ? '<div class="meta">v' + cell.version + ' · ' + cell.bytes + 'B</div>' : '');
      grid.appendChild(el);
    }
    sheet.appendChild(grid);
    // corner crop marks
    const corners = [["top","left"],["top","right"],["bottom","left"],["bottom","right"]];
    for (const [v,h] of corners) {
      const m = document.createElement("div"); m.className = "crop";
      m.style[v] = "3mm"; m.style[h] = "3mm";
      m.style.borderTop = v==="top" ? "0.3mm solid #000" : "none";
      m.style.borderBottom = v==="bottom" ? "0.3mm solid #000" : "none";
      m.style.borderLeft = h==="left" ? "0.3mm solid #000" : "none";
      m.style.borderRight = h==="right" ? "0.3mm solid #000" : "none";
      sheet.appendChild(m);
    }
    sheets.appendChild(sheet);
  }

  const pages = Math.max(1, Math.ceil(cells.length / perPage));
  const tight = minModule < 0.25;
  document.getElementById("summary").innerHTML =
    cells.length + " games · " + pages + " page(s) · " + cols + "×" + rowsPerPage + " per page · " +
    "largest QR v" + maxVer + " · min module " + minModule.toFixed(2) + "mm" +
    (tight ? ' <span class="warn">⚠ small modules — increase QR size or drop to ECC L for reliable scanning</span>' : " ✓") +
    (errors.length ? ' <span class="warn">· ' + errors.length + " too large: " + esc(errors.join(", ")) + "</span>" : "");
}

document.getElementById("render").addEventListener("click", render);
document.getElementById("print").addEventListener("click", () => window.print());
for (const id of ["baseUrl","ecc","qrmm","cols","titles","meta","cut"])
  document.getElementById(id).addEventListener("change", render);

window.addEventListener("load", render);
</script>
</body>
</html>
